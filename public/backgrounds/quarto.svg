<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1344 768">
  <defs>
    <linearGradient id="quarto-wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#bbdefb"/>
      <stop offset="100%" stop-color="#90caf9"/>
    </linearGradient>
    <linearGradient id="quarto-floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a1887f"/>
      <stop offset="100%" stop-color="#8d6e63"/>
    </linearGradient>
    <linearGradient id="quarto-bed-frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#795548"/>
      <stop offset="100%" stop-color="#5d4037"/>
    </linearGradient>
    <linearGradient id="quarto-blanket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7c4dff"/>
      <stop offset="100%" stop-color="#651fff"/>
    </linearGradient>
    <linearGradient id="quarto-pillow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
    <linearGradient id="quarto-desk" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffcc80"/>
      <stop offset="100%" stop-color="#ffb74d"/>
    </linearGradient>
    <linearGradient id="quarto-window-night" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1b3e"/>
      <stop offset="60%" stop-color="#1a237e"/>
      <stop offset="100%" stop-color="#283593"/>
    </linearGradient>
    <radialGradient id="quarto-moon" cx="0.4" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="100%" stop-color="#fdd835"/>
    </radialGradient>
    <radialGradient id="quarto-lamp-light" cx="0.5" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="rgba(255,236,179,0.5)"/>
      <stop offset="100%" stop-color="rgba(255,236,179,0)"/>
    </radialGradient>
    <linearGradient id="quarto-curtain-left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e53935"/>
      <stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
    <linearGradient id="quarto-curtain-right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c62828"/>
      <stop offset="100%" stop-color="#e53935"/>
    </linearGradient>
    <linearGradient id="quarto-bookshelf" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8d6e63"/>
      <stop offset="100%" stop-color="#6d4c41"/>
    </linearGradient>
    <linearGradient id="quarto-rug" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff8a65"/>
      <stop offset="50%" stop-color="#ff7043"/>
      <stop offset="100%" stop-color="#f4511e"/>
    </linearGradient>
  </defs>

  <!-- Wall -->
  <rect width="1344" height="768" fill="url(#quarto-wall)"/>

  <!-- Wall pattern (subtle stripes) -->
  <g opacity="0.05">
    <rect x="0" y="0" width="40" height="550" fill="white"/>
    <rect x="80" y="0" width="40" height="550" fill="white"/>
    <rect x="160" y="0" width="40" height="550" fill="white"/>
    <rect x="240" y="0" width="40" height="550" fill="white"/>
    <rect x="320" y="0" width="40" height="550" fill="white"/>
    <rect x="400" y="0" width="40" height="550" fill="white"/>
    <rect x="480" y="0" width="40" height="550" fill="white"/>
    <rect x="560" y="0" width="40" height="550" fill="white"/>
    <rect x="640" y="0" width="40" height="550" fill="white"/>
    <rect x="720" y="0" width="40" height="550" fill="white"/>
    <rect x="800" y="0" width="40" height="550" fill="white"/>
    <rect x="880" y="0" width="40" height="550" fill="white"/>
    <rect x="960" y="0" width="40" height="550" fill="white"/>
    <rect x="1040" y="0" width="40" height="550" fill="white"/>
    <rect x="1120" y="0" width="40" height="550" fill="white"/>
    <rect x="1200" y="0" width="40" height="550" fill="white"/>
    <rect x="1280" y="0" width="40" height="550" fill="white"/>
  </g>

  <!-- Baseboard -->
  <rect x="0" y="540" width="1344" height="15" fill="#795548"/>

  <!-- Floor -->
  <rect x="0" y="555" width="1344" height="213" fill="url(#quarto-floor)"/>
  <!-- Floor boards -->
  <g stroke="#7b5b47" stroke-width="1" opacity="0.3">
    <line x1="0" y1="600" x2="1344" y2="600"/>
    <line x1="0" y1="650" x2="1344" y2="650"/>
    <line x1="0" y1="700" x2="1344" y2="700"/>
    <line x1="0" y1="750" x2="1344" y2="750"/>
    <line x1="100" y1="555" x2="100" y2="600"/>
    <line x1="300" y1="600" x2="300" y2="650"/>
    <line x1="500" y1="555" x2="500" y2="600"/>
    <line x1="700" y1="600" x2="700" y2="650"/>
    <line x1="900" y1="555" x2="900" y2="600"/>
    <line x1="1100" y1="600" x2="1100" y2="650"/>
    <line x1="200" y1="650" x2="200" y2="700"/>
    <line x1="600" y1="650" x2="600" y2="700"/>
    <line x1="1000" y1="650" x2="1000" y2="700"/>
    <line x1="400" y1="700" x2="400" y2="750"/>
    <line x1="800" y1="700" x2="800" y2="750"/>
    <line x1="1200" y1="700" x2="1200" y2="750"/>
  </g>

  <!-- Rug -->
  <ellipse cx="672" cy="680" rx="250" ry="60" fill="url(#quarto-rug)" opacity="0.7"/>
  <ellipse cx="672" cy="680" rx="200" ry="45" fill="none" stroke="#ffab91" stroke-width="3" opacity="0.5"/>
  <ellipse cx="672" cy="680" rx="150" ry="32" fill="none" stroke="#ff8a65" stroke-width="2" opacity="0.4"/>

  <!-- Window -->
  <g transform="translate(550,80)">
    <!-- Window frame -->
    <rect x="-5" y="-5" width="250" height="310" rx="5" fill="#795548"/>
    <!-- Night sky -->
    <rect x="0" y="0" width="240" height="300" fill="url(#quarto-window-night)"/>
    <!-- Moon -->
    <circle cx="170" cy="80" r="30" fill="url(#quarto-moon)"/>
    <circle cx="180" cy="72" r="25" fill="url(#quarto-window-night)" opacity="0.7"/>
    <!-- Stars -->
    <circle cx="40" cy="40" r="2" fill="white"/>
    <circle cx="80" cy="70" r="1.5" fill="white"/>
    <circle cx="30" cy="100" r="1" fill="white"/>
    <circle cx="120" cy="30" r="1.5" fill="white"/>
    <circle cx="200" cy="50" r="1" fill="white"/>
    <circle cx="60" cy="150" r="1.5" fill="white"/>
    <circle cx="150" cy="140" r="1" fill="white"/>
    <circle cx="100" cy="200" r="1.5" fill="white"/>
    <circle cx="40" cy="240" r="1" fill="white"/>
    <circle cx="180" cy="220" r="1.5" fill="white"/>
    <circle cx="210" cy="160" r="1" fill="white"/>
    <!-- Twinkling stars -->
    <polygon points="70,120 72,115 74,120 79,122 74,124 72,129 70,124 65,122" fill="white" opacity="0.8"/>
    <polygon points="190,180 191,177 192,180 195,181 192,182 191,185 190,182 187,181" fill="white" opacity="0.7"/>
    <!-- Window dividers -->
    <line x1="120" y1="0" x2="120" y2="300" stroke="#795548" stroke-width="4"/>
    <line x1="0" y1="150" x2="240" y2="150" stroke="#795548" stroke-width="4"/>
    <!-- Window sill -->
    <rect x="-10" y="300" width="260" height="12" rx="3" fill="#8d6e63"/>
  </g>

  <!-- Curtains -->
  <path d="M535,70 Q530,200 540,400 Q545,420 560,400 Q555,250 550,70Z" fill="url(#quarto-curtain-left)"/>
  <path d="M535,70 Q520,200 530,400 Q535,420 550,400 Q540,250 540,70Z" fill="#d32f2f" opacity="0.7"/>
  <path d="M805,70 Q810,200 800,400 Q795,420 780,400 Q785,250 790,70Z" fill="url(#quarto-curtain-right)"/>
  <path d="M805,70 Q820,200 810,400 Q805,420 790,400 Q800,250 800,70Z" fill="#d32f2f" opacity="0.7"/>
  <!-- Curtain rod -->
  <rect x="520" y="65" width="300" height="6" rx="3" fill="#5d4037"/>
  <circle cx="525" cy="68" r="6" fill="#4e342e"/>
  <circle cx="815" cy="68" r="6" fill="#4e342e"/>

  <!-- Bed -->
  <g transform="translate(50,380)">
    <!-- Headboard -->
    <path d="M0,0 Q10,-40 50,-50 Q130,-60 210,-50 Q250,-40 260,0Z" fill="url(#quarto-bed-frame)"/>
    <!-- Bed frame -->
    <rect x="0" y="0" width="260" height="120" rx="5" fill="url(#quarto-bed-frame)"/>
    <!-- Mattress -->
    <rect x="5" y="5" width="250" height="60" rx="3" fill="white"/>
    <!-- Pillow -->
    <ellipse cx="55" cy="25" rx="40" ry="18" fill="url(#quarto-pillow)"/>
    <ellipse cx="55" cy="25" rx="35" ry="14" fill="none" stroke="#e0e0e0" stroke-width="1"/>
    <!-- Blanket -->
    <path d="M5,35 L255,35 L255,65 Q200,80 130,70 Q60,60 5,65Z" fill="url(#quarto-blanket)"/>
    <path d="M5,35 L255,35 L255,45 Q200,55 130,50 Q60,45 5,50Z" fill="#b388ff" opacity="0.3"/>
    <!-- Stars pattern on blanket -->
    <g fill="rgba(255,255,255,0.3)">
      <polygon points="80,50 81,47 82,50 85,51 82,52 81,55 80,52 77,51"/>
      <polygon points="140,45 141,42 142,45 145,46 142,47 141,50 140,47 137,46"/>
      <polygon points="200,52 201,49 202,52 205,53 202,54 201,57 200,54 197,53"/>
    </g>
    <!-- Footboard -->
    <rect x="250" y="-10" width="10" height="80" rx="3" fill="#6d4c41"/>
    <!-- Legs -->
    <rect x="5" y="60" width="8" height="100" fill="#5d4037"/>
    <rect x="247" y="60" width="8" height="100" fill="#5d4037"/>
  </g>

  <!-- Nightstand -->
  <g transform="translate(330,430)">
    <rect x="0" y="0" width="60" height="70" rx="3" fill="#ffcc80"/>
    <rect x="5" y="10" width="50" height="20" rx="2" fill="#ffb74d"/>
    <circle cx="30" cy="20" r="3" fill="#795548"/>
    <rect x="5" y="40" width="50" height="20" rx="2" fill="#ffb74d"/>
    <circle cx="30" cy="50" r="3" fill="#795548"/>
    <!-- Lamp on nightstand -->
    <rect x="22" y="-25" width="6" height="25" fill="#bdbdbd"/>
    <path d="M10,-35 Q15,-55 30,-60 Q45,-55 50,-35Z" fill="#fff9c4"/>
    <circle cx="30" cy="-30" r="35" fill="url(#quarto-lamp-light)"/>
  </g>

  <!-- Desk -->
  <g transform="translate(900,350)">
    <!-- Desktop -->
    <rect x="0" y="50" width="200" height="10" rx="3" fill="url(#quarto-desk)"/>
    <!-- Legs -->
    <rect x="10" y="60" width="8" height="140" fill="#f9a825"/>
    <rect x="182" y="60" width="8" height="140" fill="#f9a825"/>
    <!-- Drawer -->
    <rect x="30" y="65" width="80" height="35" rx="2" fill="#ffa726"/>
    <circle cx="70" cy="82" r="3" fill="#795548"/>
    <!-- Books on desk -->
    <rect x="130" y="30" width="15" height="20" rx="1" fill="#e53935"/>
    <rect x="148" y="25" width="12" height="25" rx="1" fill="#1976d2"/>
    <rect x="163" y="32" width="14" height="18" rx="1" fill="#388e3c"/>
    <!-- Pencil cup -->
    <rect x="30" y="30" width="20" height="20" rx="2" fill="#78909c"/>
    <line x1="35" y1="30" x2="33" y2="15" stroke="#f9a825" stroke-width="2"/>
    <line x1="40" y1="30" x2="40" y2="12" stroke="#e53935" stroke-width="2"/>
    <line x1="45" y1="30" x2="47" y2="16" stroke="#1976d2" stroke-width="2"/>
    <!-- Paper -->
    <rect x="70" y="35" width="40" height="15" fill="white" transform="rotate(-5,90,42)"/>
  </g>

  <!-- Chair at desk -->
  <g transform="translate(960,490)">
    <rect x="0" y="0" width="50" height="8" rx="2" fill="#1976d2"/>
    <rect x="0" y="-40" width="50" height="40" rx="3" fill="#1565c0"/>
    <rect x="5" y="8" width="5" height="60" fill="#424242"/>
    <rect x="40" y="8" width="5" height="60" fill="#424242"/>
    <line x1="5" y1="50" x2="45" y2="50" stroke="#424242" stroke-width="3"/>
  </g>

  <!-- Bookshelf on wall -->
  <g transform="translate(1150,150)">
    <rect x="0" y="0" width="150" height="250" fill="url(#quarto-bookshelf)"/>
    <!-- Shelves -->
    <rect x="0" y="60" width="150" height="5" fill="#5d4037"/>
    <rect x="0" y="125" width="150" height="5" fill="#5d4037"/>
    <rect x="0" y="190" width="150" height="5" fill="#5d4037"/>
    <!-- Books -->
    <rect x="10" y="10" width="12" height="50" fill="#e53935"/>
    <rect x="25" y="15" width="10" height="45" fill="#1976d2"/>
    <rect x="38" y="8" width="14" height="52" fill="#388e3c"/>
    <rect x="55" y="12" width="11" height="48" fill="#f9a825"/>
    <rect x="69" y="18" width="13" height="42" fill="#7b1fa2"/>
    <rect x="85" y="10" width="10" height="50" fill="#e91e63"/>
    <rect x="98" y="14" width="12" height="46" fill="#00897b"/>
    <rect x="113" y="20" width="11" height="40" fill="#ff5722"/>
    <rect x="127" y="12" width="13" height="48" fill="#3949ab"/>

    <rect x="10" y="70" width="13" height="55" fill="#ff7043"/>
    <rect x="26" y="75" width="11" height="50" fill="#26a69a"/>
    <rect x="40" y="68" width="14" height="57" fill="#ab47bc"/>
    <rect x="57" y="72" width="10" height="53" fill="#42a5f5"/>
    <rect x="70" y="78" width="12" height="47" fill="#ffa726"/>
    <rect x="85" y="70" width="15" height="55" fill="#66bb6a"/>

    <rect x="10" y="135" width="11" height="55" fill="#5c6bc0"/>
    <rect x="24" y="140" width="13" height="50" fill="#ec407a"/>
    <rect x="40" y="133" width="10" height="57" fill="#29b6f6"/>
    <rect x="53" y="138" width="14" height="52" fill="#8d6e63"/>
    <!-- Toy on shelf -->
    <circle cx="100" cy="175" r="10" fill="#ff9800"/>
    <circle cx="130" cy="178" r="8" fill="#e91e63"/>
  </g>

  <!-- Wall decorations -->
  <!-- Star stickers on wall -->
  <g fill="#fdd835" opacity="0.6">
    <polygon points="170,100 173,90 176,100 186,103 176,106 173,116 170,106 160,103"/>
    <polygon points="440,120 442,113 444,120 451,122 444,124 442,131 440,124 433,122"/>
    <polygon points="480,80 482,73 484,80 491,82 484,84 482,91 480,84 473,82"/>
    <polygon points="200,200 202,193 204,200 211,202 204,204 202,211 200,204 193,202"/>
  </g>

  <!-- Poster on wall -->
  <g transform="translate(420,180)">
    <rect x="0" y="0" width="80" height="100" rx="3" fill="white" stroke="#e0e0e0" stroke-width="1"/>
    <!-- Rocket drawing -->
    <path d="M40,20 Q30,35 35,60 L45,60 Q50,35 40,20Z" fill="#e53935"/>
    <circle cx="40" cy="35" r="5" fill="#42a5f5"/>
    <polygon points="35,60 30,70 40,65 50,70 45,60" fill="#ff9800"/>
    <!-- Stars around rocket -->
    <circle cx="20" cy="30" r="2" fill="#fdd835"/>
    <circle cx="60" cy="25" r="2" fill="#fdd835"/>
    <circle cx="55" cy="50" r="1.5" fill="#fdd835"/>
    <circle cx="25" cy="55" r="1.5" fill="#fdd835"/>
  </g>

  <!-- Toys on floor -->
  <!-- Teddy bear -->
  <g transform="translate(700,620)">
    <ellipse cx="0" cy="10" rx="18" ry="20" fill="#a1887f"/>
    <circle cx="0" cy="-12" r="14" fill="#a1887f"/>
    <circle cx="-12" cy="-20" r="6" fill="#a1887f"/>
    <circle cx="12" cy="-20" r="6" fill="#a1887f"/>
    <circle cx="-12" cy="-20" r="3" fill="#8d6e63"/>
    <circle cx="12" cy="-20" r="3" fill="#8d6e63"/>
    <circle cx="-5" cy="-14" r="2" fill="#212121"/>
    <circle cx="5" cy="-14" r="2" fill="#212121"/>
    <ellipse cx="0" cy="-8" rx="4" ry="3" fill="#8d6e63"/>
    <circle cx="0" cy="-7" r="1.5" fill="#5d4037"/>
    <ellipse cx="-15" cy="5" rx="7" ry="5" fill="#a1887f" transform="rotate(-20,-15,5)"/>
    <ellipse cx="15" cy="5" rx="7" ry="5" fill="#a1887f" transform="rotate(20,15,5)"/>
  </g>

  <!-- Ball -->
  <circle cx="820" cy="650" r="15" fill="#e53935"/>
  <path d="M808,640 Q820,635 832,640" stroke="white" stroke-width="2" fill="none"/>
  <path d="M808,660 Q820,665 832,660" stroke="white" stroke-width="2" fill="none"/>

  <!-- Blocks -->
  <rect x="760" y="645" width="18" height="18" rx="2" fill="#42a5f5"/>
  <text x="769" y="659" text-anchor="middle" font-size="12" fill="white" font-family="sans-serif" font-weight="bold">A</text>
  <rect x="780" y="645" width="18" height="18" rx="2" fill="#66bb6a"/>
  <text x="789" y="659" text-anchor="middle" font-size="12" fill="white" font-family="sans-serif" font-weight="bold">B</text>

  <!-- Warm ambient light from lamp -->
  <circle cx="360" cy="400" r="200" fill="rgba(255,236,179,0.08)"/>
</svg>