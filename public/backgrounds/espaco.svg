<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1344 768">
  <defs>
    <radialGradient id="espaco-bg" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#1a1a3e"/>
      <stop offset="50%" stop-color="#0d0d2b"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <radialGradient id="espaco-nebula1" cx="0.3" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="rgba(156,39,176,0.4)"/>
      <stop offset="50%" stop-color="rgba(103,58,183,0.2)"/>
      <stop offset="100%" stop-color="rgba(103,58,183,0)"/>
    </radialGradient>
    <radialGradient id="espaco-nebula2" cx="0.7" cy="0.6" r="0.4">
      <stop offset="0%" stop-color="rgba(33,150,243,0.3)"/>
      <stop offset="50%" stop-color="rgba(63,81,181,0.15)"/>
      <stop offset="100%" stop-color="rgba(63,81,181,0)"/>
    </radialGradient>
    <radialGradient id="espaco-nebula3" cx="0.5" cy="0.3" r="0.3">
      <stop offset="0%" stop-color="rgba(233,30,99,0.25)"/>
      <stop offset="100%" stop-color="rgba(233,30,99,0)"/>
    </radialGradient>
    <radialGradient id="espaco-planet1" cx="0.35" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#e57373"/>
      <stop offset="50%" stop-color="#c62828"/>
      <stop offset="100%" stop-color="#7f0000"/>
    </radialGradient>
    <radialGradient id="espaco-planet2" cx="0.35" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#81d4fa"/>
      <stop offset="50%" stop-color="#0288d1"/>
      <stop offset="100%" stop-color="#01579b"/>
    </radialGradient>
    <radialGradient id="espaco-planet3" cx="0.35" cy="0.35" r="0.6">
      <stop offset="0%" stop-color="#fff59d"/>
      <stop offset="40%" stop-color="#f9a825"/>
      <stop offset="100%" stop-color="#e65100"/>
    </radialGradient>
    <radialGradient id="espaco-planet-ring" cx="0.5" cy="0.5" r="0.5">
      <stop offset="60%" stop-color="rgba(255,224,130,0)"/>
      <stop offset="70%" stop-color="rgba(255,224,130,0.5)"/>
      <stop offset="80%" stop-color="rgba(255,183,77,0.3)"/>
      <stop offset="90%" stop-color="rgba(255,183,77,0)"/>
    </radialGradient>
    <radialGradient id="espaco-star-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="rgba(255,255,255,0.8)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="espaco-ship-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#b0bec5"/>
      <stop offset="100%" stop-color="#546e7a"/>
    </linearGradient>
    <radialGradient id="espaco-ship-window" cx="0.4" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#80deea"/>
      <stop offset="100%" stop-color="#0097a7"/>
    </radialGradient>
    <radialGradient id="espaco-ship-thrust" cx="0.5" cy="0" r="0.8">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="30%" stop-color="#ff9800"/>
      <stop offset="60%" stop-color="#f44336"/>
      <stop offset="100%" stop-color="rgba(244,67,54,0)"/>
    </radialGradient>
    <filter id="espaco-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Deep space background -->
  <rect width="1344" height="768" fill="url(#espaco-bg)"/>

  <!-- Nebula clouds -->
  <ellipse cx="350" cy="300" rx="400" ry="250" fill="url(#espaco-nebula1)"/>
  <ellipse cx="950" cy="450" rx="350" ry="200" fill="url(#espaco-nebula2)"/>
  <ellipse cx="672" cy="200" rx="250" ry="150" fill="url(#espaco-nebula3)"/>

  <!-- Additional nebula wisps -->
  <ellipse cx="200" cy="600" rx="200" ry="100" fill="rgba(76,175,80,0.08)"/>
  <ellipse cx="1100" cy="200" rx="180" ry="120" fill="rgba(255,152,0,0.06)"/>

  <!-- Stars - small -->
  <g fill="white">
    <circle cx="50" cy="30" r="1"/>
    <circle cx="120" cy="80" r="0.8"/>
    <circle cx="200" cy="50" r="1.2"/>
    <circle cx="280" cy="120" r="0.7"/>
    <circle cx="350" cy="40" r="1"/>
    <circle cx="420" cy="90" r="0.9"/>
    <circle cx="500" cy="20" r="1.1"/>
    <circle cx="580" cy="70" r="0.8"/>
    <circle cx="650" cy="110" r="1"/>
    <circle cx="720" cy="30" r="0.7"/>
    <circle cx="800" cy="60" r="1.2"/>
    <circle cx="880" cy="100" r="0.9"/>
    <circle cx="950" cy="40" r="1"/>
    <circle cx="1030" cy="80" r="0.8"/>
    <circle cx="1100" cy="50" r="1.1"/>
    <circle cx="1180" cy="90" r="0.7"/>
    <circle cx="1250" cy="30" r="1"/>
    <circle cx="1310" cy="70" r="0.9"/>
    <circle cx="80" cy="180" r="1"/>
    <circle cx="160" cy="220" r="0.7"/>
    <circle cx="240" cy="170" r="1.1"/>
    <circle cx="330" cy="250" r="0.8"/>
    <circle cx="450" cy="200" r="1"/>
    <circle cx="560" cy="280" r="0.7"/>
    <circle cx="630" cy="230" r="0.9"/>
    <circle cx="750" cy="180" r="1.2"/>
    <circle cx="830" cy="260" r="0.8"/>
    <circle cx="920" cy="200" r="1"/>
    <circle cx="1010" cy="240" r="0.7"/>
    <circle cx="1090" cy="180" r="1.1"/>
    <circle cx="1170" cy="260" r="0.9"/>
    <circle cx="1280" cy="200" r="1"/>
    <circle cx="60" cy="350" r="0.8"/>
    <circle cx="150" cy="400" r="1"/>
    <circle cx="270" cy="380" r="0.7"/>
    <circle cx="400" cy="340" r="1.1"/>
    <circle cx="530" cy="420" r="0.9"/>
    <circle cx="680" cy="360" r="1"/>
    <circle cx="770" cy="440" r="0.8"/>
    <circle cx="890" cy="380" r="1.2"/>
    <circle cx="1020" cy="420" r="0.7"/>
    <circle cx="1130" cy="360" r="1"/>
    <circle cx="1230" cy="400" r="0.9"/>
    <circle cx="90" cy="500" r="1"/>
    <circle cx="210" cy="550" r="0.8"/>
    <circle cx="340" cy="520" r="1.1"/>
    <circle cx="480" cy="560" r="0.7"/>
    <circle cx="620" cy="510" r="1"/>
    <circle cx="760" cy="580" r="0.9"/>
    <circle cx="870" cy="530" r="1.2"/>
    <circle cx="980" cy="570" r="0.8"/>
    <circle cx="1100" cy="520" r="1"/>
    <circle cx="1220" cy="560" r="0.7"/>
    <circle cx="50" cy="650" r="1.1"/>
    <circle cx="170" cy="700" r="0.9"/>
    <circle cx="300" cy="660" r="1"/>
    <circle cx="440" cy="710" r="0.8"/>
    <circle cx="590" cy="650" r="1.2"/>
    <circle cx="730" cy="700" r="0.7"/>
    <circle cx="850" cy="660" r="1"/>
    <circle cx="970" cy="720" r="0.9"/>
    <circle cx="1110" cy="660" r="1.1"/>
    <circle cx="1250" cy="700" r="0.8"/>
    <circle cx="1320" cy="400" r="1"/>
    <circle cx="30" cy="450" r="0.9"/>
    <circle cx="1300" cy="550" r="1.1"/>
  </g>

  <!-- Bright stars with glow -->
  <g filter="url(#espaco-glow)">
    <circle cx="300" cy="150" r="2.5" fill="white"/>
    <circle cx="700" cy="80" r="3" fill="#e3f2fd"/>
    <circle cx="1050" cy="150" r="2" fill="white"/>
    <circle cx="150" cy="450" r="2.5" fill="#fff9c4"/>
    <circle cx="500" cy="500" r="2" fill="white"/>
    <circle cx="1200" cy="480" r="2.5" fill="#e3f2fd"/>
    <circle cx="900" cy="600" r="2" fill="#fff9c4"/>
    <circle cx="400" cy="680" r="2.5" fill="white"/>
  </g>

  <!-- Twinkling star shapes -->
  <g fill="white" opacity="0.9">
    <polygon points="100,300 103,293 106,300 113,303 106,306 103,313 100,306 93,303" />
    <polygon points="1200,100 1202,95 1204,100 1209,102 1204,104 1202,109 1200,104 1195,102" />
    <polygon points="600,450 603,443 606,450 613,453 606,456 603,463 600,456 593,453" />
  </g>

  <!-- Large planet with rings (Saturn-like) -->
  <g transform="translate(250,500)">
    <ellipse cx="0" cy="0" rx="120" ry="15" fill="none" stroke="rgba(255,224,130,0.4)" stroke-width="12" transform="rotate(-15)"/>
    <circle cx="0" cy="0" r="55" fill="url(#espaco-planet3)"/>
    <!-- Planet surface details -->
    <path d="M-40,-20 Q0,-25 40,-15" stroke="rgba(255,255,255,0.15)" stroke-width="8" fill="none"/>
    <path d="M-45,5 Q0,0 45,10" stroke="rgba(255,255,255,0.1)" stroke-width="6" fill="none"/>
    <path d="M-35,25 Q0,20 35,30" stroke="rgba(255,255,255,0.08)" stroke-width="5" fill="none"/>
    <!-- Ring in front -->
    <ellipse cx="0" cy="0" rx="120" ry="15" fill="none" stroke="rgba(255,224,130,0.4)" stroke-width="8" transform="rotate(-15)" clip-path="none" opacity="0.3"/>
  </g>

  <!-- Blue planet -->
  <g transform="translate(1050,350)">
    <circle cx="0" cy="0" r="40" fill="url(#espaco-planet2)"/>
    <path d="M-30,-15 Q0,-20 30,-10" stroke="rgba(255,255,255,0.15)" stroke-width="5" fill="none"/>
    <path d="M-25,10 Q0,5 25,15" stroke="rgba(255,255,255,0.1)" stroke-width="4" fill="none"/>
    <!-- Atmosphere glow -->
    <circle cx="0" cy="0" r="44" fill="none" stroke="rgba(129,212,250,0.2)" stroke-width="4"/>
  </g>

  <!-- Small red planet -->
  <g transform="translate(800,200)">
    <circle cx="0" cy="0" r="20" fill="url(#espaco-planet1)"/>
    <circle cx="-5" cy="-5" r="3" fill="rgba(0,0,0,0.2)"/>
    <circle cx="8" cy="3" r="2" fill="rgba(0,0,0,0.15)"/>
  </g>

  <!-- Distant tiny planets -->
  <circle cx="450" cy="150" r="8" fill="#a5d6a7" opacity="0.7"/>
  <circle cx="1250" cy="300" r="6" fill="#f48fb1" opacity="0.6"/>

  <!-- Spaceship -->
  <g transform="translate(950,550) rotate(-30)">
    <!-- Thrust -->
    <ellipse cx="0" cy="55" rx="10" ry="25" fill="url(#espaco-ship-thrust)"/>
    <!-- Body -->
    <path d="M-15,40 Q-18,20 -12,-10 Q0,-45 12,-10 Q18,20 15,40Z" fill="url(#espaco-ship-body)"/>
    <!-- Window -->
    <circle cx="0" cy="-5" r="7" fill="url(#espaco-ship-window)"/>
    <!-- Wings -->
    <path d="M-15,25 L-35,45 L-15,40Z" fill="#78909c"/>
    <path d="M15,25 L35,45 L15,40Z" fill="#78909c"/>
    <!-- Fin -->
    <path d="M-3,-30 L0,-45 L3,-30Z" fill="#90a4ae"/>
    <!-- Detail lines -->
    <line x1="-12" y1="10" x2="12" y2="10" stroke="#455a64" stroke-width="1"/>
    <line x1="-13" y1="25" x2="13" y2="25" stroke="#455a64" stroke-width="1"/>
  </g>

  <!-- Asteroid belt / space rocks -->
  <g fill="#8d6e63" opacity="0.6">
    <ellipse cx="100" cy="600" rx="8" ry="5" transform="rotate(30,100,600)"/>
    <ellipse cx="150" cy="630" rx="5" ry="3" transform="rotate(-20,150,630)"/>
    <ellipse cx="1300" cy="150" rx="6" ry="4" transform="rotate(45,1300,150)"/>
    <ellipse cx="1280" cy="180" rx="4" ry="3" transform="rotate(-15,1280,180)"/>
  </g>

  <!-- Shooting star -->
  <g opacity="0.7">
    <line x1="1100" y1="50" x2="1020" y2="120" stroke="white" stroke-width="2"/>
    <line x1="1100" y1="50" x2="1060" y2="85" stroke="rgba(255,255,255,0.5)" stroke-width="4"/>
    <circle cx="1020" cy="120" r="2" fill="white"/>
  </g>

  <!-- Milky way band -->
  <g opacity="0.06">
    <path d="M0,200 Q200,250 400,230 Q672,200 900,250 Q1100,280 1344,240 L1344,320 Q1100,350 900,320 Q672,280 400,310 Q200,330 0,280Z" fill="white"/>
  </g>
</svg>