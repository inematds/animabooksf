<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1344 768">
  <defs>
    <linearGradient id="circo-tent-red" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e53935"/>
      <stop offset="100%" stop-color="#c62828"/>
    </linearGradient>
    <linearGradient id="circo-tent-white" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </linearGradient>
    <linearGradient id="circo-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9a825"/>
      <stop offset="100%" stop-color="#f57f17"/>
    </linearGradient>
    <linearGradient id="circo-stage" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8d6e63"/>
      <stop offset="100%" stop-color="#5d4037"/>
    </linearGradient>
    <linearGradient id="circo-curtain-left" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7b1fa2"/>
      <stop offset="100%" stop-color="#9c27b0"/>
    </linearGradient>
    <linearGradient id="circo-curtain-right" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9c27b0"/>
      <stop offset="100%" stop-color="#7b1fa2"/>
    </linearGradient>
    <radialGradient id="circo-spotlight1" cx="0.5" cy="0" r="0.8">
      <stop offset="0%" stop-color="rgba(255,255,200,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,255,200,0)"/>
    </radialGradient>
    <radialGradient id="circo-spotlight2" cx="0.5" cy="0" r="0.8">
      <stop offset="0%" stop-color="rgba(200,220,255,0.3)"/>
      <stop offset="100%" stop-color="rgba(200,220,255,0)"/>
    </radialGradient>
    <radialGradient id="circo-bulb" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#fff9c4"/>
      <stop offset="60%" stop-color="#ffee58"/>
      <stop offset="100%" stop-color="rgba(255,238,88,0)"/>
    </radialGradient>
    <linearGradient id="circo-pole" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#bdbdbd"/>
      <stop offset="40%" stop-color="#e0e0e0"/>
      <stop offset="100%" stop-color="#9e9e9e"/>
    </linearGradient>
    <linearGradient id="circo-banner" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff9800"/>
      <stop offset="100%" stop-color="#f57c00"/>
    </linearGradient>
    <linearGradient id="circo-ring" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e53935"/>
      <stop offset="100%" stop-color="#b71c1c"/>
    </linearGradient>
  </defs>

  <!-- Tent interior background -->
  <rect width="1344" height="768" fill="#2d0a3e"/>

  <!-- Tent stripes radiating from top center -->
  <g>
    <polygon points="672,0 0,0 0,200" fill="url(#circo-tent-red)"/>
    <polygon points="672,0 0,200 0,400" fill="url(#circo-tent-white)"/>
    <polygon points="672,0 0,400 0,600" fill="url(#circo-tent-red)"/>
    <polygon points="672,0 0,600 0,768 200,768" fill="url(#circo-tent-white)"/>
    <polygon points="672,0 200,768 450,768" fill="url(#circo-tent-red)"/>
    <polygon points="672,0 450,768 672,768" fill="url(#circo-tent-white)"/>

    <polygon points="672,0 1344,0 1344,200" fill="url(#circo-tent-red)"/>
    <polygon points="672,0 1344,200 1344,400" fill="url(#circo-tent-white)"/>
    <polygon points="672,0 1344,400 1344,600" fill="url(#circo-tent-red)"/>
    <polygon points="672,0 1344,600 1344,768 1144,768" fill="url(#circo-tent-white)"/>
    <polygon points="672,0 1144,768 894,768" fill="url(#circo-tent-red)"/>
    <polygon points="672,0 894,768 672,768" fill="url(#circo-tent-white)"/>
  </g>

  <!-- Darken the tent slightly for depth -->
  <rect width="1344" height="768" fill="rgba(0,0,0,0.3)"/>

  <!-- String lights across the top -->
  <g>
    <!-- Wire -->
    <path d="M0,120 Q200,160 400,130 Q672,100 944,130 Q1144,160 1344,120" stroke="#424242" stroke-width="2" fill="none"/>
    <!-- Bulbs -->
    <circle cx="80" cy="145" r="8" fill="#e53935"/>
    <circle cx="80" cy="145" r="5" fill="url(#circo-bulb)"/>
    <circle cx="160" cy="155" r="8" fill="#42a5f5"/>
    <circle cx="160" cy="155" r="5" fill="url(#circo-bulb)"/>
    <circle cx="240" cy="152" r="8" fill="#fdd835"/>
    <circle cx="240" cy="152" r="5" fill="url(#circo-bulb)"/>
    <circle cx="320" cy="142" r="8" fill="#66bb6a"/>
    <circle cx="320" cy="142" r="5" fill="url(#circo-bulb)"/>
    <circle cx="400" cy="132" r="8" fill="#e53935"/>
    <circle cx="400" cy="132" r="5" fill="url(#circo-bulb)"/>
    <circle cx="480" cy="118" r="8" fill="#ab47bc"/>
    <circle cx="480" cy="118" r="5" fill="url(#circo-bulb)"/>
    <circle cx="560" cy="108" r="8" fill="#ff9800"/>
    <circle cx="560" cy="108" r="5" fill="url(#circo-bulb)"/>
    <circle cx="640" cy="102" r="8" fill="#42a5f5"/>
    <circle cx="640" cy="102" r="5" fill="url(#circo-bulb)"/>
    <circle cx="720" cy="103" r="8" fill="#e53935"/>
    <circle cx="720" cy="103" r="5" fill="url(#circo-bulb)"/>
    <circle cx="800" cy="110" r="8" fill="#fdd835"/>
    <circle cx="800" cy="110" r="5" fill="url(#circo-bulb)"/>
    <circle cx="880" cy="120" r="8" fill="#66bb6a"/>
    <circle cx="880" cy="120" r="5" fill="url(#circo-bulb)"/>
    <circle cx="960" cy="133" r="8" fill="#ab47bc"/>
    <circle cx="960" cy="133" r="5" fill="url(#circo-bulb)"/>
    <circle cx="1040" cy="142" r="8" fill="#ff9800"/>
    <circle cx="1040" cy="142" r="5" fill="url(#circo-bulb)"/>
    <circle cx="1120" cy="152" r="8" fill="#42a5f5"/>
    <circle cx="1120" cy="152" r="5" fill="url(#circo-bulb)"/>
    <circle cx="1200" cy="155" r="8" fill="#e53935"/>
    <circle cx="1200" cy="155" r="5" fill="url(#circo-bulb)"/>
    <circle cx="1280" cy="140" r="8" fill="#fdd835"/>
    <circle cx="1280" cy="140" r="5" fill="url(#circo-bulb)"/>
  </g>

  <!-- Second string of lights -->
  <g>
    <path d="M0,200 Q300,240 672,210 Q1044,180 1344,220" stroke="#424242" stroke-width="1.5" fill="none"/>
    <circle cx="120" cy="222" r="6" fill="#ff9800"/>
    <circle cx="120" cy="222" r="3.5" fill="url(#circo-bulb)"/>
    <circle cx="270" cy="235" r="6" fill="#e91e63"/>
    <circle cx="270" cy="235" r="3.5" fill="url(#circo-bulb)"/>
    <circle cx="420" cy="230" r="6" fill="#66bb6a"/>
    <circle cx="420" cy="230" r="3.5" fill="url(#circo-bulb)"/>
    <circle cx="570" cy="218" r="6" fill="#42a5f5"/>
    <circle cx="570" cy="218" r="3.5" fill="url(#circo-bulb)"/>
    <circle cx="720" cy="212" r="6" fill="#fdd835"/>
    <circle cx="720" cy="212" r="3.5" fill="url(#circo-bulb)"/>
    <circle cx="870" cy="200" r="6" fill="#e53935"/>
    <circle cx="870" cy="200" r="3.5" fill="url(#circo-bulb)"/>
    <circle cx="1020" cy="208" r="6" fill="#ab47bc"/>
    <circle cx="1020" cy="208" r="3.5" fill="url(#circo-bulb)"/>
    <circle cx="1170" cy="220" r="6" fill="#ff9800"/>
    <circle cx="1170" cy="220" r="3.5" fill="url(#circo-bulb)"/>
  </g>

  <!-- Ground / arena floor -->
  <ellipse cx="672" cy="650" rx="600" ry="120" fill="url(#circo-ground)"/>
  <rect x="72" y="640" width="1200" height="128" fill="url(#circo-ground)"/>

  <!-- Stage / ring -->
  <ellipse cx="672" cy="580" rx="300" ry="60" fill="url(#circo-ring)"/>
  <ellipse cx="672" cy="580" rx="300" ry="60" stroke="#ffd54f" stroke-width="4" fill="none"/>
  <ellipse cx="672" cy="580" rx="280" ry="55" stroke="#ffd54f" stroke-width="2" fill="none"/>
  <!-- Ring floor -->
  <ellipse cx="672" cy="580" rx="270" ry="50" fill="#f9a825" opacity="0.3"/>

  <!-- Center pole -->
  <rect x="665" y="0" width="14" height="580" fill="url(#circo-pole)"/>
  <!-- Pole top decoration -->
  <polygon points="672,-10 660,10 684,10" fill="#fdd835"/>
  <circle cx="672" cy="-10" r="8" fill="#fdd835"/>

  <!-- Curtains on sides -->
  <!-- Left curtain -->
  <path d="M0,0 Q20,100 15,250 Q10,350 30,500 Q35,550 0,600 L0,0Z" fill="url(#circo-curtain-left)"/>
  <path d="M0,0 Q40,80 35,200 Q30,300 50,450 Q55,500 30,550 L20,500 Q40,350 35,250 Q30,150 15,50Z" fill="#6a1b9a" opacity="0.5"/>
  <!-- Curtain ties -->
  <ellipse cx="25" cy="300" rx="15" ry="8" fill="#ffd54f"/>

  <!-- Right curtain -->
  <path d="M1344,0 Q1324,100 1329,250 Q1334,350 1314,500 Q1309,550 1344,600 L1344,0Z" fill="url(#circo-curtain-right)"/>
  <path d="M1344,0 Q1304,80 1309,200 Q1314,300 1294,450 Q1289,500 1314,550 L1324,500 Q1304,350 1309,250 Q1314,150 1329,50Z" fill="#6a1b9a" opacity="0.5"/>
  <ellipse cx="1319" cy="300" rx="15" ry="8" fill="#ffd54f"/>

  <!-- Curtain valance at top -->
  <path d="M0,0 L1344,0 L1344,60 Q1200,90 1050,70 Q900,50 750,80 Q600,100 450,70 Q300,40 150,75 Q50,95 0,70Z" fill="#7b1fa2"/>
  <path d="M0,60 Q150,90 300,60 Q450,30 600,65 Q750,95 900,60 Q1050,25 1200,60 Q1300,80 1344,60" stroke="#ffd54f" stroke-width="3" fill="none"/>

  <!-- Tassel decorations -->
  <g fill="#ffd54f">
    <polygon points="150,80 145,100 155,100"/>
    <polygon points="450,70 445,90 455,90"/>
    <polygon points="750,85 745,105 755,105"/>
    <polygon points="1050,65 1045,85 1055,85"/>
  </g>

  <!-- Spotlights -->
  <ellipse cx="500" cy="400" rx="200" ry="300" fill="url(#circo-spotlight1)"/>
  <ellipse cx="850" cy="400" rx="200" ry="300" fill="url(#circo-spotlight2)"/>

  <!-- Bunting / triangle flags -->
  <g>
    <path d="M100,280 Q400,320 672,290 Q944,260 1244,300" stroke="#ffd54f" stroke-width="2" fill="none"/>
    <polygon points="200,295 220,295 210,320" fill="#e53935"/>
    <polygon points="300,305 320,305 310,330" fill="#42a5f5"/>
    <polygon points="400,310 420,310 410,335" fill="#fdd835"/>
    <polygon points="500,305 520,305 510,330" fill="#66bb6a"/>
    <polygon points="600,295 620,295 610,320" fill="#ab47bc"/>
    <polygon points="700,290 720,290 710,315" fill="#ff9800"/>
    <polygon points="800,285 820,285 810,310" fill="#e53935"/>
    <polygon points="900,280 920,280 910,305" fill="#42a5f5"/>
    <polygon points="1000,282 1020,282 1010,307" fill="#fdd835"/>
    <polygon points="1100,290 1120,290 1110,315" fill="#66bb6a"/>
  </g>

  <!-- Circus props -->
  <!-- Drum on stage -->
  <g transform="translate(550,540)">
    <ellipse cx="30" cy="40" rx="30" ry="10" fill="#e53935"/>
    <rect x="0" y="0" width="60" height="40" fill="#e53935"/>
    <ellipse cx="30" cy="0" rx="30" ry="10" fill="#ef5350"/>
    <!-- Zigzag pattern -->
    <path d="M0,10 L10,25 L20,10 L30,25 L40,10 L50,25 L60,10" stroke="#ffd54f" stroke-width="2" fill="none"/>
    <path d="M0,30 L10,15 L20,30 L30,15 L40,30 L50,15 L60,30" stroke="#ffd54f" stroke-width="2" fill="none"/>
  </g>

  <!-- Ball on stage -->
  <circle cx="800" cy="560" r="20" fill="#42a5f5"/>
  <path d="M783,548 Q800,540 817,548" stroke="white" stroke-width="2.5" fill="none"/>
  <path d="M783,572 Q800,580 817,572" stroke="white" stroke-width="2.5" fill="none"/>
  <line x1="800" y1="540" x2="800" y2="580" stroke="white" stroke-width="2"/>

  <!-- Pedestal -->
  <g transform="translate(640,500)">
    <rect x="0" y="20" width="60" height="40" rx="3" fill="#ffd54f"/>
    <rect x="-5" y="20" width="70" height="8" rx="3" fill="#ffb300"/>
    <rect x="-5" y="52" width="70" height="8" rx="3" fill="#ffb300"/>
    <!-- Star decoration -->
    <polygon points="30,35 33,28 36,35 43,37 36,39 33,46 30,39 23,37" fill="white" opacity="0.7"/>
  </g>

  <!-- Seats in background (audience area) -->
  <g opacity="0.4">
    <!-- Left bleachers -->
    <rect x="50" y="500" width="250" height="20" rx="3" fill="#5d4037"/>
    <rect x="40" y="470" width="230" height="20" rx="3" fill="#6d4c41"/>
    <rect x="30" y="440" width="210" height="20" rx="3" fill="#795548"/>

    <!-- Right bleachers -->
    <rect x="1044" y="500" width="250" height="20" rx="3" fill="#5d4037"/>
    <rect x="1074" y="470" width="230" height="20" rx="3" fill="#6d4c41"/>
    <rect x="1104" y="440" width="210" height="20" rx="3" fill="#795548"/>
  </g>

  <!-- Confetti -->
  <g opacity="0.6">
    <rect x="200" cy="300" width="6" height="10" fill="#e53935" transform="rotate(30,203,305)"/>
    <rect x="350" cy="250" width="5" height="8" fill="#42a5f5" transform="rotate(-20,352,254)"/>
    <rect x="500" cy="200" width="6" height="10" fill="#fdd835" transform="rotate(45,503,205)"/>
    <rect x="650" cy="230" width="5" height="8" fill="#66bb6a" transform="rotate(-35,652,234)"/>
    <rect x="800" cy="270" width="6" height="10" fill="#ab47bc" transform="rotate(15,803,275)"/>
    <rect x="950" cy="220" width="5" height="8" fill="#ff9800" transform="rotate(-40,952,224)"/>
    <rect x="1100" cy="280" width="6" height="10" fill="#e91e63" transform="rotate(25,1103,285)"/>
    <circle cx="250" cy="350" r="3" fill="#fdd835"/>
    <circle cx="400" cy="300" r="2.5" fill="#e53935"/>
    <circle cx="550" cy="250" r="3" fill="#66bb6a"/>
    <circle cx="750" cy="320" r="2.5" fill="#42a5f5"/>
    <circle cx="900" cy="280" r="3" fill="#ff9800"/>
    <circle cx="1050" cy="330" r="2.5" fill="#ab47bc"/>
    <circle cx="1200" cy="350" r="3" fill="#e53935"/>
  </g>

  <!-- Star decorations at top -->
  <g fill="#ffd54f" opacity="0.7">
    <polygon points="300,50 304,38 308,50 320,54 308,58 304,70 300,58 288,54"/>
    <polygon points="1050,45 1053,36 1056,45 1065,48 1056,51 1053,60 1050,51 1041,48"/>
    <polygon points="672,25 676,13 680,25 692,29 680,33 676,45 672,33 660,29"/>
  </g>
</svg>