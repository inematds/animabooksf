<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1344 768">
  <defs>
    <linearGradient id="parque-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#64b5f6"/>
      <stop offset="100%" stop-color="#e3f2fd"/>
    </linearGradient>
    <linearGradient id="parque-grass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66bb6a"/>
      <stop offset="100%" stop-color="#43a047"/>
    </linearGradient>
    <linearGradient id="parque-path" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d7ccc8"/>
      <stop offset="100%" stop-color="#bcaaa4"/>
    </linearGradient>
    <linearGradient id="parque-trunk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5d4037"/>
      <stop offset="50%" stop-color="#795548"/>
      <stop offset="100%" stop-color="#4e342e"/>
    </linearGradient>
    <radialGradient id="parque-canopy1" cx="0.4" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#81c784"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </radialGradient>
    <radialGradient id="parque-canopy2" cx="0.4" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#a5d6a7"/>
      <stop offset="100%" stop-color="#388e3c"/>
    </radialGradient>
    <linearGradient id="parque-slide" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42a5f5"/>
      <stop offset="100%" stop-color="#1e88e5"/>
    </linearGradient>
    <linearGradient id="parque-swing-frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef6c00"/>
      <stop offset="100%" stop-color="#e65100"/>
    </linearGradient>
    <linearGradient id="parque-bench" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8d6e63"/>
      <stop offset="100%" stop-color="#6d4c41"/>
    </linearGradient>
    <radialGradient id="parque-pond" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#4fc3f7"/>
      <stop offset="100%" stop-color="#0288d1"/>
    </radialGradient>
  </defs>

  <!-- Sky -->
  <rect width="1344" height="768" fill="url(#parque-sky)"/>

  <!-- Clouds -->
  <g fill="white" opacity="0.85">
    <ellipse cx="180" cy="80" rx="85" ry="32"/>
    <ellipse cx="230" cy="70" rx="60" ry="26"/>
    <ellipse cx="140" cy="75" rx="50" ry="22"/>

    <ellipse cx="650" cy="50" rx="70" ry="28"/>
    <ellipse cx="700" cy="42" rx="55" ry="22"/>
    <ellipse cx="610" cy="46" rx="45" ry="20"/>

    <ellipse cx="1050" cy="70" rx="75" ry="30"/>
    <ellipse cx="1100" cy="62" rx="55" ry="24"/>
    <ellipse cx="1010" cy="66" rx="48" ry="20"/>
  </g>

  <!-- Grass ground -->
  <path d="M0,420 Q200,400 400,415 Q672,430 900,410 Q1100,400 1344,420 L1344,768 L0,768Z" fill="url(#parque-grass)"/>

  <!-- Far trees -->
  <g opacity="0.5">
    <rect x="30" y="300" width="15" height="120" fill="#5d4037"/>
    <circle cx="37" cy="290" r="40" fill="#2e7d32"/>
    <rect x="120" y="280" width="14" height="140" fill="#5d4037"/>
    <circle cx="127" cy="270" r="45" fill="#388e3c"/>
    <rect x="1200" y="290" width="15" height="130" fill="#5d4037"/>
    <circle cx="1207" cy="280" r="42" fill="#2e7d32"/>
    <rect x="1300" y="310" width="14" height="110" fill="#5d4037"/>
    <circle cx="1307" cy="300" r="38" fill="#388e3c"/>
  </g>

  <!-- Path winding through park -->
  <path d="M0,600 Q150,580 300,590 Q500,610 672,580 Q850,560 1000,580 Q1200,600 1344,590 L1344,640 Q1200,650 1000,630 Q850,610 672,630 Q500,660 300,640 Q150,630 0,650Z" fill="url(#parque-path)"/>

  <!-- Large trees -->
  <!-- Left tree -->
  <rect x="180" y="300" width="20" height="150" fill="url(#parque-trunk)"/>
  <circle cx="190" cy="280" r="55" fill="url(#parque-canopy1)"/>
  <circle cx="170" cy="300" r="40" fill="#43a047"/>
  <circle cx="215" cy="295" r="38" fill="#388e3c"/>

  <!-- Center-left tree -->
  <rect x="470" y="280" width="22" height="160" fill="url(#parque-trunk)"/>
  <circle cx="481" cy="260" r="60" fill="url(#parque-canopy2)"/>
  <circle cx="460" cy="280" r="42" fill="#4caf50"/>
  <circle cx="505" cy="275" r="40" fill="#43a047"/>

  <!-- Right tree -->
  <rect x="1050" y="290" width="20" height="140" fill="url(#parque-trunk)"/>
  <circle cx="1060" cy="270" r="55" fill="url(#parque-canopy1)"/>
  <circle cx="1040" cy="290" r="40" fill="#43a047"/>
  <circle cx="1085" cy="285" r="38" fill="#388e3c"/>

  <!-- Playground - Slide -->
  <g transform="translate(700,370)">
    <!-- Platform -->
    <rect x="0" y="10" width="50" height="5" fill="#ef6c00"/>
    <!-- Ladder -->
    <line x1="5" y1="15" x2="5" y2="80" stroke="#ef6c00" stroke-width="3"/>
    <line x1="25" y1="15" x2="25" y2="80" stroke="#ef6c00" stroke-width="3"/>
    <line x1="5" y1="30" x2="25" y2="30" stroke="#ef6c00" stroke-width="2"/>
    <line x1="5" y1="45" x2="25" y2="45" stroke="#ef6c00" stroke-width="2"/>
    <line x1="5" y1="60" x2="25" y2="60" stroke="#ef6c00" stroke-width="2"/>
    <!-- Slide chute -->
    <path d="M50,10 Q90,30 100,80" stroke="url(#parque-slide)" stroke-width="8" fill="none" stroke-linecap="round"/>
    <!-- Side rails -->
    <path d="M48,6 Q88,26 98,76" stroke="#1976d2" stroke-width="2" fill="none"/>
    <path d="M52,14 Q92,34 102,84" stroke="#1976d2" stroke-width="2" fill="none"/>
    <!-- Support posts -->
    <line x1="0" y1="15" x2="0" y2="80" stroke="#ef6c00" stroke-width="4"/>
    <line x1="50" y1="15" x2="50" y2="80" stroke="#ef6c00" stroke-width="4"/>
  </g>

  <!-- Swings -->
  <g transform="translate(880,350)">
    <!-- Frame -->
    <line x1="0" y1="0" x2="30" y2="100" stroke="url(#parque-swing-frame)" stroke-width="5"/>
    <line x1="120" y1="0" x2="90" y2="100" stroke="url(#parque-swing-frame)" stroke-width="5"/>
    <line x1="0" y1="0" x2="120" y2="0" stroke="url(#parque-swing-frame)" stroke-width="5"/>
    <!-- Swing 1 -->
    <line x1="40" y1="0" x2="35" y2="70" stroke="#757575" stroke-width="2"/>
    <line x1="55" y1="0" x2="50" y2="70" stroke="#757575" stroke-width="2"/>
    <rect x="32" y="70" width="21" height="5" rx="2" fill="#5d4037"/>
    <!-- Swing 2 -->
    <line x1="70" y1="0" x2="75" y2="70" stroke="#757575" stroke-width="2"/>
    <line x1="85" y1="0" x2="90" y2="70" stroke="#757575" stroke-width="2"/>
    <rect x="72" y="70" width="21" height="5" rx="2" fill="#5d4037"/>
  </g>

  <!-- See-saw -->
  <g transform="translate(560,465)">
    <polygon points="25,0 30,15 20,15" fill="#757575"/>
    <rect x="-20" y="-4" width="90" height="5" rx="2" fill="#e53935" transform="rotate(-5,25,0)"/>
    <circle cx="0" cy="-6" r="4" fill="#ef5350"/>
    <circle cx="50" cy="2" r="4" fill="#ef5350"/>
  </g>

  <!-- Bench -->
  <g transform="translate(300,520)">
    <rect x="0" y="0" width="80" height="8" rx="2" fill="url(#parque-bench)"/>
    <rect x="0" y="12" width="80" height="8" rx="2" fill="url(#parque-bench)"/>
    <!-- Back rest -->
    <rect x="0" y="-25" width="80" height="8" rx="2" fill="url(#parque-bench)"/>
    <rect x="0" y="-15" width="80" height="8" rx="2" fill="url(#parque-bench)"/>
    <!-- Legs -->
    <rect x="5" y="-28" width="5" height="50" rx="1" fill="#4e342e"/>
    <rect x="70" y="-28" width="5" height="50" rx="1" fill="#4e342e"/>
  </g>

  <!-- Another bench -->
  <g transform="translate(1100,530)">
    <rect x="0" y="0" width="70" height="7" rx="2" fill="url(#parque-bench)"/>
    <rect x="0" y="10" width="70" height="7" rx="2" fill="url(#parque-bench)"/>
    <rect x="0" y="-22" width="70" height="7" rx="2" fill="url(#parque-bench)"/>
    <rect x="0" y="-13" width="70" height="7" rx="2" fill="url(#parque-bench)"/>
    <rect x="5" y="-25" width="4" height="45" rx="1" fill="#4e342e"/>
    <rect x="61" y="-25" width="4" height="45" rx="1" fill="#4e342e"/>
  </g>

  <!-- Small pond -->
  <ellipse cx="200" cy="680" rx="90" ry="35" fill="url(#parque-pond)" opacity="0.7"/>
  <ellipse cx="200" cy="675" rx="60" ry="20" fill="rgba(255,255,255,0.15)"/>
  <!-- Ducks -->
  <g transform="translate(180,670)">
    <ellipse cx="0" cy="0" rx="8" ry="5" fill="#fff9c4"/>
    <circle cx="-7" cy="-3" r="4" fill="#fff9c4"/>
    <polygon points="-11,-3 -15,-2 -11,-1" fill="#ff9800"/>
    <circle cx="-8" cy="-4" r="1" fill="#212121"/>
  </g>
  <g transform="translate(220,680)">
    <ellipse cx="0" cy="0" rx="6" ry="4" fill="#fff9c4"/>
    <circle cx="-5" cy="-2" r="3" fill="#fff9c4"/>
    <polygon points="-8,-2 -11,-1 -8,0" fill="#ff9800"/>
    <circle cx="-6" cy="-3" r="0.8" fill="#212121"/>
  </g>

  <!-- Flowers -->
  <g>
    <!-- Cluster 1 -->
    <circle cx="420" cy="550" r="5" fill="#e91e63"/>
    <circle cx="428" cy="548" r="4" fill="#f06292"/>
    <circle cx="415" cy="546" r="4.5" fill="#ec407a"/>
    <circle cx="420" cy="546" r="2" fill="#ffeb3b"/>

    <!-- Cluster 2 -->
    <circle cx="640" cy="560" r="5" fill="#ab47bc"/>
    <circle cx="648" cy="558" r="4" fill="#ce93d8"/>
    <circle cx="635" cy="556" r="4.5" fill="#ba68c8"/>
    <circle cx="640" cy="556" r="2" fill="#fff176"/>

    <!-- Cluster 3 -->
    <circle cx="950" cy="545" r="5" fill="#ffeb3b"/>
    <circle cx="958" cy="543" r="4" fill="#fdd835"/>
    <circle cx="945" cy="541" r="4.5" fill="#ffee58"/>
    <circle cx="950" cy="541" r="2" fill="#ff9800"/>

    <!-- Cluster 4 -->
    <circle cx="1200" cy="560" r="5" fill="#e53935"/>
    <circle cx="1208" cy="558" r="4" fill="#ef5350"/>
    <circle cx="1195" cy="556" r="4.5" fill="#e57373"/>
    <circle cx="1200" cy="556" r="2" fill="#ffeb3b"/>

    <!-- Dandelions -->
    <line x1="380" y1="555" x2="380" y2="535" stroke="#66bb6a" stroke-width="1.5"/>
    <circle cx="380" cy="533" r="5" fill="white" opacity="0.8"/>

    <line x1="980" y1="550" x2="980" y2="530" stroke="#66bb6a" stroke-width="1.5"/>
    <circle cx="980" cy="528" r="5" fill="white" opacity="0.8"/>
  </g>

  <!-- Kite in the sky -->
  <g transform="translate(850,150)">
    <polygon points="0,-30 20,0 0,30 -20,0" fill="#e53935"/>
    <polygon points="0,-30 20,0 0,0" fill="#ff7043"/>
    <polygon points="0,0 0,30 -20,0" fill="#ff7043"/>
    <line x1="0" y1="0" x2="0" y2="-30" stroke="#212121" stroke-width="0.5"/>
    <line x1="-20" y1="0" x2="20" y2="0" stroke="#212121" stroke-width="0.5"/>
    <!-- Tail -->
    <path d="M0,30 Q10,45 5,55 Q-5,65 0,75 Q10,85 5,95" stroke="#1976d2" stroke-width="1.5" fill="none"/>
    <!-- Bows on tail -->
    <polygon points="3,50 8,47 8,53" fill="#fdd835"/>
    <polygon points="-1,75 4,72 4,78" fill="#66bb6a"/>
    <!-- String -->
    <path d="M0,30 Q50,200 100,350" stroke="#9e9e9e" stroke-width="0.8" fill="none" opacity="0.5"/>
  </g>

  <!-- Butterflies -->
  <g opacity="0.8">
    <g transform="translate(500,430)">
      <ellipse cx="-6" cy="-3" rx="6" ry="4" fill="#ff9800" transform="rotate(-20)"/>
      <ellipse cx="6" cy="-3" rx="6" ry="4" fill="#ff9800" transform="rotate(20)"/>
      <rect x="-0.5" y="-4" width="1" height="8" fill="#5d4037"/>
    </g>
    <g transform="translate(900,470)">
      <ellipse cx="-6" cy="-3" rx="6" ry="4" fill="#7c4dff" transform="rotate(-15)"/>
      <ellipse cx="6" cy="-3" rx="6" ry="4" fill="#7c4dff" transform="rotate(15)"/>
      <rect x="-0.5" y="-4" width="1" height="8" fill="#5d4037"/>
    </g>
  </g>

  <!-- Lamp post near bench -->
  <g>
    <rect x="278" y="440" width="5" height="100" fill="#37474f" rx="1"/>
    <path d="M270,440 Q280,430 290,440" stroke="#37474f" stroke-width="3" fill="none"/>
    <ellipse cx="280" cy="437" rx="8" ry="5" fill="#455a64"/>
    <circle cx="280" cy="434" r="4" fill="#fff9c4" opacity="0.5"/>
  </g>
</svg>