<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1344 768">
  <defs>
    <linearGradient id="floresta-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a472a"/>
      <stop offset="40%" stop-color="#2d6e3f"/>
      <stop offset="100%" stop-color="#4a9e5c"/>
    </linearGradient>
    <linearGradient id="floresta-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2e7d32"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </linearGradient>
    <linearGradient id="floresta-trunk1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4e342e"/>
      <stop offset="50%" stop-color="#6d4c41"/>
      <stop offset="100%" stop-color="#3e2723"/>
    </linearGradient>
    <linearGradient id="floresta-trunk2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#5d4037"/>
      <stop offset="50%" stop-color="#795548"/>
      <stop offset="100%" stop-color="#4e342e"/>
    </linearGradient>
    <linearGradient id="floresta-canopy1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#388e3c"/>
      <stop offset="100%" stop-color="#1b5e20"/>
    </linearGradient>
    <linearGradient id="floresta-canopy2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#43a047"/>
      <stop offset="100%" stop-color="#2e7d32"/>
    </linearGradient>
    <linearGradient id="floresta-canopy3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#66bb6a"/>
      <stop offset="100%" stop-color="#388e3c"/>
    </linearGradient>
    <radialGradient id="floresta-sunbeam" cx="0.5" cy="0" r="0.8">
      <stop offset="0%" stop-color="rgba(255,255,200,0.3)"/>
      <stop offset="100%" stop-color="rgba(255,255,200,0)"/>
    </radialGradient>
    <radialGradient id="floresta-firefly" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="rgba(255,255,150,0.9)"/>
      <stop offset="60%" stop-color="rgba(255,255,100,0.4)"/>
      <stop offset="100%" stop-color="rgba(255,255,100,0)"/>
    </radialGradient>
    <radialGradient id="floresta-mushroom-cap" cx="0.5" cy="0.3" r="0.6">
      <stop offset="0%" stop-color="#ef5350"/>
      <stop offset="100%" stop-color="#c62828"/>
    </radialGradient>
    <linearGradient id="floresta-moss" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81c784"/>
      <stop offset="100%" stop-color="#4caf50"/>
    </linearGradient>
    <linearGradient id="floresta-path" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8d6e63"/>
      <stop offset="100%" stop-color="#6d4c41"/>
    </linearGradient>
    <filter id="floresta-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Sky / deep forest background -->
  <rect width="1344" height="768" fill="url(#floresta-sky)"/>

  <!-- Sunbeams filtering through -->
  <ellipse cx="672" cy="0" rx="800" ry="500" fill="url(#floresta-sunbeam)"/>
  <polygon points="400,0 350,400 450,400" fill="rgba(255,255,200,0.08)"/>
  <polygon points="700,0 660,500 740,500" fill="rgba(255,255,200,0.06)"/>
  <polygon points="1000,0 970,450 1030,450" fill="rgba(255,255,200,0.07)"/>
  <polygon points="200,0 180,350 220,350" fill="rgba(255,255,200,0.05)"/>

  <!-- Ground -->
  <ellipse cx="672" cy="850" rx="900" ry="250" fill="url(#floresta-ground)"/>
  <rect x="0" y="620" width="1344" height="148" fill="url(#floresta-ground)"/>

  <!-- Dirt path -->
  <path d="M500,768 Q550,700 580,650 Q620,600 672,580 Q730,600 770,650 Q800,700 850,768Z" fill="url(#floresta-path)" opacity="0.7"/>

  <!-- Far background trees -->
  <g opacity="0.4">
    <rect x="50" y="200" width="30" height="420" fill="#3e2723"/>
    <ellipse cx="65" cy="200" rx="60" ry="120" fill="#1b5e20"/>
    <rect x="200" y="180" width="25" height="440" fill="#3e2723"/>
    <ellipse cx="212" cy="180" rx="55" ry="110" fill="#2e7d32"/>
    <rect x="1100" y="190" width="28" height="430" fill="#3e2723"/>
    <ellipse cx="1114" cy="190" rx="58" ry="115" fill="#1b5e20"/>
    <rect x="1250" y="210" width="26" height="410" fill="#3e2723"/>
    <ellipse cx="1263" cy="210" rx="50" ry="100" fill="#2e7d32"/>
  </g>

  <!-- Mid trees -->
  <g opacity="0.7">
    <rect x="130" y="150" width="40" height="470" fill="url(#floresta-trunk2)"/>
    <ellipse cx="150" cy="150" rx="80" ry="130" fill="url(#floresta-canopy1)"/>
    <rect x="350" y="120" width="45" height="500" fill="url(#floresta-trunk1)"/>
    <ellipse cx="372" cy="120" rx="90" ry="140" fill="url(#floresta-canopy2)"/>
    <rect x="950" y="130" width="42" height="490" fill="url(#floresta-trunk2)"/>
    <ellipse cx="971" cy="130" rx="85" ry="135" fill="url(#floresta-canopy1)"/>
    <rect x="1180" y="160" width="38" height="460" fill="url(#floresta-trunk1)"/>
    <ellipse cx="1199" cy="160" rx="75" ry="125" fill="url(#floresta-canopy2)"/>
  </g>

  <!-- Foreground large trees -->
  <!-- Left tree -->
  <rect x="20" y="100" width="60" height="668" fill="url(#floresta-trunk1)"/>
  <ellipse cx="50" cy="100" rx="120" ry="160" fill="url(#floresta-canopy3)"/>
  <ellipse cx="30" cy="60" rx="90" ry="120" fill="url(#floresta-canopy1)"/>
  <!-- Roots -->
  <path d="M20,680 Q-20,700 -30,768" stroke="#4e342e" stroke-width="12" fill="none"/>
  <path d="M80,680 Q120,720 130,768" stroke="#4e342e" stroke-width="10" fill="none"/>

  <!-- Right tree -->
  <rect x="1220" y="80" width="55" height="688" fill="url(#floresta-trunk2)"/>
  <ellipse cx="1247" cy="80" rx="110" ry="150" fill="url(#floresta-canopy3)"/>
  <ellipse cx="1270" cy="50" rx="85" ry="110" fill="url(#floresta-canopy1)"/>
  <path d="M1220,690 Q1190,720 1180,768" stroke="#5d4037" stroke-width="11" fill="none"/>
  <path d="M1275,690 Q1310,730 1344,750" stroke="#5d4037" stroke-width="10" fill="none"/>

  <!-- Center-left tree -->
  <rect x="480" y="200" width="50" height="420" fill="url(#floresta-trunk1)"/>
  <ellipse cx="505" cy="200" rx="95" ry="145" fill="url(#floresta-canopy2)"/>
  <ellipse cx="485" cy="160" rx="70" ry="100" fill="url(#floresta-canopy3)"/>

  <!-- Center-right tree -->
  <rect x="830" y="180" width="48" height="440" fill="url(#floresta-trunk2)"/>
  <ellipse cx="854" cy="180" rx="90" ry="140" fill="url(#floresta-canopy1)"/>
  <ellipse cx="870" cy="145" rx="65" ry="95" fill="url(#floresta-canopy3)"/>

  <!-- Moss on trunks -->
  <ellipse cx="35" cy="500" rx="15" ry="40" fill="url(#floresta-moss)" opacity="0.6"/>
  <ellipse cx="1235" cy="480" rx="13" ry="35" fill="url(#floresta-moss)" opacity="0.6"/>
  <ellipse cx="495" cy="450" rx="12" ry="30" fill="url(#floresta-moss)" opacity="0.5"/>

  <!-- Mushrooms -->
  <g transform="translate(300,680)">
    <rect x="8" y="15" width="8" height="20" rx="2" fill="#f5f5f5"/>
    <ellipse cx="12" cy="15" rx="16" ry="12" fill="url(#floresta-mushroom-cap)"/>
    <circle cx="6" cy="12" r="2.5" fill="rgba(255,255,255,0.8)"/>
    <circle cx="15" cy="9" r="2" fill="rgba(255,255,255,0.8)"/>
    <circle cx="11" cy="16" r="1.5" fill="rgba(255,255,255,0.8)"/>
  </g>
  <g transform="translate(320,690)">
    <rect x="5" y="10" width="6" height="15" rx="2" fill="#f5f5f5"/>
    <ellipse cx="8" cy="10" rx="12" ry="9" fill="url(#floresta-mushroom-cap)"/>
    <circle cx="4" cy="8" r="2" fill="rgba(255,255,255,0.8)"/>
    <circle cx="11" cy="7" r="1.5" fill="rgba(255,255,255,0.8)"/>
  </g>

  <g transform="translate(900,700)">
    <rect x="8" y="15" width="8" height="18" rx="2" fill="#f5f5f5"/>
    <ellipse cx="12" cy="15" rx="15" ry="11" fill="url(#floresta-mushroom-cap)"/>
    <circle cx="7" cy="12" r="2" fill="rgba(255,255,255,0.8)"/>
    <circle cx="14" cy="10" r="2.5" fill="rgba(255,255,255,0.8)"/>
  </g>

  <!-- Blue mushrooms -->
  <g transform="translate(650,710)">
    <rect x="6" y="12" width="6" height="14" rx="2" fill="#e0e0e0"/>
    <ellipse cx="9" cy="12" rx="13" ry="10" fill="#5c6bc0"/>
    <circle cx="5" cy="10" r="2" fill="rgba(255,255,255,0.6)"/>
    <circle cx="12" cy="8" r="1.5" fill="rgba(255,255,255,0.6)"/>
  </g>

  <!-- Ferns and plants on ground -->
  <g fill="#4caf50" opacity="0.8">
    <path d="M100,730 Q120,700 110,670 Q130,700 140,730Z"/>
    <path d="M115,730 Q135,695 125,660 Q145,695 155,730Z"/>
    <path d="M250,740 Q270,710 260,680 Q280,710 290,740Z"/>
    <path d="M1050,725 Q1070,695 1060,665 Q1080,695 1090,725Z"/>
    <path d="M1065,730 Q1085,700 1075,670 Q1095,700 1105,730Z"/>
    <path d="M750,735 Q770,705 760,675 Q780,705 790,735Z"/>
  </g>

  <!-- Flowers -->
  <g>
    <circle cx="200" cy="720" r="5" fill="#e91e63"/>
    <circle cx="195" cy="716" r="4" fill="#f06292"/>
    <circle cx="205" cy="716" r="4" fill="#f06292"/>
    <circle cx="200" cy="720" r="2.5" fill="#ffeb3b"/>

    <circle cx="600" cy="730" r="4" fill="#ab47bc"/>
    <circle cx="596" cy="727" r="3" fill="#ce93d8"/>
    <circle cx="604" cy="727" r="3" fill="#ce93d8"/>
    <circle cx="600" cy="730" r="2" fill="#fff176"/>

    <circle cx="1100" cy="715" r="5" fill="#e91e63"/>
    <circle cx="1095" cy="711" r="4" fill="#f06292"/>
    <circle cx="1105" cy="711" r="4" fill="#f06292"/>
    <circle cx="1100" cy="715" r="2.5" fill="#ffeb3b"/>
  </g>

  <!-- Fireflies -->
  <g filter="url(#floresta-glow)">
    <circle cx="300" cy="400" r="4" fill="url(#floresta-firefly)"/>
    <circle cx="450" cy="350" r="3" fill="url(#floresta-firefly)"/>
    <circle cx="700" cy="300" r="5" fill="url(#floresta-firefly)"/>
    <circle cx="850" cy="420" r="3.5" fill="url(#floresta-firefly)"/>
    <circle cx="550" cy="500" r="4" fill="url(#floresta-firefly)"/>
    <circle cx="1000" cy="350" r="3" fill="url(#floresta-firefly)"/>
    <circle cx="180" cy="450" r="3.5" fill="url(#floresta-firefly)"/>
    <circle cx="1150" cy="400" r="4" fill="url(#floresta-firefly)"/>
    <circle cx="400" cy="550" r="3" fill="url(#floresta-firefly)"/>
    <circle cx="750" cy="480" r="3.5" fill="url(#floresta-firefly)"/>
    <circle cx="630" cy="380" r="2.5" fill="url(#floresta-firefly)"/>
    <circle cx="920" cy="500" r="3" fill="url(#floresta-firefly)"/>
  </g>

  <!-- Hanging vines -->
  <path d="M120,100 Q100,200 110,280" stroke="#388e3c" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M140,80 Q160,180 150,250" stroke="#43a047" stroke-width="2.5" fill="none" opacity="0.5"/>
  <path d="M1200,70 Q1220,170 1210,240" stroke="#388e3c" stroke-width="3" fill="none" opacity="0.6"/>
  <path d="M530,170 Q510,260 520,320" stroke="#43a047" stroke-width="2.5" fill="none" opacity="0.5"/>
  <path d="M880,160 Q900,250 890,310" stroke="#388e3c" stroke-width="2.5" fill="none" opacity="0.5"/>

  <!-- Leaves on vines -->
  <g fill="#66bb6a" opacity="0.7">
    <ellipse cx="108" cy="220" rx="6" ry="10" transform="rotate(-20,108,220)"/>
    <ellipse cx="115" cy="260" rx="5" ry="9" transform="rotate(15,115,260)"/>
    <ellipse cx="1215" cy="200" rx="6" ry="10" transform="rotate(20,1215,200)"/>
    <ellipse cx="518" cy="280" rx="5" ry="8" transform="rotate(-10,518,280)"/>
  </g>

  <!-- Soft fog at ground level -->
  <ellipse cx="400" cy="750" rx="300" ry="50" fill="rgba(255,255,255,0.08)"/>
  <ellipse cx="900" cy="740" rx="250" ry="45" fill="rgba(255,255,255,0.06)"/>
  <ellipse cx="672" cy="760" rx="400" ry="40" fill="rgba(255,255,255,0.05)"/>
</svg>