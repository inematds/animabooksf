<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540" width="960" height="540">
  <defs>
    <!-- Sunset sky gradient -->
    <linearGradient id="dbSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#312E81"/>
      <stop offset="20%" stop-color="#5B21B6"/>
      <stop offset="40%" stop-color="#A855F7"/>
      <stop offset="55%" stop-color="#F472B6"/>
      <stop offset="70%" stop-color="#FB923C"/>
      <stop offset="85%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#FEF9C3"/>
    </linearGradient>
    <!-- Grass gradients -->
    <linearGradient id="dbGrass1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <linearGradient id="dbGrass2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>
    <linearGradient id="dbGrass3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>
    <!-- Tree trunk gradient -->
    <linearGradient id="dbTrunk" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#78350F"/>
      <stop offset="50%" stop-color="#92400E"/>
      <stop offset="100%" stop-color="#78350F"/>
    </linearGradient>
    <!-- Star glow -->
    <radialGradient id="dbStarGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDE68A" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FDE68A" stop-opacity="0"/>
    </radialGradient>
    <filter id="dbGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <filter id="dbSoftGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
    <!-- Cloud filter -->
    <filter id="dbCloudSoft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5"/>
    </filter>
  </defs>

  <!-- ======= SKY ======= -->
  <rect width="960" height="540" fill="url(#dbSky)"/>

  <!-- ======= STARS (upper sky) ======= -->
  <!-- Bright stars -->
  <g>
    <circle cx="80" cy="30" r="2" fill="#FDE68A" filter="url(#dbGlow)"/>
    <circle cx="180" cy="60" r="1.5" fill="#FDE68A" filter="url(#dbGlow)"/>
    <circle cx="300" cy="20" r="2.5" fill="#FDE68A" filter="url(#dbGlow)"/>
    <circle cx="420" cy="45" r="1.8" fill="#FDE68A" filter="url(#dbGlow)"/>
    <circle cx="540" cy="25" r="2" fill="#FDE68A" filter="url(#dbGlow)"/>
    <circle cx="650" cy="55" r="1.5" fill="#FDE68A" filter="url(#dbGlow)"/>
    <circle cx="750" cy="30" r="2.2" fill="#FDE68A" filter="url(#dbGlow)"/>
    <circle cx="870" cy="50" r="1.8" fill="#FDE68A" filter="url(#dbGlow)"/>
    <circle cx="920" cy="20" r="1.5" fill="#FDE68A" filter="url(#dbGlow)"/>
    <circle cx="40" cy="70" r="1.2" fill="#FDE68A" filter="url(#dbGlow)"/>
    <circle cx="130" cy="100" r="1" fill="#E9D5FF" filter="url(#dbGlow)"/>
    <circle cx="240" cy="85" r="1.3" fill="#FDE68A" filter="url(#dbGlow)"/>
    <circle cx="370" cy="75" r="1" fill="#E9D5FF" filter="url(#dbGlow)"/>
    <circle cx="490" cy="70" r="1.5" fill="#FDE68A" filter="url(#dbGlow)"/>
    <circle cx="600" cy="90" r="1" fill="#E9D5FF" filter="url(#dbGlow)"/>
    <circle cx="710" cy="80" r="1.2" fill="#FDE68A" filter="url(#dbGlow)"/>
    <circle cx="820" cy="75" r="1" fill="#E9D5FF" filter="url(#dbGlow)"/>
  </g>

  <!-- Twinkling star shapes -->
  <g opacity="0.8">
    <!-- 4-point star 1 -->
    <path d="M150 40 L152 35 L154 40 L159 38 L154 40 L152 45 L150 40 L145 38 Z" fill="#FDE68A"/>
    <!-- 4-point star 2 -->
    <path d="M500 35 L502 29 L504 35 L510 33 L504 35 L502 41 L500 35 L494 33 Z" fill="#FDE68A"/>
    <!-- 4-point star 3 -->
    <path d="M780 45 L782 39 L784 45 L790 43 L784 45 L782 51 L780 45 L774 43 Z" fill="#FDE68A"/>
    <!-- Bigger decorative star -->
    <path d="M350 55 L354 43 L358 55 L370 51 L358 55 L354 67 L350 55 L338 51 Z" fill="#FDE68A" opacity="0.6" filter="url(#dbGlow)"/>
  </g>

  <!-- Dim/fading stars -->
  <g opacity="0.3">
    <circle cx="60" cy="110" r="0.8" fill="#FDE68A"/>
    <circle cx="200" cy="130" r="0.6" fill="#E9D5FF"/>
    <circle cx="350" cy="120" r="0.7" fill="#FDE68A"/>
    <circle cx="500" cy="110" r="0.8" fill="#E9D5FF"/>
    <circle cx="650" cy="125" r="0.6" fill="#FDE68A"/>
    <circle cx="800" cy="115" r="0.7" fill="#E9D5FF"/>
    <circle cx="900" cy="100" r="0.6" fill="#FDE68A"/>
  </g>

  <!-- ======= MOON (crescent) ======= -->
  <g transform="translate(820, 60)">
    <circle cx="0" cy="0" r="28" fill="#FEF9C3" filter="url(#dbSoftGlow)" opacity="0.4"/>
    <circle cx="0" cy="0" r="25" fill="#FEF9C3"/>
    <circle cx="8" cy="-5" r="20" fill="url(#dbSky)"/>
    <!-- Moon glow -->
    <circle cx="0" cy="0" r="35" fill="#FDE68A" opacity="0.08" filter="url(#dbSoftGlow)"/>
  </g>

  <!-- ======= WISPY CLOUDS (sunset-lit) ======= -->
  <g opacity="0.3">
    <ellipse cx="200" cy="180" rx="80" ry="15" fill="#F9A8D4" filter="url(#dbCloudSoft)"/>
    <ellipse cx="220" cy="175" rx="50" ry="10" fill="#FBCFE8" filter="url(#dbCloudSoft)"/>
  </g>
  <g opacity="0.25">
    <ellipse cx="600" cy="200" rx="90" ry="14" fill="#FDBA74" filter="url(#dbCloudSoft)"/>
    <ellipse cx="620" cy="195" rx="55" ry="10" fill="#FED7AA" filter="url(#dbCloudSoft)"/>
  </g>
  <g opacity="0.2">
    <ellipse cx="400" cy="220" rx="70" ry="12" fill="#F9A8D4" filter="url(#dbCloudSoft)"/>
    <ellipse cx="750" cy="170" rx="60" ry="10" fill="#FDBA74" filter="url(#dbCloudSoft)"/>
  </g>
  <g opacity="0.15">
    <ellipse cx="100" cy="210" rx="55" ry="10" fill="#FBCFE8" filter="url(#dbCloudSoft)"/>
    <ellipse cx="850" cy="210" rx="65" ry="11" fill="#FED7AA" filter="url(#dbCloudSoft)"/>
  </g>

  <!-- ======= DISTANT HILLS ======= -->
  <!-- Far hill (darker, further away) -->
  <path d="M0 380 Q100 310 200 340 Q300 290 420 320 Q520 280 640 310 Q740 280 840 300 Q900 290 960 320 L960 540 L0 540 Z" fill="#15803D" opacity="0.5"/>

  <!-- Middle hill -->
  <path d="M0 400 Q80 350 180 370 Q280 330 400 360 Q500 320 620 350 Q720 330 820 340 Q890 330 960 360 L960 540 L0 540 Z" fill="url(#dbGrass2)"/>

  <!-- Front hill -->
  <path d="M0 420 Q120 380 240 400 Q360 370 480 390 Q600 365 720 385 Q840 370 960 395 L960 540 L0 540 Z" fill="url(#dbGrass1)"/>

  <!-- Nearest hill -->
  <path d="M0 460 Q150 430 300 445 Q450 425 600 440 Q750 425 900 438 Q940 440 960 445 L960 540 L0 540 Z" fill="url(#dbGrass3)"/>

  <!-- ======= TREES ======= -->
  <!-- Tree 1 (on middle hill, left) -->
  <g transform="translate(120, 340)">
    <rect x="8" y="25" width="10" height="40" rx="3" fill="url(#dbTrunk)"/>
    <!-- Foliage layers -->
    <ellipse cx="13" cy="15" rx="25" ry="28" fill="#15803D"/>
    <ellipse cx="13" cy="8" rx="20" ry="22" fill="#16A34A" opacity="0.8"/>
    <ellipse cx="8" cy="12" rx="14" ry="16" fill="#22C55E" opacity="0.5"/>
    <!-- Sunset light on tree -->
    <ellipse cx="18" cy="10" rx="10" ry="14" fill="#FDBA74" opacity="0.1"/>
  </g>

  <!-- Tree 2 (on middle hill, center-right) -->
  <g transform="translate(650, 320)">
    <rect x="10" y="30" width="12" height="45" rx="4" fill="url(#dbTrunk)"/>
    <ellipse cx="16" cy="18" rx="30" ry="32" fill="#15803D"/>
    <ellipse cx="16" cy="10" rx="24" ry="26" fill="#16A34A" opacity="0.8"/>
    <ellipse cx="10" cy="14" rx="16" ry="18" fill="#22C55E" opacity="0.5"/>
    <ellipse cx="22" cy="12" rx="12" ry="16" fill="#FDBA74" opacity="0.1"/>
  </g>

  <!-- Small tree 3 (on front hill) -->
  <g transform="translate(380, 370)">
    <rect x="6" y="18" width="8" height="30" rx="2" fill="url(#dbTrunk)"/>
    <ellipse cx="10" cy="10" rx="18" ry="20" fill="#16A34A"/>
    <ellipse cx="10" cy="5" rx="14" ry="15" fill="#22C55E" opacity="0.7"/>
    <ellipse cx="6" cy="8" rx="9" ry="11" fill="#4ADE80" opacity="0.3"/>
  </g>

  <!-- Small tree 4 (distant, on far hill) -->
  <g transform="translate(500, 310)">
    <rect x="4" y="12" width="6" height="22" rx="2" fill="#5C2D0E" opacity="0.6"/>
    <ellipse cx="7" cy="6" rx="12" ry="14" fill="#15803D" opacity="0.6"/>
    <ellipse cx="7" cy="2" rx="9" ry="10" fill="#16A34A" opacity="0.4"/>
  </g>

  <!-- Tiny distant trees -->
  <g opacity="0.4">
    <g transform="translate(280, 330)">
      <rect x="3" y="8" width="4" height="16" rx="1" fill="#5C2D0E"/>
      <ellipse cx="5" cy="4" rx="9" ry="10" fill="#15803D"/>
    </g>
    <g transform="translate(800, 310)">
      <rect x="3" y="8" width="4" height="16" rx="1" fill="#5C2D0E"/>
      <ellipse cx="5" cy="4" rx="9" ry="10" fill="#15803D"/>
    </g>
  </g>

  <!-- ======= FLOWERS ON NEAREST HILL ======= -->
  <g opacity="0.6">
    <!-- Flower cluster 1 -->
    <circle cx="100" cy="468" r="3" fill="#FDE68A"/>
    <circle cx="100" cy="468" r="1.5" fill="#F59E0B"/>
    <line x1="100" y1="471" x2="100" y2="478" stroke="#22C55E" stroke-width="1"/>

    <circle cx="110" cy="472" r="2.5" fill="#F472B6"/>
    <circle cx="110" cy="472" r="1" fill="#EC4899"/>
    <line x1="110" y1="475" x2="110" y2="480" stroke="#22C55E" stroke-width="1"/>

    <!-- Flower cluster 2 -->
    <circle cx="450" cy="458" r="3" fill="#C084FC"/>
    <circle cx="450" cy="458" r="1.5" fill="#7C3AED"/>
    <line x1="450" y1="461" x2="450" y2="468" stroke="#22C55E" stroke-width="1"/>

    <circle cx="460" cy="462" r="2.5" fill="#FDE68A"/>
    <circle cx="460" cy="462" r="1" fill="#F59E0B"/>
    <line x1="460" y1="465" x2="460" y2="470" stroke="#22C55E" stroke-width="1"/>

    <!-- Flower cluster 3 -->
    <circle cx="750" cy="460" r="2.5" fill="#F472B6"/>
    <circle cx="750" cy="460" r="1" fill="#EC4899"/>
    <line x1="750" y1="463" x2="750" y2="468" stroke="#22C55E" stroke-width="1"/>

    <circle cx="760" cy="464" r="3" fill="#FCA5A5"/>
    <circle cx="760" cy="464" r="1.5" fill="#EF4444"/>
    <line x1="760" y1="467" x2="760" y2="474" stroke="#22C55E" stroke-width="1"/>

    <circle cx="740" cy="466" r="2" fill="#93C5FD"/>
    <circle cx="740" cy="466" r="0.8" fill="#3B82F6"/>
    <line x1="740" y1="468" x2="740" y2="473" stroke="#22C55E" stroke-width="0.8"/>
  </g>

  <!-- ======= GRASS BLADES ON FOREGROUND ======= -->
  <g stroke="#16A34A" stroke-width="1" opacity="0.25" stroke-linecap="round">
    <path d="M30 470 Q28 462 32 456"/>
    <path d="M35 472 Q38 464 34 458"/>
    <path d="M200 465 Q198 457 202 451"/>
    <path d="M205 467 Q208 459 204 453"/>
    <path d="M550 462 Q548 454 552 448"/>
    <path d="M555 464 Q558 456 554 450"/>
    <path d="M850 466 Q848 458 852 452"/>
    <path d="M855 468 Q858 460 854 454"/>
  </g>

  <!-- ======= FIREFLIES / MAGIC SPARKLES ======= -->
  <g>
    <circle cx="200" cy="380" r="2" fill="#FDE68A" filter="url(#dbGlow)" opacity="0.5"/>
    <circle cx="350" cy="400" r="1.5" fill="#FDE68A" filter="url(#dbGlow)" opacity="0.4"/>
    <circle cx="500" cy="390" r="2" fill="#FDE68A" filter="url(#dbGlow)" opacity="0.45"/>
    <circle cx="700" cy="385" r="1.5" fill="#FDE68A" filter="url(#dbGlow)" opacity="0.35"/>
    <circle cx="150" cy="420" r="1.8" fill="#FDE68A" filter="url(#dbGlow)" opacity="0.4"/>
    <circle cx="600" cy="410" r="1.5" fill="#FDE68A" filter="url(#dbGlow)" opacity="0.3"/>
    <circle cx="850" cy="400" r="2" fill="#FDE68A" filter="url(#dbGlow)" opacity="0.35"/>
    <circle cx="420" cy="435" r="1.2" fill="#FDE68A" filter="url(#dbGlow)" opacity="0.3"/>
  </g>

  <!-- ======= PATH / ROAD (subtle winding) ======= -->
  <path d="M480 540 Q470 500 475 470 Q480 450 490 435" fill="none" stroke="#D4A574" stroke-width="18" stroke-linecap="round" opacity="0.15"/>
  <path d="M480 540 Q470 500 475 470 Q480 450 490 435" fill="none" stroke="#C4956A" stroke-width="10" stroke-linecap="round" opacity="0.08"/>

  <!-- ======= LIGHT ATMOSPHERE ======= -->
  <!-- Warm glow on horizon -->
  <rect y="250" width="960" height="100" fill="#FDE68A" opacity="0.03"/>

  <!-- Subtle vignette effect -->
  <rect width="960" height="540" fill="url(#dbSky)" opacity="0.02"/>
</svg>