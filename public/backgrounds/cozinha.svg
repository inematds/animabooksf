    <rect x="0" y="0" width="140" height="185" fill="url(#cozinha-window)"/>
    <line x1="70" y1="0" x2="70" y2="185" stroke="#795548" stroke-width="3"/>
    <line x1="0" y1="92" x2="140" y2="92" stroke="#795548" stroke-width="3"/>
