    <rect x="10" y="410" width="70" height="160" rx="3" fill="#795548"/>
    <circle cx="70" cy="490" r="4" fill="#ffd54f"/>
    <rect x="90" y="410" width="70" height="160" rx="3" fill="#795548"/>
    <circle cx="100" cy="490" r="4" fill="#ffd54f"/>
    <rect x="170" y="410" width="70" height="160" rx="3" fill="#795548"/>
    <circle cx="230" cy="490" r="4" fill="#ffd54f"/>
    <rect x="250" y="410" width="70" height="160" rx="3" fill="#795548"/>
    <circle cx="260" cy="490" r="4" fill="#ffd54f"/>
  </g>

  <!-- Sink in counter -->
