    <rect x="20" y="110" width="130" height="80" rx="2" fill="#212121" opacity="0.1"/>
    <rect x="50" y="85" width="20" height="5" rx="2" fill="#bdbdbd"/>
    <!-- Knobs -->
    <circle cx="30" cy="42" r="6" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1"/>
    <circle cx="60" cy="42" r="6" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1"/>
    <circle cx="110" cy="42" r="6" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1"/>
    <circle cx="140" cy="42" r="6" fill="#e0e0e0" stroke="#bdbdbd" stroke-width="1"/>
    <!-- Pot on stove -->
