    <rect x="360" y="700" width="60" height="68" fill="#8d6e63"/>
    <rect x="480" y="700" width="60" height="68" fill="#8d6e63"/>
    <rect x="600" y="700" width="60" height="68" fill="#8d6e63"/>
    <rect x="720" y="700" width="60" height="68" fill="#8d6e63"/>
    <rect x="840" y="700" width="60" height="68" fill="#8d6e63"/>
    <rect x="960" y="700" width="60" height="68" fill="#8d6e63"/>
    <rect x="1080" y="700" width="60" height="68" fill="#8d6e63"/>
    <rect x="1200" y="700" width="60" height="68" fill="#8d6e63"/>
    <rect x="1320" y="700" width="24" height="68" fill="#8d6e63"/>
  </g>

  <!-- Upper cabinets -->
  <g>
    <rect x="30" y="50" width="150" height="190" rx="5" fill="url(#cozinha-cabinet)"/>
    <rect x="40" y="60" width="60" height="170" rx="3" fill="#795548"/>
    <rect x="110" y="60" width="60" height="170" rx="3" fill="#795548"/>
    <circle cx="95" cy="145" r="4" fill="#ffd54f"/>
    <circle cx="115" cy="145" r="4" fill="#ffd54f"/>

    <rect x="200" y="50" width="150" height="190" rx="5" fill="url(#cozinha-cabinet)"/>
    <rect x="210" y="60" width="60" height="170" rx="3" fill="#795548"/>
    <rect x="280" y="60" width="60" height="170" rx="3" fill="#795548"/>
    <circle cx="265" cy="145" r="4" fill="#ffd54f"/>
    <circle cx="285" cy="145" r="4" fill="#ffd54f"/>

