    <rect x="28" y="25" width="44" height="20" rx="3" fill="#616161"/>
    <ellipse cx="50" cy="25" rx="22" ry="6" fill="#757575"/>
    <line x1="26" y1="35" x2="18" y2="35" stroke="#9e9e9e" stroke-width="3"/>
    <line x1="74" y1="35" x2="82" y2="35" stroke="#9e9e9e" stroke-width="3"/>
    <!-- Steam -->
    <path d="M42,15 Q40,5 43,-5" stroke="rgba(255,255,255,0.4)" stroke-width="2" fill="none"/>
    <path d="M50,13 Q48,0 51,-10" stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="none"/>
    <path d="M58,15 Q56,5 59,-5" stroke="rgba(255,255,255,0.35)" stroke-width="2" fill="none"/>
  </g>

  <!-- Kitchen table -->
  <g transform="translate(980,450)">
    <rect x="0" y="0" width="300" height="12" rx="5" fill="url(#cozinha-table)"/>
    <rect x="20" y="12" width="10" height="118" fill="#f9a825"/>
    <rect x="270" y="12" width="10" height="118" fill="#f9a825"/>
    <line x1="20" y1="80" x2="280" y2="80" stroke="#f9a825" stroke-width="5"/>

    <!-- Plates on table -->
