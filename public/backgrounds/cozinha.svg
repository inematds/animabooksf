    <linearGradient id="cozinha-stove" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e0e0e0"/>
      <stop offset="40%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#bdbdbd"/>
