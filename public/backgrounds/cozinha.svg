    <line x1="540" y1="250" x2="540" y2="400"/>
    <line x1="570" y1="250" x2="570" y2="400"/>
    <line x1="600" y1="250" x2="600" y2="400"/>
    <line x1="630" y1="250" x2="630" y2="400"/>
    <line x1="660" y1="250" x2="660" y2="400"/>
    <line x1="690" y1="250" x2="690" y2="400"/>
    <line x1="720" y1="250" x2="720" y2="400"/>
    <line x1="750" y1="250" x2="750" y2="400"/>
    <line x1="780" y1="250" x2="780" y2="400"/>
  </g>

