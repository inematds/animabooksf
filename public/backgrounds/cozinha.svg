    <ellipse cx="80" cy="-2" rx="18" ry="5" fill="none" stroke="#e0e0e0" stroke-width="1"/>
    <ellipse cx="200" cy="-2" rx="25" ry="8" fill="url(#cozinha-plate)"/>
    <ellipse cx="200" cy="-2" rx="18" ry="5" fill="none" stroke="#e0e0e0" stroke-width="1"/>

    <!-- Glass -->
    <rect x="125" y="-22" width="12" height="20" rx="1" fill="rgba(144,202,249,0.4)" stroke="rgba(144,202,249,0.6)" stroke-width="1"/>
    <ellipse cx="131" cy="-22" rx="6" ry="2" fill="rgba(144,202,249,0.3)"/>

    <!-- Fruit bowl -->
    <ellipse cx="150" cy="-5" rx="30" ry="10" fill="url(#cozinha-plate)"/>
    <circle cx="142" cy="-12" r="8" fill="url(#cozinha-fruit-apple)"/>
    <line x1="142" y1="-20" x2="144" y2="-23" stroke="#4e342e" stroke-width="1.5"/>
    <circle cx="158" cy="-12" r="7" fill="url(#cozinha-fruit-orange)"/>
    <circle cx="148" cy="-18" r="6" fill="#fdd835"/>
  </g>

  <!-- Chairs at table -->
  <g transform="translate(1020,530)">
    <rect x="0" y="0" width="40" height="8" rx="2" fill="#f9a825"/>
    <rect x="0" y="-35" width="40" height="35" rx="3" fill="#ffa726"/>
    <rect x="3" y="8" width="5" height="40" fill="#ef6c00"/>
    <rect x="32" y="8" width="5" height="40" fill="#ef6c00"/>
  </g>
  <g transform="translate(1220,530)">
    <rect x="0" y="0" width="40" height="8" rx="2" fill="#f9a825"/>
    <rect x="0" y="-35" width="40" height="35" rx="3" fill="#ffa726"/>
    <rect x="3" y="8" width="5" height="40" fill="#ef6c00"/>
    <rect x="32" y="8" width="5" height="40" fill="#ef6c00"/>
  </g>

  <!-- Hanging utensils above counter -->
  <g transform="translate(100,290)">
    <line x1="0" y1="0" x2="200" y2="0" stroke="#795548" stroke-width="4"/>
    <!-- Hooks and utensils -->
    <line x1="30" y1="0" x2="30" y2="15" stroke="#9e9e9e" stroke-width="1.5"/>
    <ellipse cx="30" cy="25" rx="8" ry="15" fill="none" stroke="#9e9e9e" stroke-width="2"/>
    <line x1="80" y1="0" x2="80" y2="15" stroke="#9e9e9e" stroke-width="1.5"/>
    <rect x="76" y="15" width="8" height="30" rx="1" fill="#9e9e9e"/>
    <line x1="130" y1="0" x2="130" y2="15" stroke="#9e9e9e" stroke-width="1.5"/>
    <rect x="125" y="15" width="10" height="25" rx="3" fill="#9e9e9e"/>
    <path d="M125,15 L115,25" stroke="#9e9e9e" stroke-width="2"/>
    <line x1="180" y1="0" x2="180" y2="15" stroke="#9e9e9e" stroke-width="1.5"/>
    <rect x="177" y="15" width="6" height="35" rx="1" fill="#9e9e9e"/>
  </g>

  <!-- Clock on wall -->
  <g transform="translate(1150,100)">
    <circle cx="0" cy="0" r="35" fill="white" stroke="#795548" stroke-width="4"/>
    <circle cx="0" cy="0" r="30" fill="white"/>
    <!-- Numbers -->
    <text x="0" y="-20" text-anchor="middle" font-size="8" fill="#424242" font-family="sans-serif">12</text>
    <text x="22" y="3" text-anchor="middle" font-size="8" fill="#424242" font-family="sans-serif">3</text>
    <text x="0" y="26" text-anchor="middle" font-size="8" fill="#424242" font-family="sans-serif">6</text>
    <text x="-22" y="3" text-anchor="middle" font-size="8" fill="#424242" font-family="sans-serif">9</text>
    <!-- Hands -->
    <line x1="0" y1="0" x2="0" y2="-18" stroke="#424242" stroke-width="2"/>
    <line x1="0" y1="0" x2="12" y2="8" stroke="#424242" stroke-width="1.5"/>
