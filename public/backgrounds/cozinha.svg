    <circle cx="50" cy="56" r="8" fill="none" stroke="#424242" stroke-width="2"/>
    <circle cx="120" cy="56" r="18" fill="none" stroke="#424242" stroke-width="3"/>
    <circle cx="120" cy="56" r="8" fill="none" stroke="#424242" stroke-width="2"/>
    <!-- Oven door -->
