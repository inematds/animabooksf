    <line x1="0" y1="310" x2="1344" y2="310"/>
    <line x1="0" y1="340" x2="1344" y2="340"/>
    <line x1="0" y1="370" x2="1344" y2="370"/>
    <line x1="30" y1="250" x2="30" y2="400"/>
    <line x1="60" y1="250" x2="60" y2="400"/>
    <line x1="90" y1="250" x2="90" y2="400"/>
    <line x1="120" y1="250" x2="120" y2="400"/>
    <line x1="150" y1="250" x2="150" y2="400"/>
    <line x1="180" y1="250" x2="180" y2="400"/>
    <line x1="210" y1="250" x2="210" y2="400"/>
    <line x1="240" y1="250" x2="240" y2="400"/>
    <line x1="270" y1="250" x2="270" y2="400"/>
    <line x1="300" y1="250" x2="300" y2="400"/>
    <line x1="330" y1="250" x2="330" y2="400"/>
    <line x1="360" y1="250" x2="360" y2="400"/>
