  <!-- Checkerboard floor -->
  <g opacity="0.15">
    <rect x="0" y="580" width="60" height="60" fill="#8d6e63"/>
    <rect x="120" y="580" width="60" height="60" fill="#8d6e63"/>
    <rect x="240" y="580" width="60" height="60" fill="#8d6e63"/>
    <rect x="360" y="580" width="60" height="60" fill="#8d6e63"/>
    <rect x="480" y="580" width="60" height="60" fill="#8d6e63"/>
    <rect x="600" y="580" width="60" height="60" fill="#8d6e63"/>
    <rect x="720" y="580" width="60" height="60" fill="#8d6e63"/>
    <rect x="840" y="580" width="60" height="60" fill="#8d6e63"/>
    <rect x="960" y="580" width="60" height="60" fill="#8d6e63"/>
    <rect x="1080" y="580" width="60" height="60" fill="#8d6e63"/>
    <rect x="1200" y="580" width="60" height="60" fill="#8d6e63"/>
    <rect x="1320" y="580" width="24" height="60" fill="#8d6e63"/>
    <rect x="60" y="640" width="60" height="60" fill="#8d6e63"/>
    <rect x="180" y="640" width="60" height="60" fill="#8d6e63"/>
    <rect x="300" y="640" width="60" height="60" fill="#8d6e63"/>
    <rect x="420" y="640" width="60" height="60" fill="#8d6e63"/>
    <rect x="540" y="640" width="60" height="60" fill="#8d6e63"/>
    <rect x="660" y="640" width="60" height="60" fill="#8d6e63"/>
    <rect x="780" y="640" width="60" height="60" fill="#8d6e63"/>
    <rect x="900" y="640" width="60" height="60" fill="#8d6e63"/>
    <rect x="1020" y="640" width="60" height="60" fill="#8d6e63"/>
    <rect x="1140" y="640" width="60" height="60" fill="#8d6e63"/>
    <rect x="1260" y="640" width="60" height="60" fill="#8d6e63"/>
