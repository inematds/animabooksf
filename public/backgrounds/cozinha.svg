    <radialGradient id="cozinha-plate" cx="0.45" cy="0.45" r="0.5">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e0e0"/>
    </radialGradient>
    <radialGradient id="cozinha-fruit-apple" cx="0.4" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#ef5350"/>
      <stop offset="100%" stop-color="#c62828"/>
    </radialGradient>
    <radialGradient id="cozinha-fruit-orange" cx="0.4" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#ffa726"/>
      <stop offset="100%" stop-color="#e65100"/>
