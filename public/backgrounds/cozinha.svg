    <path d="M30,-20 Q38,-30 46,-20" stroke="#bdbdbd" stroke-width="4" fill="none"/>
    <circle cx="30" cy="-18" r="3" fill="#bdbdbd"/>
  </g>

  <!-- Fridge -->
  <g transform="translate(810,120)">
    <rect x="0" y="0" width="140" height="460" rx="5" fill="url(#cozinha-fridge)"/>
    <!-- Freezer door -->
    <rect x="5" y="5" width="130" height="120" rx="3" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
    <rect x="105" y="30" width="20" height="5" rx="2" fill="#bdbdbd"/>
    <!-- Fridge door -->
    <rect x="5" y="135" width="130" height="320" rx="3" fill="#f5f5f5" stroke="#e0e0e0" stroke-width="1"/>
    <rect x="105" y="200" width="20" height="5" rx="2" fill="#bdbdbd"/>
    <!-- Magnets & drawings -->
    <circle cx="40" cy="180" r="8" fill="#e53935" opacity="0.8"/>
    <circle cx="70" cy="170" r="7" fill="#42a5f5" opacity="0.8"/>
    <rect x="25" y="200" width="40" height="50" fill="white" opacity="0.8" transform="rotate(-3,45,225)"/>
    <!-- Child's drawing on paper -->
    <circle cx="45" cy="215" r="8" fill="#fdd835" opacity="0.6"/>
    <path d="M35,230 Q45,225 55,232" stroke="#4caf50" stroke-width="1.5" fill="none" opacity="0.6"/>
    <!-- Star magnet -->
    <polygon points="100,260 103,250 106,260 116,263 106,266 103,276 100,266 90,263" fill="#fdd835" opacity="0.8"/>
  </g>

  <!-- Stove -->
  <g transform="translate(600,340)">
    <rect x="0" y="50" width="170" height="230" rx="5" fill="url(#cozinha-stove)"/>
