<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="lousa_board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2D5A27"/>
      <stop offset="100%" stop-color="#1A3A15"/>
    </linearGradient>
    <linearGradient id="lousa_frame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#CCAA66"/>
      <stop offset="100%" stop-color="#997733"/>
    </linearGradient>
    <filter id="lousa_shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="1" dy="3" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>
  <ellipse cx="60" cy="112" rx="30" ry="4" fill="#00000018"/>
  <g filter="url(#lousa_shadow)">
    <!-- Legs -->
    <line x1="20" y1="25" x2="15" y2="110" stroke="url(#lousa_frame)" stroke-width="5" stroke-linecap="round"/>
    <line x1="100" y1="25" x2="105" y2="110" stroke="url(#lousa_frame)" stroke-width="5" stroke-linecap="round"/>
    <!-- Frame -->
    <rect x="12" y="15" width="96" height="72" rx="3" fill="url(#lousa_frame)"/>
    <!-- Board surface -->
    <rect x="16" y="19" width="88" height="64" rx="2" fill="url(#lousa_board)"/>
    <!-- Chalk writing - ABC -->
    <text x="30" y="45" font-size="16" font-family="Comic Sans MS, cursive, sans-serif" fill="#FFFFFF" opacity="0.85">A B C</text>
    <!-- Chalk writing - 1+1=2 -->
    <text x="28" y="68" font-size="12" font-family="Comic Sans MS, cursive, sans-serif" fill="#FFEE88" opacity="0.75">1 + 1 = 2</text>
    <!-- Little star drawing -->
    <polygon points="85,35 87,40 92,40 88,43 89,48 85,45 81,48 82,43 78,40 83,40" fill="none" stroke="#FFEE88" stroke-width="1" opacity="0.6"/>
    <!-- Smiley face -->
    <circle cx="82" cy="60" r="8" fill="none" stroke="#FFFFFF" stroke-width="1" opacity="0.5"/>
    <circle cx="79" cy="58" r="1" fill="#FFFFFF" opacity="0.5"/>
    <circle cx="85" cy="58" r="1" fill="#FFFFFF" opacity="0.5"/>
    <path d="M78 63 Q82 66 86 63" stroke="#FFFFFF" stroke-width="1" fill="none" opacity="0.5"/>
    <!-- Chalk tray -->
    <rect x="14" y="85" width="92" height="6" rx="2" fill="url(#lousa_frame)"/>
    <!-- Chalk pieces -->
    <rect x="25" y="82" width="16" height="5" rx="2" fill="#FFFFFF"/>
    <rect x="45" y="82" width="12" height="5" rx="2" fill="#FFEE88"/>
    <rect x="62" y="82" width="14" height="5" rx="2" fill="#FF8888"/>
    <rect x="80" y="82" width="10" height="5" rx="2" fill="#88CCFF"/>
    <!-- Eraser -->
    <rect x="30" y="87" width="18" height="8" rx="2" fill="#EEEEEE"/>
    <rect x="30" y="87" width="18" height="4" rx="2" fill="#DDDDDD"/>
    <!-- Chalk dust spots -->
    <circle cx="50" cy="75" r="1" fill="#FFFFFF" opacity="0.2"/>
    <circle cx="65" cy="72" r="0.8" fill="#FFFFFF" opacity="0.15"/>
    <circle cx="38" cy="50" r="0.8" fill="#FFFFFF" opacity="0.15"/>
  </g>
</svg>