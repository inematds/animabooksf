<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="moda_relogio_grad1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="moda_relogio_band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F87171"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
    <linearGradient id="moda_relogio_face" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <filter id="moda_relogio_shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.18"/>
    </filter>
  </defs>
  <g filter="url(#moda_relogio_shadow)">
    <!-- Top band -->
    <path d="M48 8 L44 42 L76 42 L72 8Z" fill="url(#moda_relogio_band)" stroke="#DC2626" stroke-width="1.5" rx="4"/>
    <!-- Band holes -->
    <circle cx="60" cy="16" r="2" fill="#B91C1C"/>
    <circle cx="60" cy="24" r="2" fill="#B91C1C"/>
    <circle cx="60" cy="32" r="2" fill="#B91C1C"/>
    <!-- Bottom band -->
    <path d="M44 78 L48 112 L72 112 L76 78Z" fill="url(#moda_relogio_band)" stroke="#DC2626" stroke-width="1.5"/>
    <!-- Band buckle -->
    <rect x="50" y="104" width="20" height="6" rx="2" fill="#FBBF24" stroke="#D97706" stroke-width="1"/>
    <!-- Watch case -->
    <circle cx="60" cy="60" r="24" fill="url(#moda_relogio_grad1)" stroke="#1D4ED8" stroke-width="2"/>
    <!-- Watch face -->
    <circle cx="60" cy="60" r="20" fill="url(#moda_relogio_face)" stroke="#93C5FD" stroke-width="1"/>
    <!-- Hour markers -->
    <circle cx="60" cy="43" r="1.5" fill="#2563EB"/>
    <circle cx="77" cy="60" r="1.5" fill="#2563EB"/>
    <circle cx="60" cy="77" r="1.5" fill="#2563EB"/>
    <circle cx="43" cy="60" r="1.5" fill="#2563EB"/>
    <!-- Small markers -->
    <circle cx="69" cy="45" r="1" fill="#93C5FD"/>
    <circle cx="75" cy="51" r="1" fill="#93C5FD"/>
    <circle cx="75" cy="69" r="1" fill="#93C5FD"/>
    <circle cx="69" cy="75" r="1" fill="#93C5FD"/>
    <circle cx="51" cy="75" r="1" fill="#93C5FD"/>
    <circle cx="45" cy="69" r="1" fill="#93C5FD"/>
    <circle cx="45" cy="51" r="1" fill="#93C5FD"/>
    <circle cx="51" cy="45" r="1" fill="#93C5FD"/>
    <!-- Hour hand -->
    <line x1="60" y1="60" x2="60" y2="47" stroke="#1E40AF" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Minute hand -->
    <line x1="60" y1="60" x2="72" y2="54" stroke="#2563EB" stroke-width="2" stroke-linecap="round"/>
    <!-- Center dot -->
    <circle cx="60" cy="60" r="2.5" fill="#EF4444"/>
    <circle cx="60" cy="60" r="1" fill="white"/>
    <!-- Crown knob -->
    <rect x="82" y="56" width="6" height="8" rx="2" fill="#FBBF24" stroke="#D97706" stroke-width="1"/>
  </g>
</svg>