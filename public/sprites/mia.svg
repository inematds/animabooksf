<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <defs>
    <linearGradient id="miaHairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDA4AF"/>
      <stop offset="50%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#DB2777"/>
    </linearGradient>
    <linearGradient id="miaHairShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FECDD3" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FDA4AF" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="miaSkin" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFF0E0"/>
      <stop offset="80%" stop-color="#FDDCBD"/>
      <stop offset="100%" stop-color="#F5CEAA"/>
    </radialGradient>
    <radialGradient id="miaEyeL" cx="42%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#C4A882"/>
      <stop offset="45%" stop-color="#92400E"/>
      <stop offset="100%" stop-color="#451A03"/>
    </radialGradient>
    <radialGradient id="miaEyeR" cx="58%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#C4A882"/>
      <stop offset="45%" stop-color="#92400E"/>
      <stop offset="100%" stop-color="#451A03"/>
    </radialGradient>
    <linearGradient id="miaOveralls" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="miaShirt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <linearGradient id="miaShoe" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>
    <filter id="miaShadow" x="-15%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feOffset dx="1" dy="2" result="off"/>
      <feFlood flood-color="#000" flood-opacity="0.12"/>
      <feComposite in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="miaBlush" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
  </defs>

  <g filter="url(#miaShadow)">
    <!-- LEGS (overalls) -->
    <rect x="78" y="215" width="16" height="48" rx="7" fill="url(#miaOveralls)"/>
    <rect x="106" y="215" width="16" height="48" rx="7" fill="url(#miaOveralls)"/>
    <!-- Seams -->
    <path d="M86 218 L86 260" fill="none" stroke="#1D4ED8" stroke-width="0.5" opacity="0.3"/>
    <path d="M114 218 L114 260" fill="none" stroke="#1D4ED8" stroke-width="0.5" opacity="0.3"/>
    <!-- Cuffs -->
    <rect x="76" y="256" width="20" height="4" rx="2" fill="#3B82F6" opacity="0.6"/>
    <rect x="104" y="256" width="20" height="4" rx="2" fill="#3B82F6" opacity="0.6"/>

    <!-- Shoes -->
    <ellipse cx="86" cy="270" rx="16" ry="8" fill="url(#miaShoe)"/>
    <ellipse cx="114" cy="270" rx="16" ry="8" fill="url(#miaShoe)"/>
    <path d="M74 268 Q86 262 98 268" fill="none" stroke="#991B1B" stroke-width="1.2"/>
    <path d="M102 268 Q114 262 126 268" fill="none" stroke="#991B1B" stroke-width="1.2"/>
    <ellipse cx="84" cy="268" rx="5" ry="2" fill="#FCA5A5" opacity="0.4"/>
    <ellipse cx="112" cy="268" rx="5" ry="2" fill="#FCA5A5" opacity="0.4"/>

    <!-- OVERALLS BIB -->
    <path d="M70 168 Q74 162 100 160 Q126 162 130 168 L134 220 Q126 214 100 212 Q74 214 66 220 Z" fill="url(#miaOveralls)" stroke="#1D4ED8" stroke-width="0.5"/>
    <!-- Bib front -->
    <rect x="82" y="164" width="36" height="28" rx="4" fill="#3B82F6" stroke="#1D4ED8" stroke-width="0.6"/>
    <!-- Pocket on bib -->
    <rect x="88" y="172" width="24" height="14" rx="3" fill="#2563EB" stroke="#1D4ED8" stroke-width="0.5"/>
    <path d="M88 172 Q100 176 112 172" fill="none" stroke="#1D4ED8" stroke-width="0.6"/>
    <!-- Heart on pocket -->
    <path d="M97 178 Q97 175 100 175 Q103 175 103 178 Q103 182 100 184 Q97 182 97 178" fill="#FCA5A5" opacity="0.7"/>
    <!-- Straps -->
    <path d="M84 164 L78 148" fill="none" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
    <path d="M116 164 L122 148" fill="none" stroke="#3B82F6" stroke-width="4" stroke-linecap="round"/>
    <!-- Buttons on straps -->
    <circle cx="78" cy="148" r="3" fill="#FDE68A" stroke="#F59E0B" stroke-width="0.5"/>
    <circle cx="122" cy="148" r="3" fill="#FDE68A" stroke="#F59E0B" stroke-width="0.5"/>
    <!-- Side buttons -->
    <circle cx="70" cy="195" r="2" fill="#FDE68A" stroke="#F59E0B" stroke-width="0.4"/>
    <circle cx="130" cy="195" r="2" fill="#FDE68A" stroke="#F59E0B" stroke-width="0.4"/>

    <!-- SHIRT (underneath) -->
    <path d="M72 145 Q78 138 100 136 Q122 138 128 145 L130 168 Q126 162 100 160 Q74 162 70 168 Z" fill="url(#miaShirt)" stroke="#F59E0B" stroke-width="0.4"/>
    <!-- Collar -->
    <path d="M84 142 Q100 148 116 142" fill="none" stroke="#F59E0B" stroke-width="0.8" opacity="0.5"/>

    <!-- ARMS -->
    <!-- Left arm (shirt sleeve then skin) -->
    <path d="M72 148 Q66 154 63 160" fill="url(#miaShirt)" stroke="#F59E0B" stroke-width="0.4"/>
    <path d="M63 160 Q57 172 54 186 Q53 192 57 192 Q61 190 64 182 Q67 172 63 160" fill="#FDDCBD" stroke="#F0C9A0" stroke-width="0.4"/>
    <ellipse cx="55" cy="191" rx="6" ry="5.5" fill="#FFF0E0"/>
    <path d="M50 189 Q49 186 51 184" fill="none" stroke="#F0C9A0" stroke-width="0.6" stroke-linecap="round"/>
    <!-- Sleeve -->
    <path d="M72 145 Q64 152 62 160 Q68 156 72 150" fill="url(#miaShirt)" stroke="#F59E0B" stroke-width="0.4"/>

    <!-- Right arm -->
    <path d="M128 148 Q134 154 137 160" fill="url(#miaShirt)" stroke="#F59E0B" stroke-width="0.4"/>
    <path d="M137 160 Q143 172 146 186 Q147 192 143 192 Q139 190 136 182 Q133 172 137 160" fill="#FDDCBD" stroke="#F0C9A0" stroke-width="0.4"/>
    <ellipse cx="145" cy="191" rx="6" ry="5.5" fill="#FFF0E0"/>
    <path d="M150 189 Q151 186 149 184" fill="none" stroke="#F0C9A0" stroke-width="0.6" stroke-linecap="round"/>
    <path d="M128 145 Q136 152 138 160 Q132 156 128 150" fill="url(#miaShirt)" stroke="#F59E0B" stroke-width="0.4"/>

    <!-- HEAD -->
    <!-- Hair back -->
    <ellipse cx="100" cy="72" rx="54" ry="50" fill="url(#miaHairGrad)"/>

    <!-- Face -->
    <ellipse cx="100" cy="85" rx="48" ry="46" fill="url(#miaSkin)"/>

    <!-- Short pink hair -->
    <path d="M52 74 Q56 40 78 30 Q92 26 100 28 Q108 26 122 30 Q144 40 148 74 Q146 58 138 48 Q128 40 118 44 Q108 36 100 34 Q92 36 82 44 Q72 40 62 48 Q54 58 52 74" fill="url(#miaHairGrad)"/>
    <!-- Short hair sides -->
    <path d="M48 70 Q44 82 46 95 Q48 100 52 96 Q53 88 52 78 Q52 74 48 70" fill="url(#miaHairGrad)"/>
    <path d="M152 70 Q156 82 154 95 Q152 100 148 96 Q147 88 148 78 Q148 74 152 70" fill="url(#miaHairGrad)"/>
    <!-- Hair shine -->
    <path d="M62 64 Q68 42 84 34 Q92 30 98 32 Q93 38 86 46 Q78 54 68 64" fill="url(#miaHairShine)" opacity="0.5"/>
    <path d="M110 40 Q116 36 124 38 Q130 42 134 50 Q128 44 120 42 Q114 42 110 44" fill="url(#miaHairShine)" opacity="0.3"/>
    <!-- Spiky short details -->
    <path d="M72 34 Q75 26 80 32" fill="url(#miaHairGrad)"/>
    <path d="M90 28 Q94 20 98 28" fill="url(#miaHairGrad)"/>
    <path d="M108 28 Q112 22 116 30" fill="url(#miaHairGrad)"/>

    <!-- Ears -->
    <ellipse cx="54" cy="88" rx="5" ry="7" fill="#FDDCBD"/>
    <ellipse cx="54" cy="88" rx="2.5" ry="4" fill="#F0C9A0" opacity="0.4"/>
    <ellipse cx="146" cy="88" rx="5" ry="7" fill="#FDDCBD"/>
    <ellipse cx="146" cy="88" rx="2.5" ry="4" fill="#F0C9A0" opacity="0.4"/>

    <!-- FACE -->
    <!-- Eyebrows -->
    <path d="M72 68 Q80 63 90 66" fill="none" stroke="#DB2777" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>
    <path d="M128 68 Q120 63 110 66" fill="none" stroke="#DB2777" stroke-width="1.4" stroke-linecap="round" opacity="0.5"/>

    <!-- Left eye -->
    <ellipse cx="82" cy="82" rx="13" ry="14" fill="white"/>
    <ellipse cx="82" cy="84" rx="9.5" ry="10.5" fill="url(#miaEyeL)"/>
    <ellipse cx="82" cy="85" rx="4.5" ry="5.5" fill="#1C0A00"/>
    <circle cx="77" cy="79" r="3.5" fill="white" opacity="0.95"/>
    <circle cx="86" cy="88" r="1.8" fill="white" opacity="0.7"/>
    <circle cx="79" cy="86" r="1" fill="white" opacity="0.5"/>
    <path d="M76 78 L77 76.5 L78 78 L79.5 77 L78 78 L77 79.5 L76 78 L74.5 77 Z" fill="white" opacity="0.6"/>
    <path d="M69 77 Q76 69 82 69 Q88 69 95 77" fill="none" stroke="#92400E" stroke-width="2" stroke-linecap="round"/>
    <path d="M69 77 Q66 73 64 69" fill="none" stroke="#92400E" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M72 74 Q70 70 69 67" fill="none" stroke="#92400E" stroke-width="1.1" stroke-linecap="round"/>

    <!-- Right eye -->
    <ellipse cx="118" cy="82" rx="13" ry="14" fill="white"/>
    <ellipse cx="118" cy="84" rx="9.5" ry="10.5" fill="url(#miaEyeR)"/>
    <ellipse cx="118" cy="85" rx="4.5" ry="5.5" fill="#1C0A00"/>
    <circle cx="113" cy="79" r="3.5" fill="white" opacity="0.95"/>
    <circle cx="122" cy="88" r="1.8" fill="white" opacity="0.7"/>
    <circle cx="115" cy="86" r="1" fill="white" opacity="0.5"/>
    <path d="M112 78 L113 76.5 L114 78 L115.5 77 L114 78 L113 79.5 L112 78 L110.5 77 Z" fill="white" opacity="0.6"/>
    <path d="M105 77 Q112 69 118 69 Q124 69 131 77" fill="none" stroke="#92400E" stroke-width="2" stroke-linecap="round"/>
    <path d="M131 77 Q134 73 136 69" fill="none" stroke="#92400E" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M128 74 Q130 70 131 67" fill="none" stroke="#92400E" stroke-width="1.1" stroke-linecap="round"/>

    <!-- Blush -->
    <ellipse cx="68" cy="97" rx="9" ry="5" fill="#FCA5A5" filter="url(#miaBlush)" opacity="0.45"/>
    <ellipse cx="132" cy="97" rx="9" ry="5" fill="#FCA5A5" filter="url(#miaBlush)" opacity="0.45"/>

    <!-- Nose -->
    <ellipse cx="100" cy="93" rx="2" ry="1.5" fill="#F0C9A0" opacity="0.6"/>

    <!-- Mouth - neutral -->
    <path d="M94 105 Q100 109 106 105" fill="none" stroke="#D97070" stroke-width="1.6" stroke-linecap="round"/>

    <!-- Hair clip -->
    <rect x="60" cy="56" y="54" width="8" height="4" rx="2" fill="#FDE68A" stroke="#F59E0B" stroke-width="0.5"/>
  </g>
</svg>