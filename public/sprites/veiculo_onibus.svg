<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="onibus_body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFD444"/>
      <stop offset="100%" stop-color="#EEBB00"/>
    </linearGradient>
    <linearGradient id="onibus_window" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#AAE4FF"/>
      <stop offset="100%" stop-color="#66C8FF"/>
    </linearGradient>
    <radialGradient id="onibus_wheel" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#222"/>
    </radialGradient>
    <filter id="onibus_shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="1" dy="3" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>
  <ellipse cx="60" cy="105" rx="48" ry="6" fill="#00000020"/>
  <g filter="url(#onibus_shadow)">
    <!-- Body -->
    <rect x="8" y="35" width="104" height="50" rx="8" fill="url(#onibus_body)"/>
    <!-- Roof -->
    <rect x="10" y="32" width="100" height="8" rx="4" fill="#FFCC00"/>
    <!-- Stripe -->
    <rect x="8" y="60" width="104" height="6" fill="#222"/>
    <!-- Windows -->
    <rect x="18" y="42" width="14" height="14" rx="3" fill="url(#onibus_window)"/>
    <rect x="37" y="42" width="14" height="14" rx="3" fill="url(#onibus_window)"/>
    <rect x="56" y="42" width="14" height="14" rx="3" fill="url(#onibus_window)"/>
    <rect x="75" y="42" width="14" height="14" rx="3" fill="url(#onibus_window)"/>
    <!-- Door -->
    <rect x="94" y="42" width="12" height="30" rx="2" fill="#DDAA00"/>
    <rect x="96" y="44" width="8" height="10" rx="2" fill="url(#onibus_window)"/>
    <circle cx="98" cy="62" r="1.5" fill="#888"/>
    <!-- SCHOOL text area -->
    <rect x="20" y="68" width="60" height="10" rx="2" fill="#FFEE88"/>
    <text x="50" y="76" text-anchor="middle" font-size="7" font-family="Arial, sans-serif" font-weight="bold" fill="#CC8800">ESCOLA</text>
    <!-- Headlights -->
    <circle cx="108" cy="72" r="4" fill="#FFEE55"/>
    <circle cx="108" cy="72" r="2.5" fill="#FFFFCC"/>
    <!-- Tail light -->
    <circle cx="12" cy="72" r="3" fill="#FF4444"/>
    <!-- Stop sign -->
    <rect x="3" y="45" width="8" height="6" rx="1" fill="#FF4444"/>
    <!-- Wheels -->
    <circle cx="30" cy="90" r="11" fill="url(#onibus_wheel)"/>
    <circle cx="30" cy="90" r="5" fill="#888"/>
    <circle cx="30" cy="90" r="2" fill="#AAA"/>
    <circle cx="88" cy="90" r="11" fill="url(#onibus_wheel)"/>
    <circle cx="88" cy="90" r="5" fill="#888"/>
    <circle cx="88" cy="90" r="2" fill="#AAA"/>
    <!-- Bumper -->
    <rect x="10" y="82" width="100" height="4" rx="2" fill="#DDAA00"/>
  </g>
</svg>