<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="carro_body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF4444"/>
      <stop offset="100%" stop-color="#CC2222"/>
    </linearGradient>
    <linearGradient id="carro_window" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#AAE4FF"/>
      <stop offset="100%" stop-color="#66C8FF"/>
    </linearGradient>
    <radialGradient id="carro_wheel" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="100%" stop-color="#222"/>
    </radialGradient>
    <filter id="carro_shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="1" dy="3" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>
  <!-- Shadow -->
  <ellipse cx="60" cy="105" rx="40" ry="6" fill="#00000020"/>
  <!-- Body bottom -->
  <rect x="15" y="58" width="90" height="30" rx="8" fill="url(#carro_body)" filter="url(#carro_shadow)"/>
  <!-- Body top (cabin) -->
  <path d="M35 58 Q37 32 50 32 L70 32 Q83 32 85 58 Z" fill="url(#carro_body)"/>
  <!-- Window left -->
  <path d="M40 56 Q42 38 50 38 L57 38 L57 56 Z" fill="url(#carro_window)" opacity="0.9"/>
  <!-- Window right -->
  <path d="M63 56 L63 38 L70 38 Q78 38 80 56 Z" fill="url(#carro_window)" opacity="0.9"/>
  <!-- Headlights -->
  <ellipse cx="100" cy="68" rx="5" ry="4" fill="#FFEE55"/>
  <ellipse cx="100" cy="68" rx="3" ry="2.5" fill="#FFFFCC"/>
  <!-- Tail light -->
  <ellipse cx="20" cy="68" rx="4" ry="3" fill="#FF6666"/>
  <!-- Bumper -->
  <rect x="18" y="82" width="84" height="5" rx="2" fill="#DD3333"/>
  <!-- Wheels -->
  <circle cx="35" cy="90" r="12" fill="url(#carro_wheel)"/>
  <circle cx="35" cy="90" r="6" fill="#888"/>
  <circle cx="35" cy="90" r="2" fill="#AAA"/>
  <circle cx="85" cy="90" r="12" fill="url(#carro_wheel)"/>
  <circle cx="85" cy="90" r="6" fill="#888"/>
  <circle cx="85" cy="90" r="2" fill="#AAA"/>
  <!-- Smile on front -->
  <path d="M96 74 Q100 78 104 74" stroke="#FFCCCC" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>