<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <radialGradient id="flor_petal_pink" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FF85A2"/>
      <stop offset="100%" stop-color="#E84393"/>
    </radialGradient>
    <radialGradient id="flor_petal_red" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FF6B8A"/>
      <stop offset="100%" stop-color="#D63384"/>
    </radialGradient>
    <radialGradient id="flor_center" cx="0.4" cy="0.4" r="0.5">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="100%" stop-color="#FFA500"/>
    </radialGradient>
    <linearGradient id="flor_stem" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </linearGradient>
    <linearGradient id="flor_leaf" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="100%" stop-color="#388E3C"/>
    </linearGradient>
    <filter id="flor_shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#00000030"/>
    </filter>
  </defs>
  <!-- Stem -->
  <path d="M60,55 Q58,75 60,110" fill="none" stroke="url(#flor_stem)" stroke-width="5" stroke-linecap="round"/>
  <!-- Leaves -->
  <ellipse cx="45" cy="82" rx="14" ry="7" fill="url(#flor_leaf)" transform="rotate(-30,45,82)"/>
  <ellipse cx="75" cy="90" rx="12" ry="6" fill="url(#flor_leaf)" transform="rotate(25,75,90)"/>
  <!-- Leaf veins -->
  <line x1="38" y1="78" x2="50" y2="85" stroke="#2E7D32" stroke-width="0.5" opacity="0.5"/>
  <line x1="69" y1="87" x2="80" y2="92" stroke="#2E7D32" stroke-width="0.5" opacity="0.5"/>
  <!-- Petals (back layer) -->
  <ellipse cx="60" cy="25" rx="11" ry="16" fill="url(#flor_petal_red)" filter="url(#flor_shadow)"/>
  <ellipse cx="60" cy="55" rx="11" ry="16" fill="url(#flor_petal_red)"/>
  <ellipse cx="75" cy="33" rx="11" ry="16" fill="url(#flor_petal_red)" transform="rotate(60,75,33)"/>
  <ellipse cx="45" cy="47" rx="11" ry="16" fill="url(#flor_petal_red)" transform="rotate(-60,45,47)"/>
  <!-- Petals (front layer) -->
  <ellipse cx="45" cy="33" rx="11" ry="16" fill="url(#flor_petal_pink)" transform="rotate(-60,45,33)"/>
  <ellipse cx="75" cy="47" rx="11" ry="16" fill="url(#flor_petal_pink)" transform="rotate(60,75,47)"/>
  <!-- Center -->
  <circle cx="60" cy="40" r="10" fill="url(#flor_center)"/>
  <!-- Center dots -->
  <circle cx="57" cy="37" r="1.5" fill="#E6940A" opacity="0.6"/>
  <circle cx="63" cy="38" r="1.2" fill="#E6940A" opacity="0.6"/>
  <circle cx="60" cy="43" r="1.3" fill="#E6940A" opacity="0.6"/>
  <!-- Smiley face on center -->
  <circle cx="56" cy="38" r="1.5" fill="#5C3D00"/>
  <circle cx="64" cy="38" r="1.5" fill="#5C3D00"/>
  <path d="M56,43 Q60,46 64,43" fill="none" stroke="#5C3D00" stroke-width="1" stroke-linecap="round"/>
</svg>