<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <defs>
    <linearGradient id="lunaHairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="50%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="lunaHairShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#BFDBFE" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#60A5FA" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="lunaSkin" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFF5EB"/>
      <stop offset="80%" stop-color="#FDE8D0"/>
      <stop offset="100%" stop-color="#F5D5B0"/>
    </radialGradient>
    <radialGradient id="lunaEyeL" cx="42%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="45%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </radialGradient>
    <radialGradient id="lunaEyeR" cx="58%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="45%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </radialGradient>
    <linearGradient id="lunaOutfit" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="lunaOutfitAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#818CF8"/>
    </linearGradient>
    <linearGradient id="lunaShoe" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#312E81"/>
      <stop offset="100%" stop-color="#1E1B4B"/>
    </linearGradient>
    <filter id="lunaShadow" x="-15%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feOffset dx="1" dy="2" result="off"/>
      <feFlood flood-color="#000" flood-opacity="0.12"/>
      <feComposite in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lunaBlush" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
    <radialGradient id="lunaStar" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </radialGradient>
  </defs>

  <g filter="url(#lunaShadow)">
    <!-- LEGS -->
    <rect x="79" y="222" width="14" height="40" rx="7" fill="url(#lunaOutfit)"/>
    <rect x="107" y="222" width="14" height="40" rx="7" fill="url(#lunaOutfit)"/>
    <!-- Leg stripe accents -->
    <rect x="79" y="248" width="14" height="2" rx="1" fill="#6366F1" opacity="0.6"/>
    <rect x="107" y="248" width="14" height="2" rx="1" fill="#6366F1" opacity="0.6"/>

    <!-- Boots -->
    <ellipse cx="86" cy="270" rx="15" ry="8" fill="url(#lunaShoe)"/>
    <ellipse cx="114" cy="270" rx="15" ry="8" fill="url(#lunaShoe)"/>
    <path d="M74 268 Q86 262 98 268" fill="none" stroke="#4338CA" stroke-width="1.2"/>
    <path d="M102 268 Q114 262 126 268" fill="none" stroke="#4338CA" stroke-width="1.2"/>
    <!-- Boot stars -->
    <path d="M82 270 L83 268 L84 270 L86 269 L84 270 L83 272 L82 270 L80 269 Z" fill="#FDE68A" opacity="0.7"/>
    <path d="M110 270 L111 268 L112 270 L114 269 L112 270 L111 272 L110 270 L108 269 Z" fill="#FDE68A" opacity="0.7"/>

    <!-- OUTFIT (space jumpsuit) -->
    <path d="M68 152 Q74 144 100 141 Q126 144 132 152 L136 222 Q126 218 100 216 Q74 218 64 222 Z" fill="url(#lunaOutfit)" stroke="#1E3A5F" stroke-width="0.5"/>
    <!-- Belt -->
    <rect x="66" y="195" width="68" height="6" rx="3" fill="url(#lunaOutfitAccent)"/>
    <circle cx="100" cy="198" r="4" fill="#312E81" stroke="#818CF8" stroke-width="0.8"/>
    <path d="M98 196 L100 194 L102 196 L104 195 L102 196 L100 198 L98 196 L96 195 Z" fill="#FDE68A" opacity="0.8"/>
    <!-- Chest badge -->
    <circle cx="88" cy="168" r="6" fill="#1E1B4B" stroke="#6366F1" stroke-width="0.8"/>
    <path d="M86 166 L88 163 L90 166 L93 165 L90 166 L88 169 L86 166 L83 165 Z" fill="#FDE68A" opacity="0.9"/>
    <!-- Collar detail -->
    <path d="M82 148 Q100 156 118 148" fill="none" stroke="#6366F1" stroke-width="1.2"/>
    <!-- Outfit highlight -->
    <path d="M72 156 Q100 150 128 156 L128 163 Q100 157 72 163 Z" fill="white" opacity="0.06"/>

    <!-- Small stars on outfit -->
    <circle cx="120" cy="175" r="1" fill="#FDE68A" opacity="0.6"/>
    <circle cx="115" cy="185" r="0.8" fill="#FDE68A" opacity="0.5"/>
    <circle cx="80" cy="182" r="0.8" fill="#FDE68A" opacity="0.5"/>

    <!-- ARMS -->
    <!-- Left arm -->
    <path d="M68 155 Q58 170 54 188 Q53 194 57 194 Q61 192 64 184 Q68 172 72 162" fill="#FDE8D0" stroke="#F0C9A0" stroke-width="0.4"/>
    <ellipse cx="55" cy="193" rx="6" ry="5.5" fill="#FFF5EB"/>
    <path d="M50 191 Q49 188 51 186" fill="none" stroke="#F0C9A0" stroke-width="0.6" stroke-linecap="round"/>
    <!-- Left sleeve -->
    <path d="M68 152 Q62 158 60 166 Q66 162 70 155" fill="url(#lunaOutfit)" stroke="#1E3A5F" stroke-width="0.4"/>
    <!-- Sleeve stripe -->
    <path d="M62 162 Q66 160 70 156" fill="none" stroke="#6366F1" stroke-width="1" opacity="0.6"/>

    <!-- Right arm -->
    <path d="M132 155 Q142 170 146 188 Q147 194 143 194 Q139 192 136 184 Q132 172 128 162" fill="#FDE8D0" stroke="#F0C9A0" stroke-width="0.4"/>
    <ellipse cx="145" cy="193" rx="6" ry="5.5" fill="#FFF5EB"/>
    <path d="M150 191 Q151 188 149 186" fill="none" stroke="#F0C9A0" stroke-width="0.6" stroke-linecap="round"/>
    <!-- Right sleeve -->
    <path d="M132 152 Q138 158 140 166 Q134 162 130 155" fill="url(#lunaOutfit)" stroke="#1E3A5F" stroke-width="0.4"/>
    <path d="M138 162 Q134 160 130 156" fill="none" stroke="#6366F1" stroke-width="1" opacity="0.6"/>

    <!-- HEAD -->
    <!-- Hair back (bun shape) -->
    <ellipse cx="100" cy="72" rx="55" ry="52" fill="url(#lunaHairGrad)"/>

    <!-- Bun on top -->
    <circle cx="100" cy="24" r="18" fill="url(#lunaHairGrad)"/>
    <path d="M86 20 Q92 12 100 10 Q108 12 114 20" fill="url(#lunaHairShine)" opacity="0.4"/>
    <!-- Bun band -->
    <ellipse cx="100" cy="36" rx="14" ry="4" fill="#818CF8" opacity="0.7"/>
    <!-- Bun stars -->
    <path d="M108 18 L109 16 L110 18 L112 17 L110 18 L109 20 L108 18 L106 17 Z" fill="#FDE68A" opacity="0.8"/>
    <path d="M90 20 L91 18 L92 20 L94 19 L92 20 L91 22 L90 20 L88 19 Z" fill="#FDE68A" opacity="0.7"/>

    <!-- Face -->
    <ellipse cx="100" cy="85" rx="48" ry="46" fill="url(#lunaSkin)"/>

    <!-- Hair bangs (neat side-swept) -->
    <path d="M52 72 Q56 38 78 28 Q92 24 100 26 Q108 24 122 28 Q144 38 148 72 Q146 56 138 46 Q128 38 118 42 Q108 34 100 33 Q90 34 82 42 Q72 38 62 46 Q54 56 52 72" fill="url(#lunaHairGrad)"/>
    <!-- Bangs shine -->
    <path d="M62 62 Q68 42 84 32 Q92 28 98 30 Q93 36 86 44 Q78 52 68 62" fill="url(#lunaHairShine)" opacity="0.5"/>

    <!-- Ears -->
    <ellipse cx="54" cy="88" rx="5" ry="7" fill="#FDE8D0"/>
    <ellipse cx="54" cy="88" rx="2.5" ry="4" fill="#F0C9A0" opacity="0.4"/>
    <ellipse cx="146" cy="88" rx="5" ry="7" fill="#FDE8D0"/>
    <ellipse cx="146" cy="88" rx="2.5" ry="4" fill="#F0C9A0" opacity="0.4"/>
    <!-- Star earrings -->
    <path d="M52 96 L53 94 L54 96 L56 95 L54 96 L53 98 L52 96 L50 95 Z" fill="#FDE68A" opacity="0.8"/>
    <path d="M146 96 L147 94 L148 96 L150 95 L148 96 L147 98 L146 96 L144 95 Z" fill="#FDE68A" opacity="0.8"/>

    <!-- FACE -->
    <!-- Eyebrows -->
    <path d="M72 68 Q80 63 90 66" fill="none" stroke="#1D4ED8" stroke-width="1.4" stroke-linecap="round" opacity="0.6"/>
    <path d="M128 68 Q120 63 110 66" fill="none" stroke="#1D4ED8" stroke-width="1.4" stroke-linecap="round" opacity="0.6"/>

    <!-- Left eye -->
    <ellipse cx="82" cy="82" rx="13" ry="14" fill="white"/>
    <ellipse cx="82" cy="84" rx="9.5" ry="10.5" fill="url(#lunaEyeL)"/>
    <ellipse cx="82" cy="85" rx="4.5" ry="5.5" fill="#0C1445"/>
    <circle cx="77" cy="79" r="3.5" fill="white" opacity="0.95"/>
    <circle cx="86" cy="88" r="1.8" fill="white" opacity="0.7"/>
    <circle cx="79" cy="86" r="1" fill="white" opacity="0.5"/>
    <path d="M76 78 L77 76.5 L78 78 L79.5 77 L78 78 L77 79.5 L76 78 L74.5 77 Z" fill="white" opacity="0.6"/>
    <path d="M69 77 Q76 69 82 69 Q88 69 95 77" fill="none" stroke="#1E3A8A" stroke-width="2" stroke-linecap="round"/>
    <path d="M69 77 Q66 73 64 69" fill="none" stroke="#1E3A8A" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M72 74 Q70 70 69 67" fill="none" stroke="#1E3A8A" stroke-width="1.1" stroke-linecap="round"/>

    <!-- Right eye -->
    <ellipse cx="118" cy="82" rx="13" ry="14" fill="white"/>
    <ellipse cx="118" cy="84" rx="9.5" ry="10.5" fill="url(#lunaEyeR)"/>
    <ellipse cx="118" cy="85" rx="4.5" ry="5.5" fill="#0C1445"/>
    <circle cx="113" cy="79" r="3.5" fill="white" opacity="0.95"/>
    <circle cx="122" cy="88" r="1.8" fill="white" opacity="0.7"/>
    <circle cx="115" cy="86" r="1" fill="white" opacity="0.5"/>
    <path d="M112 78 L113 76.5 L114 78 L115.5 77 L114 78 L113 79.5 L112 78 L110.5 77 Z" fill="white" opacity="0.6"/>
    <path d="M105 77 Q112 69 118 69 Q124 69 131 77" fill="none" stroke="#1E3A8A" stroke-width="2" stroke-linecap="round"/>
    <path d="M131 77 Q134 73 136 69" fill="none" stroke="#1E3A8A" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M128 74 Q130 70 131 67" fill="none" stroke="#1E3A8A" stroke-width="1.1" stroke-linecap="round"/>

    <!-- Blush -->
    <ellipse cx="68" cy="97" rx="9" ry="5" fill="#FCA5A5" filter="url(#lunaBlush)" opacity="0.4"/>
    <ellipse cx="132" cy="97" rx="9" ry="5" fill="#FCA5A5" filter="url(#lunaBlush)" opacity="0.4"/>

    <!-- Nose -->
    <ellipse cx="100" cy="93" rx="2" ry="1.5" fill="#F0C9A0" opacity="0.6"/>

    <!-- Mouth - neutral calm -->
    <path d="M94 105 Q100 109 106 105" fill="none" stroke="#D97070" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Hair wisps -->
    <path d="M88 38 Q86 48 89 55" fill="none" stroke="#60A5FA" stroke-width="1.3" opacity="0.3" stroke-linecap="round"/>
    <path d="M100 33 Q99 43 100 52" fill="none" stroke="#60A5FA" stroke-width="1.3" opacity="0.3" stroke-linecap="round"/>
  </g>
</svg>