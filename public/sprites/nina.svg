<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <defs>
    <linearGradient id="ninaHairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#292524"/>
      <stop offset="50%" stop-color="#1C1917"/>
      <stop offset="100%" stop-color="#0C0A09"/>
    </linearGradient>
    <linearGradient id="ninaHairShine" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#57534E" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#292524" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="ninaSkin" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#A0785A"/>
      <stop offset="80%" stop-color="#8B6544"/>
      <stop offset="100%" stop-color="#7A5638"/>
    </radialGradient>
    <radialGradient id="ninaEyeL" cx="42%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#C4A882"/>
      <stop offset="45%" stop-color="#78350F"/>
      <stop offset="100%" stop-color="#451A03"/>
    </radialGradient>
    <radialGradient id="ninaEyeR" cx="58%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#C4A882"/>
      <stop offset="45%" stop-color="#78350F"/>
      <stop offset="100%" stop-color="#451A03"/>
    </radialGradient>
    <linearGradient id="ninaTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7E22CE"/>
    </linearGradient>
    <linearGradient id="ninaSkirt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
    <linearGradient id="ninaShoe" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7E22CE"/>
    </linearGradient>
    <radialGradient id="ninaFlower" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </radialGradient>
    <filter id="ninaShadow" x="-15%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feOffset dx="1" dy="2" result="off"/>
      <feFlood flood-color="#000" flood-opacity="0.12"/>
      <feComposite in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ninaBlush" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
  </defs>

  <g filter="url(#ninaShadow)">
    <!-- LEGS -->
    <rect x="79" y="230" width="14" height="34" rx="7" fill="#8B6544"/>
    <rect x="107" y="230" width="14" height="34" rx="7" fill="#8B6544"/>

    <!-- Socks -->
    <rect x="77" y="250" width="18" height="14" rx="5" fill="white" stroke="#E9D5FF" stroke-width="0.6"/>
    <rect x="105" y="250" width="18" height="14" rx="5" fill="white" stroke="#E9D5FF" stroke-width="0.6"/>
    <rect x="77" y="250" width="18" height="3" rx="1.5" fill="#E9D5FF"/>
    <rect x="105" y="250" width="18" height="3" rx="1.5" fill="#E9D5FF"/>

    <!-- Shoes -->
    <ellipse cx="86" cy="270" rx="15" ry="7" fill="url(#ninaShoe)"/>
    <ellipse cx="114" cy="270" rx="15" ry="7" fill="url(#ninaShoe)"/>
    <ellipse cx="84" cy="268" rx="6" ry="2.5" fill="#C084FC" opacity="0.4"/>
    <ellipse cx="112" cy="268" rx="6" ry="2.5" fill="#C084FC" opacity="0.4"/>
    <path d="M74 268 Q86 262 98 268" fill="none" stroke="#6B21A8" stroke-width="1"/>
    <path d="M102 268 Q114 262 126 268" fill="none" stroke="#6B21A8" stroke-width="1"/>
    <!-- Small flower on shoe -->
    <circle cx="80" cy="268" r="2" fill="#FDE68A" opacity="0.7"/>
    <circle cx="108" cy="268" r="2" fill="#FDE68A" opacity="0.7"/>

    <!-- SKIRT -->
    <path d="M66 196 Q74 190 100 188 Q126 190 134 196 L142 248 Q125 254 100 254 Q75 254 58 248 Z" fill="url(#ninaSkirt)"/>
    <!-- Pleats -->
    <path d="M78 194 L74 250" fill="none" stroke="#D97706" stroke-width="0.7" opacity="0.25"/>
    <path d="M90 191 L86 252" fill="none" stroke="#D97706" stroke-width="0.7" opacity="0.25"/>
    <path d="M110 191 L114 252" fill="none" stroke="#D97706" stroke-width="0.7" opacity="0.25"/>
    <path d="M122 194 L126 250" fill="none" stroke="#D97706" stroke-width="0.7" opacity="0.25"/>
    <!-- Skirt highlight -->
    <path d="M70 198 Q100 192 130 198 L132 206 Q100 200 68 206 Z" fill="white" opacity="0.15"/>

    <!-- TOP -->
    <path d="M70 148 Q74 140 100 137 Q126 140 130 148 L134 198 Q126 192 100 190 Q74 192 66 198 Z" fill="url(#ninaTop)" stroke="#6B21A8" stroke-width="0.5"/>
    <!-- Neckline -->
    <path d="M82 146 Q100 152 118 146" fill="none" stroke="#9333EA" stroke-width="1.2" opacity="0.6"/>
    <!-- Top highlight -->
    <path d="M74 152 Q100 146 126 152 L126 160 Q100 154 74 160 Z" fill="white" opacity="0.1"/>
    <!-- Decorative pattern on top -->
    <path d="M88 165 Q92 160 96 165 Q100 160 104 165 Q108 160 112 165" fill="none" stroke="#C084FC" stroke-width="1" opacity="0.5"/>
    <path d="M90 175 Q94 170 98 175 Q102 170 106 175 Q110 170 114 175" fill="none" stroke="#C084FC" stroke-width="1" opacity="0.4"/>

    <!-- ARMS -->
    <!-- Left arm -->
    <path d="M70 152 Q60 168 56 186 Q55 192 59 192 Q63 190 66 182 Q70 170 74 160" fill="#8B6544" stroke="#7A5638" stroke-width="0.4"/>
    <ellipse cx="57" cy="191" rx="6" ry="5.5" fill="#A0785A"/>
    <path d="M52 189 Q51 186 53 184" fill="none" stroke="#7A5638" stroke-width="0.6" stroke-linecap="round"/>
    <!-- Left sleeve -->
    <path d="M70 148 Q64 154 62 162 Q68 158 72 151" fill="url(#ninaTop)" stroke="#6B21A8" stroke-width="0.4"/>

    <!-- Right arm -->
    <path d="M130 152 Q140 168 144 186 Q145 192 141 192 Q137 190 134 182 Q130 170 126 160" fill="#8B6544" stroke="#7A5638" stroke-width="0.4"/>
    <ellipse cx="143" cy="191" rx="6" ry="5.5" fill="#A0785A"/>
    <path d="M148 189 Q149 186 147 184" fill="none" stroke="#7A5638" stroke-width="0.6" stroke-linecap="round"/>
    <!-- Right sleeve -->
    <path d="M130 148 Q136 154 138 162 Q132 158 128 151" fill="url(#ninaTop)" stroke="#6B21A8" stroke-width="0.4"/>

    <!-- HEAD -->
    <!-- Afro hair back (big round shape) -->
    <circle cx="100" cy="62" r="62" fill="url(#ninaHairGrad)"/>
    <!-- Extra afro volume -->
    <circle cx="56" cy="50" r="20" fill="url(#ninaHairGrad)"/>
    <circle cx="144" cy="50" r="20" fill="url(#ninaHairGrad)"/>
    <circle cx="50" cy="72" r="18" fill="url(#ninaHairGrad)"/>
    <circle cx="150" cy="72" r="18" fill="url(#ninaHairGrad)"/>
    <circle cx="70" cy="22" r="18" fill="url(#ninaHairGrad)"/>
    <circle cx="100" cy="10" r="20" fill="url(#ninaHairGrad)"/>
    <circle cx="130" cy="22" r="18" fill="url(#ninaHairGrad)"/>
    <!-- Afro texture/shine -->
    <circle cx="72" cy="30" r="6" fill="url(#ninaHairShine)" opacity="0.3"/>
    <circle cx="100" cy="16" r="6" fill="url(#ninaHairShine)" opacity="0.25"/>
    <circle cx="128" cy="30" r="6" fill="url(#ninaHairShine)" opacity="0.3"/>
    <circle cx="52" cy="58" r="5" fill="url(#ninaHairShine)" opacity="0.2"/>
    <circle cx="148" cy="58" r="5" fill="url(#ninaHairShine)" opacity="0.2"/>

    <!-- FLOWER IN HAIR -->
    <!-- Petals -->
    <ellipse cx="140" cy="24" rx="6" ry="4" fill="#F472B6" transform="rotate(0 140 24)"/>
    <ellipse cx="140" cy="24" rx="6" ry="4" fill="#F472B6" transform="rotate(60 140 24)"/>
    <ellipse cx="140" cy="24" rx="6" ry="4" fill="#F472B6" transform="rotate(120 140 24)"/>
    <ellipse cx="140" cy="24" rx="6" ry="4" fill="#EC4899" opacity="0.6" transform="rotate(30 140 24)"/>
    <ellipse cx="140" cy="24" rx="6" ry="4" fill="#EC4899" opacity="0.6" transform="rotate(90 140 24)"/>
    <ellipse cx="140" cy="24" rx="6" ry="4" fill="#EC4899" opacity="0.6" transform="rotate(150 140 24)"/>
    <!-- Flower center -->
    <circle cx="140" cy="24" r="4" fill="url(#ninaFlower)"/>
    <circle cx="140" cy="24" r="2" fill="#F59E0B"/>

    <!-- Face -->
    <ellipse cx="100" cy="85" rx="48" ry="46" fill="url(#ninaSkin)"/>

    <!-- Ears -->
    <ellipse cx="54" cy="88" rx="5" ry="7" fill="#8B6544"/>
    <ellipse cx="54" cy="88" rx="2.5" ry="4" fill="#7A5638" opacity="0.4"/>
    <ellipse cx="146" cy="88" rx="5" ry="7" fill="#8B6544"/>
    <ellipse cx="146" cy="88" rx="2.5" ry="4" fill="#7A5638" opacity="0.4"/>
    <!-- Earrings -->
    <circle cx="54" cy="96" r="2.5" fill="#FDE68A" stroke="#F59E0B" stroke-width="0.4"/>
    <circle cx="146" cy="96" r="2.5" fill="#FDE68A" stroke="#F59E0B" stroke-width="0.4"/>

