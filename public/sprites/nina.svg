    <!-- Eyebrows -->
    <path d="M72 68 Q80 63 90 66" fill="none" stroke="#1C1917" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>
    <path d="M128 68 Q120 63 110 66" fill="none" stroke="#1C1917" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>

    <!-- Left eye -->
    <ellipse cx="82" cy="82" rx="13" ry="14" fill="white"/>
    <ellipse cx="82" cy="84" rx="9.5" ry="10.5" fill="url(#ninaEyeL)"/>
    <ellipse cx="82" cy="85" rx="4.5" ry="5.5" fill="#1C0A00"/>
    <circle cx="77" cy="79" r="3.5" fill="white" opacity="0.95"/>
    <circle cx="86" cy="88" r="1.8" fill="white" opacity="0.7"/>
    <circle cx="79" cy="86" r="1" fill="white" opacity="0.5"/>
    <path d="M76 78 L77 76.5 L78 78 L79.5 77 L78 78 L77 79.5 L76 78 L74.5 77 Z" fill="white" opacity="0.6"/>
    <path d="M69 77 Q76 69 82 69 Q88 69 95 77" fill="none" stroke="#1C1917" stroke-width="2" stroke-linecap="round"/>
    <path d="M69 77 Q66 73 64 69" fill="none" stroke="#1C1917" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M72 74 Q70 70 69 67" fill="none" stroke="#1C1917" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M95 77 Q97 74 98 71" fill="none" stroke="#1C1917" stroke-width="1" stroke-linecap="round"/>

    <!-- Right eye -->
    <ellipse cx="118" cy="82" rx="13" ry="14" fill="white"/>
    <ellipse cx="118" cy="84" rx="9.5" ry="10.5" fill="url(#ninaEyeR)"/>
    <ellipse cx="118" cy="85" rx="4.5" ry="5.5" fill="#1C0A00"/>
    <circle cx="113" cy="79" r="3.5" fill="white" opacity="0.95"/>
    <circle cx="122" cy="88" r="1.8" fill="white" opacity="0.7"/>
    <circle cx="115" cy="86" r="1" fill="white" opacity="0.5"/>
    <path d="M112 78 L113 76.5 L114 78 L115.5 77 L114 78 L113 79.5 L112 78 L110.5 77 Z" fill="white" opacity="0.6"/>
    <path d="M105 77 Q112 69 118 69 Q124 69 131 77" fill="none" stroke="#1C1917" stroke-width="2" stroke-linecap="round"/>
    <path d="M131 77 Q134 73 136 69" fill="none" stroke="#1C1917" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M128 74 Q130 70 131 67" fill="none" stroke="#1C1917" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M105 77 Q103 74 102 71" fill="none" stroke="#1C1917" stroke-width="1" stroke-linecap="round"/>

    <!-- Blush -->
    <ellipse cx="68" cy="97" rx="9" ry="5" fill="#D4846A" filter="url(#ninaBlush)" opacity="0.45"/>
    <ellipse cx="132" cy="97" rx="9" ry="5" fill="#D4846A" filter="url(#ninaBlush)" opacity="0.45"/>

    <!-- Nose -->
    <ellipse cx="100" cy="93" rx="2.5" ry="2" fill="#7A5638" opacity="0.5"/>

    <!-- Mouth - neutral warm -->
    <path d="M93 105 Q100 110 107 105" fill="none" stroke="#A0522D" stroke-width="1.6" stroke-linecap="round"/>
  </g>
</svg>