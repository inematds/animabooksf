<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <defs>
    <linearGradient id="raviHairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#292524"/>
      <stop offset="50%" stop-color="#1C1917"/>
      <stop offset="100%" stop-color="#0C0A09"/>
    </linearGradient>
    <linearGradient id="raviHairShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#57534E" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#292524" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="raviSkin" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#A0785A"/>
      <stop offset="80%" stop-color="#8B6544"/>
      <stop offset="100%" stop-color="#7A5638"/>
    </radialGradient>
    <radialGradient id="raviEyeL" cx="42%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#C4A882"/>
      <stop offset="45%" stop-color="#78350F"/>
      <stop offset="100%" stop-color="#451A03"/>
    </radialGradient>
    <radialGradient id="raviEyeR" cx="58%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#C4A882"/>
      <stop offset="45%" stop-color="#78350F"/>
      <stop offset="100%" stop-color="#451A03"/>
    </radialGradient>
    <linearGradient id="raviShirt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
    <linearGradient id="raviPants" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#57534E"/>
      <stop offset="100%" stop-color="#3F3B37"/>
    </linearGradient>
    <linearGradient id="raviShoe" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="raviGlassFrame" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
    <filter id="raviShadow" x="-15%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feOffset dx="1" dy="2" result="off"/>
      <feFlood flood-color="#000" flood-opacity="0.12"/>
      <feComposite in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="raviBlush" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
  </defs>

  <g filter="url(#raviShadow)">
    <!-- LEGS -->
    <rect x="78" y="215" width="16" height="48" rx="7" fill="url(#raviPants)"/>
    <rect x="106" y="215" width="16" height="48" rx="7" fill="url(#raviPants)"/>
    <path d="M86 218 L86 258" fill="none" stroke="#292524" stroke-width="0.5" opacity="0.3"/>
    <path d="M114 218 L114 258" fill="none" stroke="#292524" stroke-width="0.5" opacity="0.3"/>

    <!-- Shoes -->
    <ellipse cx="86" cy="270" rx="16" ry="8" fill="url(#raviShoe)"/>
    <ellipse cx="114" cy="270" rx="16" ry="8" fill="url(#raviShoe)"/>
    <path d="M74 268 Q86 262 98 268" fill="none" stroke="#1E3A8A" stroke-width="1.2"/>
    <path d="M102 268 Q114 262 126 268" fill="none" stroke="#1E3A8A" stroke-width="1.2"/>
    <path d="M72 272 Q86 276 100 272" fill="none" stroke="#1E3A8A" stroke-width="1.2"/>
    <path d="M100 272 Q114 276 128 272" fill="none" stroke="#1E3A8A" stroke-width="1.2"/>
    <!-- White sole accent -->
    <ellipse cx="86" cy="272" rx="14" ry="3" fill="white" opacity="0.3"/>
    <ellipse cx="114" cy="272" rx="14" ry="3" fill="white" opacity="0.3"/>

    <!-- SHIRT -->
    <path d="M68 152 Q74 144 100 141 Q126 144 132 152 L136 218 Q126 212 100 210 Q74 212 64 218 Z" fill="url(#raviShirt)" stroke="#C2410C" stroke-width="0.5"/>
    <!-- Collar -->
    <path d="M82 148 Q100 156 118 148" fill="none" stroke="#C2410C" stroke-width="1.2" opacity="0.5"/>
    <!-- Shirt buttons -->
    <circle cx="100" cy="162" r="1.5" fill="#FDE68A" opacity="0.6"/>
    <circle cx="100" cy="174" r="1.5" fill="#FDE68A" opacity="0.6"/>
    <circle cx="100" cy="186" r="1.5" fill="#FDE68A" opacity="0.6"/>
    <!-- Shirt highlight -->
    <path d="M72 156 Q100 148 128 156 L128 164 Q100 156 72 164 Z" fill="white" opacity="0.1"/>
    <!-- Pocket with pen -->
    <rect x="108" y="160" width="14" height="12" rx="2" fill="none" stroke="#C2410C" stroke-width="0.7" opacity="0.4"/>
    <rect x="112" y="156" width="3" height="10" rx="1" fill="#3B82F6" opacity="0.5"/>
    <circle cx="113.5" cy="156" r="1" fill="#60A5FA" opacity="0.6"/>

    <!-- ARMS -->
    <!-- Left arm -->
    <path d="M68 155 Q58 170 54 188 Q53 194 57 194 Q61 192 64 184 Q68 172 72 162" fill="#8B6544" stroke="#7A5638" stroke-width="0.4"/>
    <ellipse cx="55" cy="193" rx="6" ry="5.5" fill="#A0785A"/>
    <path d="M50 191 Q49 188 51 186" fill="none" stroke="#7A5638" stroke-width="0.6" stroke-linecap="round"/>
    <!-- Left sleeve -->
    <path d="M68 152 Q62 158 60 166 Q66 162 70 155" fill="url(#raviShirt)" stroke="#C2410C" stroke-width="0.4"/>

    <!-- Right arm -->
    <path d="M132 155 Q142 170 146 188 Q147 194 143 194 Q139 192 136 184 Q132 172 128 162" fill="#8B6544" stroke="#7A5638" stroke-width="0.4"/>
    <ellipse cx="145" cy="193" rx="6" ry="5.5" fill="#A0785A"/>
    <path d="M150 191 Q151 188 149 186" fill="none" stroke="#7A5638" stroke-width="0.6" stroke-linecap="round"/>
    <!-- Right sleeve -->
    <path d="M132 152 Q138 158 140 166 Q134 162 130 155" fill="url(#raviShirt)" stroke="#C2410C" stroke-width="0.4"/>

    <!-- HEAD -->
    <!-- Hair back (curly volume) -->
    <ellipse cx="100" cy="68" rx="56" ry="54" fill="url(#raviHairGrad)"/>
    <!-- Curly puff top -->
    <circle cx="78" cy="36" r="14" fill="url(#raviHairGrad)"/>
    <circle cx="100" cy="28" r="16" fill="url(#raviHairGrad)"/>
    <circle cx="122" cy="36" r="14" fill="url(#raviHairGrad)"/>
    <circle cx="88" cy="30" r="12" fill="url(#raviHairGrad)"/>
    <circle cx="112" cy="30" r="12" fill="url(#raviHairGrad)"/>
    <!-- Curly shine -->
    <circle cx="95" cy="24" r="4" fill="url(#raviHairShine)" opacity="0.3"/>
    <circle cx="108" cy="26" r="4" fill="url(#raviHairShine)" opacity="0.25"/>

    <!-- Face -->
    <ellipse cx="100" cy="85" rx="48" ry="46" fill="url(#raviSkin)"/>

    <!-- Hair bangs (curly short) -->
    <path d="M52 72 Q56 42 78 32 Q92 26 100 28 Q108 26 122 32 Q144 42 148 72 Q146 56 138 46 Q128 38 118 42 Q108 34 100 32 Q92 34 82 42 Q72 38 62 46 Q54 56 52 72" fill="url(#raviHairGrad)"/>
    <!-- Curly bang details -->
    <circle cx="70" cy="54" r="8" fill="url(#raviHairGrad)"/>
    <circle cx="84" cy="42" r="9" fill="url(#raviHairGrad)"/>
    <circle cx="100" cy="36" r="9" fill="url(#raviHairGrad)"/>
    <circle cx="116" cy="42" r="9" fill="url(#raviHairGrad)"/>
    <circle cx="130" cy="54" r="8" fill="url(#raviHairGrad)"/>

    <!-- Ears -->
    <ellipse cx="54" cy="88" rx="5" ry="7" fill="#8B6544"/>
    <ellipse cx="54" cy="88" rx="2.5" ry="4" fill="#7A5638" opacity="0.4"/>
    <ellipse cx="146" cy="88" rx="5" ry="7" fill="#8B6544"/>
    <ellipse cx="146" cy="88" rx="2.5" ry="4" fill="#7A5638" opacity="0.4"/>

    <!-- FACE -->
    <!-- Eyebrows -->
    <path d="M69 66 Q78 60 89 64" fill="none" stroke="#1C1917" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
    <path d="M131 66 Q122 60 111 64" fill="none" stroke="#1C1917" stroke-width="2" stroke-linecap="round" opacity="0.7"/>

    <!-- GLASSES -->
    <!-- Left lens -->
    <ellipse cx="82" cy="82" rx="16" ry="16" fill="none" stroke="url(#raviGlassFrame)" stroke-width="2.2"/>
    <!-- Right lens -->
    <ellipse cx="118" cy="82" rx="16" ry="16" fill="none" stroke="url(#raviGlassFrame)" stroke-width="2.2"/>
    <!-- Bridge -->
    <path d="M97 82 Q100 78 103 82" fill="none" stroke="#374151" stroke-width="2"/>
    <!-- Temple arms -->
    <path d="M66 80 Q58 80 54 84" fill="none" stroke="#374151" stroke-width="1.8" stroke-linecap="round"/>
    <path d="M134 80 Q142 80 146 84" fill="none" stroke="#374151" stroke-width="1.8" stroke-linecap="round"/>
    <!-- Lens shine -->
    <ellipse cx="76" cy="76" rx="4" ry="3" fill="white" opacity="0.15"/>
    <ellipse cx="112" cy="76" rx="4" ry="3" fill="white" opacity="0.15"/>

    <!-- Left eye (behind glasses) -->
    <ellipse cx="82" cy="82" rx="12" ry="13" fill="white"/>
    <ellipse cx="82" cy="84" rx="8.5" ry="9.5" fill="url(#raviEyeL)"/>
    <ellipse cx="82" cy="85" rx="4" ry="5" fill="#1C0A00"/>
    <circle cx="78" cy="80" r="3" fill="white" opacity="0.95"/>
    <circle cx="86" cy="87" r="1.5" fill="white" opacity="0.7"/>
    <path d="M70 78 Q77 71 82 71 Q87 71 94 78" fill="none" stroke="#1C1917" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Right eye (behind glasses) -->
    <ellipse cx="118" cy="82" rx="12" ry="13" fill="white"/>
    <ellipse cx="118" cy="84" rx="8.5" ry="9.5" fill="url(#raviEyeR)"/>
    <ellipse cx="118" cy="85" rx="4" ry="5" fill="#1C0A00"/>
    <circle cx="114" cy="80" r="3" fill="white" opacity="0.95"/>
    <circle cx="122" cy="87" r="1.5" fill="white" opacity="0.7"/>
    <path d="M106 78 Q113 71 118 71 Q123 71 130 78" fill="none" stroke="#1C1917" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Blush -->
    <ellipse cx="66" cy="100" rx="8" ry="4" fill="#D4846A" filter="url(#raviBlush)" opacity="0.4"/>
    <ellipse cx="134" cy="100" rx="8" ry="4" fill="#D4846A" filter="url(#raviBlush)" opacity="0.4"/>

    <!-- Nose -->
    <ellipse cx="100" cy="93" rx="2.5" ry="2" fill="#7A5638" opacity="0.5"/>

    <!-- Mouth - neutral -->
    <path d="M93 106 Q100 110 107 106" fill="none" stroke="#A0522D" stroke-width="1.6" stroke-linecap="round"/>
  </g>
</svg>