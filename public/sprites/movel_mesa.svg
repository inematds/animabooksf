<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="mesa_top" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C49451"/>
      <stop offset="100%" stop-color="#A0714A"/>
    </linearGradient>
    <linearGradient id="mesa_top_surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#D4A86A"/>
      <stop offset="100%" stop-color="#C49451"/>
    </linearGradient>
    <linearGradient id="mesa_leg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A0714A"/>
      <stop offset="50%" stop-color="#B8854D"/>
      <stop offset="100%" stop-color="#8B6338"/>
    </linearGradient>
    <filter id="mesa_shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#00000030"/>
    </filter>
  </defs>
  <!-- Table top - side (3D effect) -->
  <rect x="8" y="42" width="104" height="10" rx="2" fill="url(#mesa_top)" filter="url(#mesa_shadow)"/>
  <!-- Table top - surface -->
  <rect x="8" y="38" width="104" height="8" rx="2" fill="url(#mesa_top_surface)"/>
  <!-- Wood grain lines on top -->
  <line x1="20" y1="41" x2="100" y2="41" stroke="#B8854D" stroke-width="0.5" opacity="0.3"/>
  <line x1="15" y1="43" x2="105" y2="43" stroke="#8B6338" stroke-width="0.5" opacity="0.3"/>
  <!-- Highlight on top -->
  <rect x="15" y="39" width="90" height="2" rx="1" fill="white" opacity="0.15"/>
  <!-- Left front leg -->
  <rect x="16" y="52" width="10" height="55" rx="2" fill="url(#mesa_leg)"/>
  <!-- Right front leg -->
  <rect x="94" y="52" width="10" height="55" rx="2" fill="url(#mesa_leg)"/>
  <!-- Left back leg (partially hidden) -->
  <rect x="22" y="48" width="8" height="52" rx="2" fill="#8B6338" opacity="0.6"/>
  <!-- Right back leg (partially hidden) -->
  <rect x="90" y="48" width="8" height="52" rx="2" fill="#8B6338" opacity="0.6"/>
  <!-- Cross support bar -->
  <rect x="24" y="82" width="72" height="5" rx="1.5" fill="url(#mesa_leg)"/>
  <!-- Leg detail lines -->
  <line x1="21" y1="60" x2="21" y2="100" stroke="#A0714A" stroke-width="0.5" opacity="0.3"/>
  <line x1="99" y1="60" x2="99" y2="100" stroke="#A0714A" stroke-width="0.5" opacity="0.3"/>
</svg>