<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="passaro_body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5CB8E6"/>
      <stop offset="100%" stop-color="#3A8FBF"/>
    </linearGradient>
    <linearGradient id="passaro_belly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF8DC"/>
      <stop offset="100%" stop-color="#FFE4B5"/>
    </linearGradient>
    <linearGradient id="passaro_wing" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4AA8D8"/>
      <stop offset="100%" stop-color="#2E7DAF"/>
    </linearGradient>
    <radialGradient id="passaro_cheek" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFB6C1" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFB6C1" stop-opacity="0"/>
    </radialGradient>
    <filter id="passaro_shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#00000030"/>
    </filter>
  </defs>
  <!-- Body -->
  <ellipse cx="60" cy="68" rx="24" ry="28" fill="url(#passaro_body)" filter="url(#passaro_shadow)"/>
  <!-- Belly -->
  <ellipse cx="60" cy="74" rx="16" ry="18" fill="url(#passaro_belly)"/>
  <!-- Head -->
  <circle cx="60" cy="38" r="20" fill="url(#passaro_body)"/>
  <!-- Wing left -->
  <ellipse cx="34" cy="65" rx="14" ry="20" fill="url(#passaro_wing)" transform="rotate(20,34,65)"/>
  <!-- Wing right -->
  <ellipse cx="86" cy="65" rx="14" ry="20" fill="url(#passaro_wing)" transform="rotate(-20,86,65)"/>
  <!-- Eyes -->
  <circle cx="51" cy="35" r="5" fill="white"/>
  <circle cx="69" cy="35" r="5" fill="white"/>
  <circle cx="52" cy="36" r="3" fill="#1A1A2E"/>
  <circle cx="70" cy="36" r="3" fill="#1A1A2E"/>
  <circle cx="53" cy="34.5" r="1.2" fill="white"/>
  <circle cx="71" cy="34.5" r="1.2" fill="white"/>
  <!-- Beak -->
  <polygon points="55,43 60,50 65,43" fill="#FFA500"/>
  <polygon points="56,43 60,47 64,43" fill="#FFD700"/>
  <!-- Cheeks -->
  <circle cx="43" cy="42" r="5" fill="url(#passaro_cheek)"/>
  <circle cx="77" cy="42" r="5" fill="url(#passaro_cheek)"/>
  <!-- Tail feathers -->
  <ellipse cx="60" cy="96" rx="6" ry="10" fill="url(#passaro_wing)"/>
  <ellipse cx="52" cy="94" rx="5" ry="9" fill="url(#passaro_body)" transform="rotate(10,52,94)"/>
  <ellipse cx="68" cy="94" rx="5" ry="9" fill="url(#passaro_body)" transform="rotate(-10,68,94)"/>
  <!-- Feet -->
  <path d="M50,95 L46,108 M50,95 L50,108 M50,95 L54,108" fill="none" stroke="#FFA500" stroke-width="2" stroke-linecap="round"/>
  <path d="M70,95 L66,108 M70,95 L70,108 M70,95 L74,108" fill="none" stroke="#FFA500" stroke-width="2" stroke-linecap="round"/>
  <!-- Head tuft -->
  <ellipse cx="60" cy="18" rx="3" ry="6" fill="#4AA8D8"/>
  <ellipse cx="55" cy="20" rx="2.5" ry="5" fill="#5CB8E6" transform="rotate(-15,55,20)"/>
  <ellipse cx="65" cy="20" rx="2.5" ry="5" fill="#5CB8E6" transform="rotate(15,65,20)"/>
</svg>