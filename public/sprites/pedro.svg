<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <defs>
    <linearGradient id="pedroHairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="50%" stop-color="#1F2937"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="pedroHairShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6B7280" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#374151" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="pedroSkin" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFF0E0"/>
      <stop offset="80%" stop-color="#FDDCBD"/>
      <stop offset="100%" stop-color="#F5CEAA"/>
    </radialGradient>
    <radialGradient id="pedroEyeL" cx="42%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#C4A882"/>
      <stop offset="45%" stop-color="#92400E"/>
      <stop offset="100%" stop-color="#451A03"/>
    </radialGradient>
    <radialGradient id="pedroEyeR" cx="58%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#C4A882"/>
      <stop offset="45%" stop-color="#92400E"/>
      <stop offset="100%" stop-color="#451A03"/>
    </radialGradient>
    <linearGradient id="pedroShirt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EF4444"/>
      <stop offset="100%" stop-color="#B91C1C"/>
    </linearGradient>
    <linearGradient id="pedroJeans" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1D4ED8"/>
    </linearGradient>
    <linearGradient id="pedroShoe" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5F5F4"/>
      <stop offset="100%" stop-color="#D6D3D1"/>
    </linearGradient>
    <filter id="pedroShadow" x="-15%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feOffset dx="1" dy="2" result="off"/>
      <feFlood flood-color="#000" flood-opacity="0.12"/>
      <feComposite in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="pedroBlush" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
  </defs>

  <g filter="url(#pedroShadow)">
    <!-- LEGS (jeans) -->
    <rect x="78" y="210" width="16" height="52" rx="7" fill="url(#pedroJeans)"/>
    <rect x="106" y="210" width="16" height="52" rx="7" fill="url(#pedroJeans)"/>
    <!-- Jean seams -->
    <path d="M86 214 L86 258" fill="none" stroke="#1E40AF" stroke-width="0.5" opacity="0.4"/>
    <path d="M114 214 L114 258" fill="none" stroke="#1E40AF" stroke-width="0.5" opacity="0.4"/>
    <!-- Jean cuffs -->
    <rect x="77" y="254" width="18" height="4" rx="2" fill="#2563EB" opacity="0.6"/>
    <rect x="105" y="254" width="18" height="4" rx="2" fill="#2563EB" opacity="0.6"/>

    <!-- Shoes (sneakers) -->
    <ellipse cx="86" cy="270" rx="16" ry="8" fill="url(#pedroShoe)"/>
    <ellipse cx="114" cy="270" rx="16" ry="8" fill="url(#pedroShoe)"/>
    <!-- Shoe accent stripe -->
    <path d="M74 270 Q86 264 98 270" fill="none" stroke="#EF4444" stroke-width="1.8"/>
    <path d="M102 270 Q114 264 126 270" fill="none" stroke="#EF4444" stroke-width="1.8"/>
    <!-- Sole -->
    <path d="M72 272 Q86 276 100 272" fill="none" stroke="#78716C" stroke-width="1.5"/>
    <path d="M100 272 Q114 276 128 272" fill="none" stroke="#78716C" stroke-width="1.5"/>

    <!-- SHIRT -->
    <path d="M68 152 Q74 144 100 141 Q126 144 132 152 L134 210 Q126 205 100 203 Q74 205 66 210 Z" fill="url(#pedroShirt)" stroke="#991B1B" stroke-width="0.5"/>
    <!-- Collar (crew neck) -->
    <path d="M84 148 Q100 154 116 148" fill="none" stroke="#991B1B" stroke-width="1.2" opacity="0.6"/>
    <!-- Shirt highlight -->
    <path d="M72 156 Q100 148 128 156 L128 164 Q100 156 72 164 Z" fill="white" opacity="0.1"/>
    <!-- Small pocket -->
    <rect x="78" y="168" width="14" height="12" rx="2" fill="none" stroke="#991B1B" stroke-width="0.7" opacity="0.4"/>
    <path d="M78 168 L92 168" stroke="#DC2626" stroke-width="1" opacity="0.5"/>

    <!-- ARMS -->
    <!-- Left arm -->
    <path d="M68 155 Q58 170 54 188 Q53 194 57 194 Q61 192 64 184 Q68 172 72 162" fill="#FDDCBD" stroke="#F0C9A0" stroke-width="0.4"/>
    <ellipse cx="55" cy="193" rx="6" ry="5.5" fill="#FFF0E0"/>
    <path d="M50 191 Q49 188 51 186" fill="none" stroke="#F0C9A0" stroke-width="0.6" stroke-linecap="round"/>
    <!-- Left sleeve -->
    <path d="M68 152 Q62 158 60 166 Q66 162 70 155" fill="url(#pedroShirt)" stroke="#991B1B" stroke-width="0.4"/>

    <!-- Right arm -->
    <path d="M132 155 Q142 170 146 188 Q147 194 143 194 Q139 192 136 184 Q132 172 128 162" fill="#FDDCBD" stroke="#F0C9A0" stroke-width="0.4"/>
    <ellipse cx="145" cy="193" rx="6" ry="5.5" fill="#FFF0E0"/>
    <path d="M150 191 Q151 188 149 186" fill="none" stroke="#F0C9A0" stroke-width="0.6" stroke-linecap="round"/>
    <!-- Right sleeve -->
    <path d="M132 152 Q138 158 140 166 Q134 162 130 155" fill="url(#pedroShirt)" stroke="#991B1B" stroke-width="0.4"/>

    <!-- HEAD -->
    <!-- Hair back -->
    <ellipse cx="100" cy="70" rx="55" ry="52" fill="url(#pedroHairGrad)"/>

    <!-- Face -->
    <ellipse cx="100" cy="85" rx="48" ry="46" fill="url(#pedroSkin)"/>

    <!-- Hair (short, spiky-ish) -->
    <path d="M50 68 Q54 32 78 22 Q92 18 100 20 Q108 18 122 22 Q146 32 150 68 Q148 50 140 42 Q130 34 122 38 Q114 30 100 28 Q86 30 78 38 Q70 34 60 42 Q52 50 50 68" fill="url(#pedroHairGrad)"/>
    <!-- Short hair top spikes -->
    <path d="M75 28 Q78 18 82 24" fill="url(#pedroHairGrad)" stroke="none"/>
    <path d="M92 22 Q96 12 100 20" fill="url(#pedroHairGrad)" stroke="none"/>
    <path d="M110 22 Q114 14 118 22" fill="url(#pedroHairGrad)" stroke="none"/>
    <!-- Hair shine -->
    <path d="M65 56 Q72 36 88 28 Q94 26 98 28 Q92 34 86 42 Q78 50 70 58" fill="url(#pedroHairShine)" opacity="0.4"/>

    <!-- Ears -->
    <ellipse cx="54" cy="88" rx="5" ry="7" fill="#FDDCBD"/>
    <ellipse cx="54" cy="88" rx="2.5" ry="4" fill="#F0C9A0" opacity="0.4"/>
    <ellipse cx="146" cy="88" rx="5" ry="7" fill="#FDDCBD"/>
    <ellipse cx="146" cy="88" rx="2.5" ry="4" fill="#F0C9A0" opacity="0.4"/>

    <!-- FACE -->
    <!-- Eyebrows (thicker, boyish) -->
    <path d="M71 68 Q80 62 91 66" fill="none" stroke="#1F2937" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
    <path d="M129 68 Q120 62 109 66" fill="none" stroke="#1F2937" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

    <!-- Left eye -->
    <ellipse cx="82" cy="82" rx="12" ry="13" fill="white"/>
    <ellipse cx="82" cy="84" rx="8.5" ry="9.5" fill="url(#pedroEyeL)"/>
    <ellipse cx="82" cy="85" rx="4" ry="5" fill="#1C0A00"/>
    <circle cx="78" cy="80" r="3" fill="white" opacity="0.95"/>
    <circle cx="86" cy="87" r="1.5" fill="white" opacity="0.7"/>
    <path d="M70 78 Q77 71 82 71 Q87 71 94 78" fill="none" stroke="#1F2937" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Right eye -->
    <ellipse cx="118" cy="82" rx="12" ry="13" fill="white"/>
    <ellipse cx="118" cy="84" rx="8.5" ry="9.5" fill="url(#pedroEyeR)"/>
    <ellipse cx="118" cy="85" rx="4" ry="5" fill="#1C0A00"/>
    <circle cx="114" cy="80" r="3" fill="white" opacity="0.95"/>
    <circle cx="122" cy="87" r="1.5" fill="white" opacity="0.7"/>
    <path d="M106 78 Q113 71 118 71 Q123 71 130 78" fill="none" stroke="#1F2937" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Blush -->
    <ellipse cx="68" cy="97" rx="8" ry="5" fill="#FCA5A5" filter="url(#pedroBlush)" opacity="0.35"/>
    <ellipse cx="132" cy="97" rx="8" ry="5" fill="#FCA5A5" filter="url(#pedroBlush)" opacity="0.35"/>

    <!-- Nose -->
    <ellipse cx="100" cy="93" rx="2.5" ry="1.8" fill="#F0C9A0" opacity="0.6"/>

    <!-- Mouth - neutral -->
    <path d="M93 106 Q100 109 107 106" fill="none" stroke="#D97070" stroke-width="1.6" stroke-linecap="round"/>

    <!-- Hair wisps -->
    <path d="M85 32 Q84 40 86 48" fill="none" stroke="#4B5563" stroke-width="1.2" opacity="0.3" stroke-linecap="round"/>
    <path d="M100 28 Q99 38 100 46" fill="none" stroke="#4B5563" stroke-width="1.2" opacity="0.3" stroke-linecap="round"/>
  </g>
</svg>