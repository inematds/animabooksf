    <path d="M70 155 Q74 147 100 144 Q126 147 130 155 L132 200 Q126 194 100 192 Q74 194 68 200 Z" fill="url(#lumiShirt)" stroke="#E9D5FF" stroke-width="0.5"/>
    <!-- Collar -->
    <path d="M83 151 L100 168 L117 151" fill="none" stroke="#D8B4FE" stroke-width="1.4"/>
    <path d="M83 151 L93 161 L100 147" fill="white" stroke="#D8B4FE" stroke-width="0.5"/>
    <path d="M117 151 L107 161 L100 147" fill="white" stroke="#D8B4FE" stroke-width="0.5"/>
    <!-- Bow -->
    <path d="M94 154 Q97 149 100 154 Q103 149 106 154 Q103 157 100 154 Q97 157 94 154" fill="#F472B6"/>
    <circle cx="100" cy="154" r="2" fill="#EC4899"/>
    <!-- Buttons -->
    <circle cx="100" cy="173" r="1" fill="#D8B4FE"/>
    <circle cx="100" cy="183" r="1" fill="#D8B4FE"/>

    <!-- ======= ARMS ======= -->
    <!-- Left arm -->
    <path d="M70 158 Q60 172 56 190 Q55 196 59 196 Q63 194 66 186 Q70 174 74 164" fill="#FDDCBD" stroke="#F0C9A0" stroke-width="0.4"/>
    <ellipse cx="57" cy="195" rx="6" ry="5.5" fill="#FFF0E0"/>
    <!-- Left fingers hint -->
    <path d="M52 193 Q51 190 53 188" fill="none" stroke="#F0C9A0" stroke-width="0.6" stroke-linecap="round"/>
    <!-- Left sleeve -->
    <path d="M70 155 Q64 160 62 166 Q68 163 72 157" fill="url(#lumiShirt)" stroke="#E9D5FF" stroke-width="0.4"/>

    <!-- Right arm -->
    <path d="M130 158 Q140 172 144 190 Q145 196 141 196 Q137 194 134 186 Q130 174 126 164" fill="#FDDCBD" stroke="#F0C9A0" stroke-width="0.4"/>
    <ellipse cx="143" cy="195" rx="6" ry="5.5" fill="#FFF0E0"/>
    <path d="M148 193 Q149 190 147 188" fill="none" stroke="#F0C9A0" stroke-width="0.6" stroke-linecap="round"/>
    <!-- Right sleeve -->
    <path d="M130 155 Q136 160 138 166 Q132 163 128 157" fill="url(#lumiShirt)" stroke="#E9D5FF" stroke-width="0.4"/>

    <!-- ======= HEAD ======= -->

