    <ellipse cx="100" cy="75" rx="60" ry="58" fill="url(#lumiHairGrad)"/>

    <!-- Face -->
    <ellipse cx="100" cy="85" rx="48" ry="46" fill="url(#lumiSkin)"/>

    <!-- Hair bangs front -->
    <path d="M52 72 Q56 38 78 28 Q92 24 100 26 Q108 24 122 28 Q144 38 148 72 Q146 58 138 50 Q128 42 120 48 Q112 38 100 36 Q88 38 80 48 Q72 42 62 50 Q54 58 52 72" fill="url(#lumiHairGrad)"/>
    <!-- Bangs shine -->
    <path d="M62 64 Q68 42 84 34 Q92 30 98 32 Q93 38 86 46 Q78 54 68 64" fill="url(#lumiHairShine)" opacity="0.5"/>
    <path d="M110 40 Q116 36 124 38 Q130 42 134 50 Q128 44 120 42 Q114 42 110 44" fill="url(#lumiHairShine)" opacity="0.3"/>

    <!-- Left pigtail -->
    <path d="M54 58 Q32 64 26 88 Q22 108 27 128 Q30 140 38 144 Q46 146 48 134 Q50 118 47 98 Q45 78 54 58" fill="url(#lumiHairGrad)"/>
    <path d="M48 68 Q36 78 32 98 Q30 112 34 126" fill="none" stroke="#EDE0F7" stroke-width="2" opacity="0.35"/>
    <!-- Left hair tie -->
    <ellipse cx="52" cy="60" rx="7" ry="5" fill="url(#lumiBand)"/>
    <ellipse cx="52" cy="60" rx="4.5" ry="3" fill="#F472B6" opacity="0.5"/>
    <!-- Left pigtail curl at end -->
    <path d="M38 142 Q34 148 38 150 Q42 148 40 144" fill="url(#lumiHairGrad)"/>

    <!-- Right pigtail -->
    <path d="M146 58 Q168 64 174 88 Q178 108 173 128 Q170 140 162 144 Q154 146 152 134 Q150 118 153 98 Q155 78 146 58" fill="url(#lumiHairGrad)"/>
    <path d="M152 68 Q164 78 168 98 Q170 112 166 126" fill="none" stroke="#EDE0F7" stroke-width="2" opacity="0.35"/>
    <!-- Right hair tie -->
    <ellipse cx="148" cy="60" rx="7" ry="5" fill="url(#lumiBand)"/>
    <ellipse cx="148" cy="60" rx="4.5" ry="3" fill="#F472B6" opacity="0.5"/>
    <!-- Right pigtail curl -->
    <path d="M162 142 Q166 148 162 150 Q158 148 160 144" fill="url(#lumiHairGrad)"/>

    <!-- Ears -->
    <ellipse cx="54" cy="88" rx="5" ry="7" fill="#FDDCBD"/>
    <ellipse cx="54" cy="88" rx="2.5" ry="4" fill="#F0C9A0" opacity="0.4"/>
    <ellipse cx="146" cy="88" rx="5" ry="7" fill="#FDDCBD"/>
    <ellipse cx="146" cy="88" rx="2.5" ry="4" fill="#F0C9A0" opacity="0.4"/>

    <!-- ======= FACE ======= -->

    <!-- Eyebrows -->
    <path d="M72 68 Q80 62 90 65" fill="none" stroke="#7C3AED" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>
    <path d="M128 68 Q120 62 110 65" fill="none" stroke="#7C3AED" stroke-width="1.6" stroke-linecap="round" opacity="0.6"/>

    <!-- Left eye -->
    <ellipse cx="82" cy="82" rx="13" ry="14" fill="white"/>
    <ellipse cx="82" cy="84" rx="9.5" ry="10.5" fill="url(#lumiEyeL)"/>
    <ellipse cx="82" cy="85" rx="4.5" ry="5.5" fill="#2E1065"/>
    <!-- Sparkles -->
    <circle cx="77" cy="79" r="3.5" fill="white" opacity="0.95"/>
    <circle cx="86" cy="88" r="1.8" fill="white" opacity="0.7"/>
    <circle cx="79" cy="86" r="1" fill="white" opacity="0.5"/>
    <!-- Star sparkle in eye -->
    <path d="M76 78 L77 76.5 L78 78 L79.5 77 L78 78 L77 79.5 L76 78 L74.5 77 Z" fill="white" opacity="0.6"/>
    <!-- Upper lid -->
    <path d="M69 77 Q76 69 82 69 Q88 69 95 77" fill="none" stroke="#5B21B6" stroke-width="2" stroke-linecap="round"/>
    <!-- Lashes -->
    <path d="M69 77 Q66 73 64 69" fill="none" stroke="#5B21B6" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M72 74 Q70 70 69 67" fill="none" stroke="#5B21B6" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M95 77 Q97 74 98 71" fill="none" stroke="#5B21B6" stroke-width="1" stroke-linecap="round"/>

    <!-- Right eye -->
    <ellipse cx="118" cy="82" rx="13" ry="14" fill="white"/>
    <ellipse cx="118" cy="84" rx="9.5" ry="10.5" fill="url(#lumiEyeR)"/>
    <ellipse cx="118" cy="85" rx="4.5" ry="5.5" fill="#2E1065"/>
    <circle cx="113" cy="79" r="3.5" fill="white" opacity="0.95"/>
    <circle cx="122" cy="88" r="1.8" fill="white" opacity="0.7"/>
    <circle cx="115" cy="86" r="1" fill="white" opacity="0.5"/>
    <path d="M112 78 L113 76.5 L114 78 L115.5 77 L114 78 L113 79.5 L112 78 L110.5 77 Z" fill="white" opacity="0.6"/>
    <path d="M105 77 Q112 69 118 69 Q124 69 131 77" fill="none" stroke="#5B21B6" stroke-width="2" stroke-linecap="round"/>
    <path d="M131 77 Q134 73 136 69" fill="none" stroke="#5B21B6" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M128 74 Q130 70 131 67" fill="none" stroke="#5B21B6" stroke-width="1.1" stroke-linecap="round"/>
    <path d="M105 77 Q103 74 102 71" fill="none" stroke="#5B21B6" stroke-width="1" stroke-linecap="round"/>

    <!-- Blush -->
    <ellipse cx="68" cy="97" rx="9" ry="5" fill="#FCA5A5" filter="url(#lumiBlush)" opacity="0.45"/>
    <ellipse cx="132" cy="97" rx="9" ry="5" fill="#FCA5A5" filter="url(#lumiBlush)" opacity="0.45"/>

    <!-- Nose -->
    <ellipse cx="100" cy="93" rx="2" ry="1.5" fill="#F0C9A0" opacity="0.6"/>

    <!-- Mouth - neutral curious -->
    <path d="M93 105 Q100 111 107 105" fill="none" stroke="#D97070" stroke-width="1.6" stroke-linecap="round"/>

    <!-- Hair wisps on forehead -->
    <path d="M88 40 Q86 50 89 57" fill="none" stroke="#C084FC" stroke-width="1.3" opacity="0.4" stroke-linecap="round"/>
    <path d="M100 36 Q99 46 100 54" fill="none" stroke="#C084FC" stroke-width="1.3" opacity="0.4" stroke-linecap="round"/>
    <path d="M112 40 Q114 50 111 57" fill="none" stroke="#C084FC" stroke-width="1.3" opacity="0.4" stroke-linecap="round"/>

    <!-- Small star accessory near left pigtail -->
    <path d="M44 52 L46 48 L48 52 L52 50 L48 52 L46 56 L44 52 L40 50 Z" fill="#FDE68A" stroke="#F59E0B" stroke-width="0.4" opacity="0.7"/>
  </g>
</svg>