<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <defs>
    <linearGradient id="lumiHairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D8B4FE"/>
      <stop offset="50%" stop-color="#B57EDC"/>
      <stop offset="100%" stop-color="#9B59B6"/>
    </linearGradient>
    <linearGradient id="lumiHairShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#EDE0F7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#C9A0DC" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="lumiSkin" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFF0E0"/>
      <stop offset="80%" stop-color="#FDDCBD"/>
      <stop offset="100%" stop-color="#F5CEAA"/>
    </radialGradient>
    <radialGradient id="lumiEyeL" cx="42%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="45%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </radialGradient>
    <radialGradient id="lumiEyeR" cx="58%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="45%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#4C1D95"/>
    </radialGradient>
    <linearGradient id="lumiSkirt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#7E22CE"/>
    </linearGradient>
    <linearGradient id="lumiShirt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F3E8FF"/>
    </linearGradient>
    <linearGradient id="lumiBand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#EC4899"/>
    </linearGradient>
    <linearGradient id="lumiShoe" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#374151"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>
    <filter id="lumiShadow" x="-15%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feOffset dx="1" dy="2" result="off"/>
      <feFlood flood-color="#000" flood-opacity="0.12"/>
      <feComposite in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="lumiBlush" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
  </defs>

  <g filter="url(#lumiShadow)">
    <!-- ======= LEGS ======= -->
    <rect x="79" y="228" width="14" height="36" rx="7" fill="#FDDCBD"/>
    <rect x="107" y="228" width="14" height="36" rx="7" fill="#FDDCBD"/>

    <!-- Socks -->
    <rect x="77" y="250" width="18" height="16" rx="5" fill="white" stroke="#E9D5FF" stroke-width="0.6"/>
    <rect x="105" y="250" width="18" height="16" rx="5" fill="white" stroke="#E9D5FF" stroke-width="0.6"/>
    <rect x="77" y="250" width="18" height="3" rx="1.5" fill="#E9D5FF"/>
    <rect x="105" y="250" width="18" height="3" rx="1.5" fill="#E9D5FF"/>

    <!-- Shoes -->
    <ellipse cx="86" cy="270" rx="15" ry="7" fill="url(#lumiShoe)"/>
    <ellipse cx="114" cy="270" rx="15" ry="7" fill="url(#lumiShoe)"/>
    <ellipse cx="84" cy="268" rx="7" ry="2.5" fill="#4B5563" opacity="0.5"/>
    <ellipse cx="112" cy="268" rx="7" ry="2.5" fill="#4B5563" opacity="0.5"/>
    <path d="M74 268 Q86 262 98 268" fill="none" stroke="#1F2937" stroke-width="1.2"/>
    <path d="M102 268 Q114 262 126 268" fill="none" stroke="#1F2937" stroke-width="1.2"/>

    <!-- ======= SKIRT ======= -->
    <path d="M68 200 Q74 194 100 192 Q126 194 132 200 L140 242 Q125 248 100 248 Q75 248 60 242 Z" fill="url(#lumiSkirt)"/>
    <!-- Pleats -->
    <path d="M80 198 L76 244" fill="none" stroke="#7E22CE" stroke-width="0.7" opacity="0.35"/>
    <path d="M92 195 L88 247" fill="none" stroke="#7E22CE" stroke-width="0.7" opacity="0.35"/>
    <path d="M108 195 L112 247" fill="none" stroke="#7E22CE" stroke-width="0.7" opacity="0.35"/>
    <path d="M120 198 L124 244" fill="none" stroke="#7E22CE" stroke-width="0.7" opacity="0.35"/>
    <!-- Skirt highlight -->
    <path d="M72 202 Q100 196 128 202 L130 210 Q100 204 70 210 Z" fill="white" opacity="0.1"/>

