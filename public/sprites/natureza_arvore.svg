<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="arvore_trunk" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8B6914"/>
      <stop offset="50%" stop-color="#A0752E"/>
      <stop offset="100%" stop-color="#7A5C10"/>
    </linearGradient>
    <radialGradient id="arvore_canopy" cx="0.4" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#6ECF5C"/>
      <stop offset="60%" stop-color="#4CAF50"/>
      <stop offset="100%" stop-color="#2E7D32"/>
    </radialGradient>
    <radialGradient id="arvore_canopy2" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0%" stop-color="#81D46A"/>
      <stop offset="100%" stop-color="#4CAF50"/>
    </radialGradient>
    <filter id="arvore_shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#00000030"/>
    </filter>
  </defs>
  <!-- Trunk -->
  <rect x="50" y="65" width="20" height="45" rx="3" fill="url(#arvore_trunk)" filter="url(#arvore_shadow)"/>
  <!-- Trunk detail -->
  <line x1="58" y1="70" x2="58" y2="108" stroke="#7A5C10" stroke-width="1" opacity="0.4"/>
  <line x1="64" y1="75" x2="64" y2="105" stroke="#7A5C10" stroke-width="0.8" opacity="0.3"/>
  <!-- Canopy layers (back) -->
  <ellipse cx="42" cy="48" rx="22" ry="20" fill="url(#arvore_canopy)" filter="url(#arvore_shadow)"/>
  <ellipse cx="78" cy="48" rx="22" ry="20" fill="url(#arvore_canopy)"/>
  <!-- Canopy layers (front) -->
  <ellipse cx="60" cy="38" rx="30" ry="26" fill="url(#arvore_canopy2)"/>
  <ellipse cx="45" cy="42" rx="18" ry="16" fill="url(#arvore_canopy2)"/>
  <ellipse cx="75" cy="42" rx="18" ry="16" fill="url(#arvore_canopy2)"/>
  <!-- Canopy top highlight -->
  <ellipse cx="55" cy="25" rx="16" ry="12" fill="#81D46A" opacity="0.6"/>
  <!-- Small fruit/detail dots -->
  <circle cx="40" cy="40" r="2.5" fill="#FF6B6B" opacity="0.8"/>
  <circle cx="72" cy="35" r="2.5" fill="#FF6B6B" opacity="0.8"/>
  <circle cx="55" cy="28" r="2" fill="#FF6B6B" opacity="0.7"/>
  <!-- Ground -->
  <ellipse cx="60" cy="110" rx="30" ry="5" fill="#8BC34A" opacity="0.4"/>
</svg>