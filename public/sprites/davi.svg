<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <defs>
    <linearGradient id="daviHairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="50%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="daviHairShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FEF3C7" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FDE68A" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="daviSkin" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFF5EB"/>
      <stop offset="80%" stop-color="#FDE8D0"/>
      <stop offset="100%" stop-color="#F5D5B0"/>
    </radialGradient>
    <radialGradient id="daviEyeL" cx="42%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="45%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#166534"/>
    </radialGradient>
    <radialGradient id="daviEyeR" cx="58%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="45%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#166534"/>
    </radialGradient>
    <linearGradient id="daviShirt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#60A5FA"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="daviStripe1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5F5F4"/>
      <stop offset="100%" stop-color="#E7E5E4"/>
    </linearGradient>
    <linearGradient id="daviPants" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#78716C"/>
      <stop offset="100%" stop-color="#57534E"/>
    </linearGradient>
    <linearGradient id="daviShoe" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <filter id="daviShadow" x="-15%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feOffset dx="1" dy="2" result="off"/>
      <feFlood flood-color="#000" flood-opacity="0.12"/>
      <feComposite in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="daviBlush" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
  </defs>

  <g filter="url(#daviShadow)">
    <!-- LEGS -->
    <rect x="78" y="215" width="16" height="48" rx="7" fill="url(#daviPants)"/>
    <rect x="106" y="215" width="16" height="48" rx="7" fill="url(#daviPants)"/>
    <!-- Seams -->
    <path d="M86 218 L86 258" fill="none" stroke="#44403C" stroke-width="0.5" opacity="0.3"/>
    <path d="M114 218 L114 258" fill="none" stroke="#44403C" stroke-width="0.5" opacity="0.3"/>
    <!-- Cuffs -->
    <rect x="76" y="256" width="20" height="4" rx="2" fill="#6B7280" opacity="0.5"/>
    <rect x="104" y="256" width="20" height="4" rx="2" fill="#6B7280" opacity="0.5"/>

    <!-- Shoes -->
    <ellipse cx="86" cy="270" rx="16" ry="8" fill="url(#daviShoe)"/>
    <ellipse cx="114" cy="270" rx="16" ry="8" fill="url(#daviShoe)"/>
    <path d="M74 268 Q86 262 98 268" fill="none" stroke="#15803D" stroke-width="1.2"/>
    <path d="M102 268 Q114 262 126 268" fill="none" stroke="#15803D" stroke-width="1.2"/>
    <path d="M72 272 Q86 276 100 272" fill="none" stroke="#166534" stroke-width="1.2"/>
    <path d="M100 272 Q114 276 128 272" fill="none" stroke="#166534" stroke-width="1.2"/>
    <!-- White accent -->
    <ellipse cx="86" cy="268" rx="8" ry="2.5" fill="white" opacity="0.3"/>
    <ellipse cx="114" cy="268" rx="8" ry="2.5" fill="white" opacity="0.3"/>

    <!-- STRIPED SHIRT -->
    <path d="M68 148 Q74 140 100 137 Q126 140 132 148 L136 218 Q126 212 100 210 Q74 212 64 218 Z" fill="url(#daviShirt)" stroke="#2563EB" stroke-width="0.5"/>
    <!-- Stripes -->
    <path d="M70 156 Q100 150 130 156 L130 162 Q100 156 70 162 Z" fill="white" opacity="0.35"/>
    <path d="M68 168 Q100 162 132 168 L132 174 Q100 168 68 174 Z" fill="white" opacity="0.35"/>
    <path d="M66 180 Q100 174 134 180 L134 186 Q100 180 66 186 Z" fill="white" opacity="0.35"/>
    <path d="M65 192 Q100 186 135 192 L135 198 Q100 192 65 198 Z" fill="white" opacity="0.35"/>
    <path d="M64 204 Q100 198 136 204 L136 210 Q100 204 64 210 Z" fill="white" opacity="0.35"/>
    <!-- Collar (crew neck) -->
    <path d="M84 144 Q100 150 116 144" fill="none" stroke="#2563EB" stroke-width="1" opacity="0.5"/>
    <!-- Highlight -->
    <path d="M72 150 Q100 144 128 150 L128 154 Q100 148 72 154 Z" fill="white" opacity="0.08"/>

    <!-- ARMS -->
    <!-- Left arm -->
    <path d="M68 152 Q58 168 54 186 Q53 192 57 192 Q61 190 64 182 Q68 170 72 160" fill="#FDE8D0" stroke="#F0C9A0" stroke-width="0.4"/>
    <ellipse cx="55" cy="191" rx="6" ry="5.5" fill="#FFF5EB"/>
    <path d="M50 189 Q49 186 51 184" fill="none" stroke="#F0C9A0" stroke-width="0.6" stroke-linecap="round"/>
    <!-- Left sleeve -->
    <path d="M68 148 Q62 154 60 164 Q66 160 70 153" fill="url(#daviShirt)" stroke="#2563EB" stroke-width="0.4"/>
    <!-- Sleeve stripe -->
    <path d="M61 158 Q65 156 69 152" fill="none" stroke="white" stroke-width="3" opacity="0.3"/>

    <!-- Right arm -->
    <path d="M132 152 Q142 168 146 186 Q147 192 143 192 Q139 190 136 182 Q132 170 128 160" fill="#FDE8D0" stroke="#F0C9A0" stroke-width="0.4"/>
    <ellipse cx="145" cy="191" rx="6" ry="5.5" fill="#FFF5EB"/>
    <path d="M150 189 Q151 186 149 184" fill="none" stroke="#F0C9A0" stroke-width="0.6" stroke-linecap="round"/>
    <!-- Right sleeve -->
    <path d="M132 148 Q138 154 140 164 Q134 160 130 153" fill="url(#daviShirt)" stroke="#2563EB" stroke-width="0.4"/>
    <path d="M139 158 Q135 156 131 152" fill="none" stroke="white" stroke-width="3" opacity="0.3"/>

    <!-- HEAD -->
    <!-- Hair back -->
    <ellipse cx="100" cy="70" rx="55" ry="52" fill="url(#daviHairGrad)"/>

    <!-- Face -->
    <ellipse cx="100" cy="85" rx="48" ry="46" fill="url(#daviSkin)"/>

    <!-- Straight blond hair (side-parted) -->
    <path d="M50 70 Q54 36 78 26 Q92 22 100 24 Q108 22 122 26 Q146 36 150 70 Q148 54 140 44 Q132 36 124 40 Q114 32 100 30 Q88 32 80 40 Q72 36 62 44 Q54 54 50 70" fill="url(#daviHairGrad)"/>
    <!-- Side part detail -->
    <path d="M80 28 Q82 36 80 48" fill="none" stroke="#D97706" stroke-width="1" opacity="0.4"/>
    <!-- Hair shine -->
    <path d="M60 58 Q68 38 84 30 Q92 26 96 28 Q90 34 84 42 Q76 50 68 58" fill="url(#daviHairShine)" opacity="0.5"/>
    <path d="M108 34 Q114 30 122 32 Q128 36 132 44 Q126 38 118 36 Q112 36 108 38" fill="url(#daviHairShine)" opacity="0.35"/>
    <!-- Fringe detail (straight) -->
    <path d="M70 46 Q68 54 70 62" fill="none" stroke="#FEF3C7" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
    <path d="M90 34 Q88 44 90 52" fill="none" stroke="#FEF3C7" stroke-width="1" opacity="0.3" stroke-linecap="round"/>
    <path d="M110 34 Q108 44 110 52" fill="none" stroke="#FEF3C7" stroke-width="1" opacity="0.3" stroke-linecap="round"/>

    <!-- Ears -->
    <ellipse cx="54" cy="88" rx="5" ry="7" fill="#FDE8D0"/>
    <ellipse cx="54" cy="88" rx="2.5" ry="4" fill="#F0C9A0" opacity="0.4"/>
    <ellipse cx="146" cy="88" rx="5" ry="7" fill="#FDE8D0"/>
    <ellipse cx="146" cy="88" rx="2.5" ry="4" fill="#F0C9A0" opacity="0.4"/>

    <!-- FACE -->
    <!-- Eyebrows -->
    <path d="M71 68 Q80 63 91 66" fill="none" stroke="#D97706" stroke-width="1.6" stroke-linecap="round" opacity="0.5"/>
    <path d="M129 68 Q120 63 109 66" fill="none" stroke="#D97706" stroke-width="1.6" stroke-linecap="round" opacity="0.5"/>

    <!-- Left eye -->
    <ellipse cx="82" cy="82" rx="12" ry="13" fill="white"/>
    <ellipse cx="82" cy="84" rx="9" ry="10" fill="url(#daviEyeL)"/>
    <ellipse cx="82" cy="85" rx="4" ry="5" fill="#052E16"/>
    <circle cx="78" cy="80" r="3" fill="white" opacity="0.95"/>
    <circle cx="86" cy="87" r="1.5" fill="white" opacity="0.7"/>
    <circle cx="79" cy="85" r="1" fill="white" opacity="0.5"/>
    <path d="M70 78 Q77 71 82 71 Q87 71 94 78" fill="none" stroke="#D97706" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Right eye -->
    <ellipse cx="118" cy="82" rx="12" ry="13" fill="white"/>
    <ellipse cx="118" cy="84" rx="9" ry="10" fill="url(#daviEyeR)"/>
    <ellipse cx="118" cy="85" rx="4" ry="5" fill="#052E16"/>
    <circle cx="114" cy="80" r="3" fill="white" opacity="0.95"/>
    <circle cx="122" cy="87" r="1.5" fill="white" opacity="0.7"/>
    <circle cx="115" cy="85" r="1" fill="white" opacity="0.5"/>
    <path d="M106 78 Q113 71 118 71 Q123 71 130 78" fill="none" stroke="#D97706" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Blush -->
    <ellipse cx="68" cy="97" rx="8" ry="5" fill="#FCA5A5" filter="url(#daviBlush)" opacity="0.4"/>
    <ellipse cx="132" cy="97" rx="8" ry="5" fill="#FCA5A5" filter="url(#daviBlush)" opacity="0.4"/>

    <!-- Nose -->
    <ellipse cx="100" cy="93" rx="2.5" ry="1.8" fill="#F0C9A0" opacity="0.6"/>

    <!-- Mouth - neutral -->
    <path d="M93 106 Q100 109 107 106" fill="none" stroke="#D97070" stroke-width="1.6" stroke-linecap="round"/>

    <!-- Hair wisps -->
    <path d="M86 34 Q84 42 86 50" fill="none" stroke="#FBBF24" stroke-width="1.2" opacity="0.3" stroke-linecap="round"/>
    <path d="M100 30 Q99 40 100 48" fill="none" stroke="#FBBF24" stroke-width="1.2" opacity="0.3" stroke-linecap="round"/>
  </g>
</svg>