<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="cadeira_wood" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A0714A"/>
      <stop offset="50%" stop-color="#B8854D"/>
      <stop offset="100%" stop-color="#8B6338"/>
    </linearGradient>
    <linearGradient id="cadeira_seat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF8A65"/>
      <stop offset="100%" stop-color="#E64A19"/>
    </linearGradient>
    <linearGradient id="cadeira_cushion" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFAB91"/>
      <stop offset="100%" stop-color="#FF7043"/>
    </linearGradient>
    <linearGradient id="cadeira_back" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C49451"/>
      <stop offset="100%" stop-color="#A0714A"/>
    </linearGradient>
    <filter id="cadeira_shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#00000030"/>
    </filter>
  </defs>
  <!-- Back rest -->
  <rect x="22" y="10" width="76" height="50" rx="6" fill="url(#cadeira_back)" filter="url(#cadeira_shadow)"/>
  <!-- Back rest inner -->
  <rect x="28" y="16" width="64" height="38" rx="4" fill="url(#cadeira_wood)"/>
  <!-- Back rest slats -->
  <rect x="36" y="18" width="8" height="34" rx="2" fill="#C49451"/>
  <rect x="56" y="18" width="8" height="34" rx="2" fill="#C49451"/>
  <rect x="76" y="18" width="8" height="34" rx="2" fill="#C49451"/>
  <!-- Seat cushion side -->
  <rect x="16" y="62" width="88" height="10" rx="3" fill="url(#cadeira_seat)"/>
  <!-- Seat cushion top -->
  <rect x="16" y="58" width="88" height="8" rx="3" fill="url(#cadeira_cushion)"/>
  <!-- Cushion highlight -->
  <rect x="22" y="59" width="76" height="3" rx="1.5" fill="white" opacity="0.15"/>
  <!-- Front legs -->
  <rect x="20" y="72" width="8" height="38" rx="2" fill="url(#cadeira_wood)"/>
  <rect x="92" y="72" width="8" height="38" rx="2" fill="url(#cadeira_wood)"/>
  <!-- Back legs (slightly behind) -->
  <rect x="26" y="55" width="7" height="55" rx="2" fill="#8B6338" opacity="0.5"/>
  <rect x="87" y="55" width="7" height="55" rx="2" fill="#8B6338" opacity="0.5"/>
  <!-- Front leg crossbar -->
  <rect x="26" y="92" width="68" height="4" rx="1" fill="url(#cadeira_wood)"/>
</svg>