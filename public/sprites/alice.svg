<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <defs>
    <linearGradient id="aliceHairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="50%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#D97706"/>
    </linearGradient>
    <linearGradient id="aliceHairShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FEF3C7" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#FDE68A" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="aliceSkin" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFF5EB"/>
      <stop offset="80%" stop-color="#FDE8D0"/>
      <stop offset="100%" stop-color="#F5D5B0"/>
    </radialGradient>
    <radialGradient id="aliceEyeL" cx="42%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="45%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </radialGradient>
    <radialGradient id="aliceEyeR" cx="58%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#93C5FD"/>
      <stop offset="45%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </radialGradient>
    <linearGradient id="aliceDress" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F9A8D4"/>
      <stop offset="100%" stop-color="#EC4899"/>
