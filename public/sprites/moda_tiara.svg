<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="moda_tiara_grad1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="50%" stop-color="#E879F9"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="moda_tiara_flower1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FCA5A5"/>
      <stop offset="100%" stop-color="#F87171"/>
    </linearGradient>
    <linearGradient id="moda_tiara_flower2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="moda_tiara_flower3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FDE68A"/>
      <stop offset="100%" stop-color="#FBBF24"/>
    </linearGradient>
    <filter id="moda_tiara_shadow">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.18"/>
    </filter>
  </defs>
  <g filter="url(#moda_tiara_shadow)">
    <!-- Headband -->
    <path d="M8 65 Q8 35 60 30 Q112 35 112 65" fill="none" stroke="url(#moda_tiara_grad1)" stroke-width="7" stroke-linecap="round"/>
    <path d="M10 65 Q10 38 60 33 Q110 38 110 65" fill="none" stroke="#FBCFE8" stroke-width="2" opacity="0.5"/>
    <!-- Flower 1 (left) - red/pink -->
    <g transform="translate(32,42)">
      <ellipse cx="0" cy="-7" rx="4" ry="6" fill="url(#moda_tiara_flower1)"/>
      <ellipse cx="6" cy="-2" rx="4" ry="6" fill="url(#moda_tiara_flower1)" transform="rotate(72)"/>
      <ellipse cx="4" cy="6" rx="4" ry="6" fill="url(#moda_tiara_flower1)" transform="rotate(144)"/>
      <ellipse cx="-4" cy="6" rx="4" ry="6" fill="url(#moda_tiara_flower1)" transform="rotate(216)"/>
      <ellipse cx="-6" cy="-2" rx="4" ry="6" fill="url(#moda_tiara_flower1)" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="3.5" fill="#FBBF24"/>
    </g>
    <!-- Flower 2 (center) - purple, larger -->
    <g transform="translate(60,32)">
      <ellipse cx="0" cy="-9" rx="5" ry="7" fill="url(#moda_tiara_flower2)"/>
      <ellipse cx="8" cy="-3" rx="5" ry="7" fill="url(#moda_tiara_flower2)" transform="rotate(72)"/>
      <ellipse cx="5" cy="7" rx="5" ry="7" fill="url(#moda_tiara_flower2)" transform="rotate(144)"/>
      <ellipse cx="-5" cy="7" rx="5" ry="7" fill="url(#moda_tiara_flower2)" transform="rotate(216)"/>
      <ellipse cx="-8" cy="-3" rx="5" ry="7" fill="url(#moda_tiara_flower2)" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="4" fill="#FDE047"/>
    </g>
    <!-- Flower 3 (right) - yellow -->
    <g transform="translate(88,42)">
      <ellipse cx="0" cy="-7" rx="4" ry="6" fill="url(#moda_tiara_flower3)"/>
      <ellipse cx="6" cy="-2" rx="4" ry="6" fill="url(#moda_tiara_flower3)" transform="rotate(72)"/>
      <ellipse cx="4" cy="6" rx="4" ry="6" fill="url(#moda_tiara_flower3)" transform="rotate(144)"/>
      <ellipse cx="-4" cy="6" rx="4" ry="6" fill="url(#moda_tiara_flower3)" transform="rotate(216)"/>
      <ellipse cx="-6" cy="-2" rx="4" ry="6" fill="url(#moda_tiara_flower3)" transform="rotate(288)"/>
      <circle cx="0" cy="0" r="3.5" fill="#F87171"/>
    </g>
    <!-- Small leaves -->
    <ellipse cx="46" cy="40" rx="5" ry="3" fill="#4ADE80" transform="rotate(-20 46 40)"/>
    <ellipse cx="74" cy="40" rx="5" ry="3" fill="#4ADE80" transform="rotate(20 74 40)"/>
  </g>
</svg>