<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <radialGradient id="bola_main" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#FF6688"/>
      <stop offset="50%" stop-color="#FF4466"/>
      <stop offset="100%" stop-color="#CC2244"/>
    </radialGradient>
    <radialGradient id="bola_shine" cx="35%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="bola_shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="1" dy="3" stdDeviation="3" flood-color="#00000033"/>
    </filter>
  </defs>
  <ellipse cx="60" cy="108" rx="25" ry="5" fill="#00000020"/>
  <g filter="url(#bola_shadow)">
    <!-- Main ball -->
    <circle cx="60" cy="58" r="38" fill="url(#bola_main)"/>
    <!-- Stripes -->
    <path d="M22 58 Q60 30 98 58" stroke="#FFAA44" stroke-width="8" fill="none" opacity="0.7"/>
    <path d="M28 80 Q60 55 92 80" stroke="#44AAFF" stroke-width="8" fill="none" opacity="0.7"/>
    <path d="M35 38 Q60 50 85 38" stroke="#44DD66" stroke-width="6" fill="none" opacity="0.6"/>
    <!-- Star decoration -->
    <polygon points="60,28 63,36 72,36 65,41 67,50 60,45 53,50 55,41 48,36 57,36" fill="#FFDD44" opacity="0.8"/>
    <!-- Shine -->
    <circle cx="60" cy="58" r="38" fill="url(#bola_shine)"/>
    <!-- Extra highlight -->
    <ellipse cx="48" cy="42" rx="8" ry="5" fill="#FFFFFF" opacity="0.3" transform="rotate(-20,48,42)"/>
  </g>
</svg>