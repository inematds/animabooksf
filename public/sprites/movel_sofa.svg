<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="sofa_main" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7E57C2"/>
      <stop offset="100%" stop-color="#5E35B1"/>
    </linearGradient>
    <linearGradient id="sofa_cushion" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9575CD"/>
      <stop offset="100%" stop-color="#7E57C2"/>
    </linearGradient>
    <linearGradient id="sofa_arm" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6A3DAA"/>
      <stop offset="100%" stop-color="#4A148C"/>
    </linearGradient>
    <linearGradient id="sofa_pillow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFB74D"/>
      <stop offset="100%" stop-color="#FF9800"/>
    </linearGradient>
    <linearGradient id="sofa_pillow2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="100%" stop-color="#4FC3F7"/>
    </linearGradient>
    <filter id="sofa_shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#00000030"/>
    </filter>
  </defs>
  <!-- Back rest -->
  <rect x="10" y="25" width="100" height="40" rx="8" fill="url(#sofa_main)" filter="url(#sofa_shadow)"/>
  <!-- Back rest highlight -->
  <rect x="16" y="28" width="88" height="5" rx="2.5" fill="white" opacity="0.1"/>
  <!-- Seat area -->
  <rect x="10" y="58" width="100" height="22" rx="6" fill="url(#sofa_cushion)"/>
  <!-- Seat cushion dividers -->
  <line x1="43" y1="60" x2="43" y2="78" stroke="#6A3DAA" stroke-width="1.5" opacity="0.3"/>
  <line x1="77" y1="60" x2="77" y2="78" stroke="#6A3DAA" stroke-width="1.5" opacity="0.3"/>
  <!-- Left arm -->
  <rect x="4" y="30" width="14" height="50" rx="6" fill="url(#sofa_arm)"/>
  <!-- Right arm -->
  <rect x="102" y="30" width="14" height="50" rx="6" fill="url(#sofa_arm)"/>
  <!-- Arm highlights -->
  <rect x="7" y="33" width="4" height="40" rx="2" fill="white" opacity="0.1"/>
  <rect x="109" y="33" width="4" height="40" rx="2" fill="white" opacity="0.1"/>
  <!-- Legs -->
  <rect x="18" y="80" width="8" height="12" rx="2" fill="#4A148C"/>
  <rect x="94" y="80" width="8" height="12" rx="2" fill="#4A148C"/>
  <rect x="52" y="80" width="8" height="10" rx="2" fill="#4A148C" opacity="0.7"/>
  <!-- Decorative pillows -->
  <ellipse cx="28" cy="48" rx="10" ry="12" fill="url(#sofa_pillow1)" transform="rotate(-10,28,48)"/>
  <ellipse cx="28" cy="47" rx="7" ry="8" fill="#FFD54F" opacity="0.3"/>
  <ellipse cx="92" cy="48" rx="10" ry="12" fill="url(#sofa_pillow2)" transform="rotate(10,92,48)"/>
  <ellipse cx="92" cy="47" rx="7" ry="8" fill="#B3E5FC" opacity="0.3"/>
  <!-- Seat cushion highlights -->
  <ellipse cx="30" cy="66" rx="10" ry="3" fill="white" opacity="0.1"/>
  <ellipse cx="60" cy="66" rx="10" ry="3" fill="white" opacity="0.1"/>
  <ellipse cx="90" cy="66" rx="10" ry="3" fill="white" opacity="0.1"/>
</svg>