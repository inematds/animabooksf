<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="pizza_crust" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E6B87D"/>
      <stop offset="100%" stop-color="#C49451"/>
    </linearGradient>
    <linearGradient id="pizza_cheese" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFE082"/>
      <stop offset="100%" stop-color="#FFC107"/>
    </linearGradient>
    <linearGradient id="pizza_sauce" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E53935"/>
      <stop offset="100%" stop-color="#C62828"/>
    </linearGradient>
    <radialGradient id="pizza_pepperoni" cx="0.4" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#D32F2F"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </radialGradient>
    <filter id="pizza_shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#00000030"/>
    </filter>
  </defs>
  <!-- Pizza slice shape (triangle) -->
  <!-- Crust arc at top -->
  <path d="M15,25 Q60,8 105,25 L60,112 Z" fill="url(#pizza_crust)" filter="url(#pizza_shadow)"/>
  <!-- Sauce layer -->
  <path d="M22,30 Q60,16 98,30 L60,105 Z" fill="url(#pizza_sauce)"/>
  <!-- Cheese layer -->
  <path d="M24,33 Q60,19 96,33 L60,100 Z" fill="url(#pizza_cheese)"/>
  <!-- Cheese stretch/melty edges -->
  <path d="M24,33 Q20,38 22,42" fill="none" stroke="#FFE082" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M96,33 Q100,38 98,42" fill="none" stroke="#FFE082" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <!-- Crust edge detail -->
  <path d="M15,25 Q60,8 105,25" fill="none" stroke="#D4A04A" stroke-width="2"/>
  <!-- Crust bubbles -->
  <circle cx="35" cy="22" r="2.5" fill="#D4A04A" opacity="0.4"/>
  <circle cx="60" cy="16" r="2" fill="#D4A04A" opacity="0.4"/>
  <circle cx="82" cy="21" r="2.5" fill="#D4A04A" opacity="0.4"/>
  <!-- Pepperoni -->
  <circle cx="45" cy="42" r="7" fill="url(#pizza_pepperoni)"/>
  <circle cx="72" cy="40" r="7" fill="url(#pizza_pepperoni)"/>
  <circle cx="55" cy="60" r="6.5" fill="url(#pizza_pepperoni)"/>
  <circle cx="65" cy="78" r="5.5" fill="url(#pizza_pepperoni)"/>
  <!-- Pepperoni highlights -->
  <circle cx="43" cy="40" r="2" fill="#E57373" opacity="0.4"/>
  <circle cx="70" cy="38" r="2" fill="#E57373" opacity="0.4"/>
  <circle cx="53" cy="58" r="1.8" fill="#E57373" opacity="0.4"/>
  <!-- Green pepper bits -->
  <path d="M38,55 Q42,52 44,56" fill="none" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M75,55 Q78,52 80,56" fill="none" stroke="#4CAF50" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M55,85 Q58,82 60,86" fill="none" stroke="#4CAF50" stroke-width="2" stroke-linecap="round"/>
  <!-- Cheese highlight -->
  <ellipse cx="50" cy="48" rx="4" ry="2" fill="#FFF8E1" opacity="0.4"/>
  <ellipse cx="65" cy="65" rx="3" ry="1.5" fill="#FFF8E1" opacity="0.4"/>
</svg>