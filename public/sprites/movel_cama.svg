<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="cama_frame" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#A1887F"/>
      <stop offset="50%" stop-color="#BCAAA4"/>
      <stop offset="100%" stop-color="#8D6E63"/>
    </linearGradient>
    <linearGradient id="cama_headboard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#C49451"/>
      <stop offset="100%" stop-color="#8D6E63"/>
    </linearGradient>
    <linearGradient id="cama_blanket" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#81D4FA"/>
      <stop offset="100%" stop-color="#4FC3F7"/>
    </linearGradient>
    <linearGradient id="cama_sheet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F5F5F5"/>
    </linearGradient>
    <linearGradient id="cama_pillow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E8E8E8"/>
    </linearGradient>
    <linearGradient id="cama_pillow2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFECB3"/>
      <stop offset="100%" stop-color="#FFD54F"/>
    </linearGradient>
    <filter id="cama_shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#00000030"/>
    </filter>
  </defs>
  <!-- Headboard -->
  <rect x="8" y="15" width="104" height="40" rx="8" fill="url(#cama_headboard)" filter="url(#cama_shadow)"/>
  <!-- Headboard decorative top -->
  <path d="M20,20 Q60,5 100,20" fill="none" stroke="#D4A86A" stroke-width="3" stroke-linecap="round"/>
  <!-- Headboard panels -->
  <rect x="18" y="25" width="28" height="25" rx="4" fill="#B8854D" opacity="0.4"/>
  <rect x="54" y="25" width="28" height="25" rx="4" fill="#B8854D" opacity="0.4"/>
  <rect x="90" y="25" width="16" height="25" rx="4" fill="#B8854D" opacity="0.4"/>
  <!-- Bed frame / mattress area -->
  <rect x="5" y="50" width="110" height="45" rx="4" fill="url(#cama_frame)"/>
  <!-- Mattress -->
  <rect x="8" y="48" width="104" height="40" rx="5" fill="url(#cama_sheet)"/>
  <!-- Blanket -->
  <rect x="8" y="58" width="104" height="32" rx="4" fill="url(#cama_blanket)"/>
  <!-- Blanket fold line -->
  <path d="M8,62 Q60,58 112,62" fill="none" stroke="#29B6F6" stroke-width="1.5" opacity="0.4"/>
  <!-- Blanket pattern - stars -->
  <polygon points="30,72 31.5,76 35.5,76 32.5,79 33.5,83 30,80 26.5,83 27.5,79 24.5,76 28.5,76" fill="white" opacity="0.2"/>
  <polygon points="60,75 61.5,79 65.5,79 62.5,82 63.5,86 60,83 56.5,86 57.5,82 54.5,79 58.5,79" fill="white" opacity="0.2"/>
  <polygon points="90,72 91.5,76 95.5,76 92.5,79 93.5,83 90,80 86.5,83 87.5,79 84.5,76 88.5,76" fill="white" opacity="0.2"/>
  <!-- Pillows -->
  <ellipse cx="30" cy="52" rx="18" ry="10" fill="url(#cama_pillow)"/>
  <ellipse cx="30" cy="51" rx="15" ry="7" fill="white" opacity="0.5"/>
  <ellipse cx="72" cy="52" rx="18" ry="10" fill="url(#cama_pillow2)"/>
  <ellipse cx="72" cy="51" rx="15" ry="7" fill="#FFF8E1" opacity="0.5"/>
  <!-- Small decorative pillow -->
  <ellipse cx="100" cy="55" rx="8" ry="7" fill="#FF80AB" transform="rotate(-10,100,55)"/>
  <ellipse cx="100" cy="54" rx="5.5" ry="4.5" fill="#FF4081" opacity="0.3" transform="rotate(-10,100,54)"/>
  <!-- Legs -->
  <rect x="10" y="90" width="8" height="18" rx="2" fill="url(#cama_frame)"/>
  <rect x="102" y="90" width="8" height="18" rx="2" fill="url(#cama_frame)"/>
  <!-- Side rail detail -->
  <rect x="5" y="88" width="110" height="5" rx="2" fill="#8D6E63"/>
</svg>