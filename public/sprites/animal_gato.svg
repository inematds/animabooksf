<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <linearGradient id="gato_body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5A623"/>
      <stop offset="100%" stop-color="#D4841A"/>
    </linearGradient>
    <linearGradient id="gato_belly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFF5E0"/>
      <stop offset="100%" stop-color="#FFE4B5"/>
    </linearGradient>
    <radialGradient id="gato_cheek" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#FFB6C1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFB6C1" stop-opacity="0"/>
    </radialGradient>
    <filter id="gato_shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#00000030"/>
    </filter>
  </defs>
  <!-- Body -->
  <ellipse cx="60" cy="78" rx="28" ry="25" fill="url(#gato_body)" filter="url(#gato_shadow)"/>
  <!-- Belly -->
  <ellipse cx="60" cy="82" rx="18" ry="16" fill="url(#gato_belly)"/>
  <!-- Head -->
  <circle cx="60" cy="45" r="22" fill="url(#gato_body)"/>
  <!-- Ears -->
  <polygon points="42,30 35,10 50,25" fill="url(#gato_body)"/>
  <polygon points="78,30 85,10 70,25" fill="url(#gato_body)"/>
  <polygon points="44,28 39,15 51,25" fill="#FFB88C"/>
  <polygon points="76,28 81,15 69,25" fill="#FFB88C"/>
  <!-- Eyes -->
  <ellipse cx="51" cy="42" rx="5" ry="5.5" fill="white"/>
  <ellipse cx="69" cy="42" rx="5" ry="5.5" fill="white"/>
  <ellipse cx="52" cy="43" rx="3" ry="3.5" fill="#2D5016"/>
  <ellipse cx="70" cy="43" rx="3" ry="3.5" fill="#2D5016"/>
  <circle cx="53" cy="41.5" r="1.2" fill="white"/>
  <circle cx="71" cy="41.5" r="1.2" fill="white"/>
  <!-- Nose -->
  <ellipse cx="60" cy="50" rx="2.5" ry="2" fill="#FF8C94"/>
  <!-- Mouth -->
  <path d="M56,53 Q60,57 64,53" fill="none" stroke="#D4841A" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Whiskers -->
  <line x1="35" y1="47" x2="48" y2="49" stroke="#D4841A" stroke-width="0.8"/>
  <line x1="35" y1="52" x2="48" y2="52" stroke="#D4841A" stroke-width="0.8"/>
  <line x1="72" y1="49" x2="85" y2="47" stroke="#D4841A" stroke-width="0.8"/>
  <line x1="72" y1="52" x2="85" y2="52" stroke="#D4841A" stroke-width="0.8"/>
  <!-- Cheeks -->
  <circle cx="44" cy="50" r="6" fill="url(#gato_cheek)"/>
  <circle cx="76" cy="50" r="6" fill="url(#gato_cheek)"/>
  <!-- Tail -->
  <path d="M88,80 Q100,65 95,50 Q92,42 96,38" fill="none" stroke="url(#gato_body)" stroke-width="6" stroke-linecap="round"/>
  <!-- Paws -->
  <ellipse cx="45" cy="100" rx="10" ry="5" fill="url(#gato_body)"/>
  <ellipse cx="75" cy="100" rx="10" ry="5" fill="url(#gato_body)"/>
  <ellipse cx="45" cy="101" rx="7" ry="3" fill="url(#gato_belly)"/>
  <ellipse cx="75" cy="101" rx="7" ry="3" fill="url(#gato_belly)"/>
</svg>