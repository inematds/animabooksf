<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <defs>
    <linearGradient id="teoHairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="50%" stop-color="#EA580C"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </linearGradient>
    <linearGradient id="teoHairShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDBA74" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#FB923C" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="teoSkin" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFF5EB"/>
      <stop offset="80%" stop-color="#FFE4CC"/>
      <stop offset="100%" stop-color="#FDDCBD"/>
    </radialGradient>
    <radialGradient id="teoEyeL" cx="42%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="45%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#166534"/>
    </radialGradient>
    <radialGradient id="teoEyeR" cx="58%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="45%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#166534"/>
    </radialGradient>
    <linearGradient id="teoHoodie" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>
    <linearGradient id="teoHoodieInner" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#BBF7D0"/>
      <stop offset="100%" stop-color="#86EFAC"/>
    </linearGradient>
    <linearGradient id="teoJeans" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#6B7280"/>
      <stop offset="100%" stop-color="#4B5563"/>
    </linearGradient>
    <linearGradient id="teoShoe" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </linearGradient>
    <filter id="teoShadow" x="-15%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feOffset dx="1" dy="2" result="off"/>
      <feFlood flood-color="#000" flood-opacity="0.12"/>
      <feComposite in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="teoBlush" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
  </defs>

  <g filter="url(#teoShadow)">
    <!-- LEGS -->
    <rect x="78" y="215" width="16" height="47" rx="7" fill="url(#teoJeans)"/>
    <rect x="106" y="215" width="16" height="47" rx="7" fill="url(#teoJeans)"/>
    <!-- Jean seams -->
    <path d="M86 218 L86 258" fill="none" stroke="#374151" stroke-width="0.5" opacity="0.3"/>
    <path d="M114 218 L114 258" fill="none" stroke="#374151" stroke-width="0.5" opacity="0.3"/>

    <!-- Shoes -->
    <ellipse cx="86" cy="270" rx="16" ry="8" fill="url(#teoShoe)"/>
    <ellipse cx="114" cy="270" rx="16" ry="8" fill="url(#teoShoe)"/>
    <path d="M74 268 Q86 262 98 268" fill="none" stroke="#9A3412" stroke-width="1.2"/>
    <path d="M102 268 Q114 262 126 268" fill="none" stroke="#9A3412" stroke-width="1.2"/>
    <path d="M72 272 Q86 276 100 272" fill="none" stroke="#7C2D12" stroke-width="1.2"/>
    <path d="M100 272 Q114 276 128 272" fill="none" stroke="#7C2D12" stroke-width="1.2"/>
    <!-- Laces -->
    <path d="M82 266 L86 264 L90 266" fill="none" stroke="white" stroke-width="0.8" opacity="0.7"/>
    <path d="M110 266 L114 264 L118 266" fill="none" stroke="white" stroke-width="0.8" opacity="0.7"/>

    <!-- HOODIE -->
    <path d="M65 148 Q74 140 100 137 Q126 140 135 148 L138 220 Q126 214 100 212 Q74 214 62 220 Z" fill="url(#teoHoodie)" stroke="#15803D" stroke-width="0.5"/>
    <!-- Hoodie pocket -->
    <path d="M74 188 Q100 184 126 188 L126 208 Q100 204 74 208 Z" fill="#16A34A" stroke="#15803D" stroke-width="0.6" opacity="0.7"/>
    <path d="M74 188 Q100 184 126 188" fill="none" stroke="#15803D" stroke-width="0.8"/>
    <!-- Zipper -->
    <path d="M100 155 L100 210" fill="none" stroke="#15803D" stroke-width="1.2" opacity="0.5"/>
    <rect x="97" y="152" width="6" height="5" rx="1" fill="#D4D4D8" stroke="#A1A1AA" stroke-width="0.4"/>
    <!-- Hood collar -->
    <path d="M78 148 Q88 158 100 160 Q112 158 122 148" fill="url(#teoHoodieInner)" stroke="#16A34A" stroke-width="0.6"/>
    <!-- Hoodie highlight -->
    <path d="M68 152 Q100 144 132 152 L132 160 Q100 152 68 160 Z" fill="white" opacity="0.1"/>
    <!-- Strings -->
    <path d="M90 155 L88 175" fill="none" stroke="#BBF7D0" stroke-width="1" stroke-linecap="round"/>
    <path d="M110 155 L112 175" fill="none" stroke="#BBF7D0" stroke-width="1" stroke-linecap="round"/>
    <circle cx="88" cy="176" r="1.5" fill="#BBF7D0"/>
    <circle cx="112" cy="176" r="1.5" fill="#BBF7D0"/>

    <!-- ARMS -->
    <!-- Left arm -->
    <path d="M65 152 Q55 168 51 186 Q50 192 54 192 Q58 190 61 182 Q65 170 69 160" fill="url(#teoHoodie)" stroke="#15803D" stroke-width="0.4"/>
    <ellipse cx="52" cy="191" rx="6" ry="5.5" fill="#FFF5EB"/>
    <path d="M47 189 Q46 186 48 184" fill="none" stroke="#F0C9A0" stroke-width="0.6" stroke-linecap="round"/>
    <!-- Sleeve cuff -->
    <rect x="49" y="184" width="12" height="3" rx="1.5" fill="#BBF7D0" opacity="0.6"/>

    <!-- Right arm -->
    <path d="M135 152 Q145 168 149 186 Q150 192 146 192 Q142 190 139 182 Q135 170 131 160" fill="url(#teoHoodie)" stroke="#15803D" stroke-width="0.4"/>
    <ellipse cx="148" cy="191" rx="6" ry="5.5" fill="#FFF5EB"/>
    <path d="M153 189 Q154 186 152 184" fill="none" stroke="#F0C9A0" stroke-width="0.6" stroke-linecap="round"/>
    <rect x="139" y="184" width="12" height="3" rx="1.5" fill="#BBF7D0" opacity="0.6"/>

    <!-- HEAD -->
    <!-- Hair back (curly volume) -->
    <ellipse cx="100" cy="68" rx="58" ry="56" fill="url(#teoHairGrad)"/>
    <!-- Extra curly puff -->
    <circle cx="70" cy="42" r="14" fill="url(#teoHairGrad)"/>
    <circle cx="90" cy="30" r="16" fill="url(#teoHairGrad)"/>
    <circle cx="112" cy="30" r="16" fill="url(#teoHairGrad)"/>
    <circle cx="130" cy="42" r="14" fill="url(#teoHairGrad)"/>
    <circle cx="80" cy="34" r="12" fill="url(#teoHairGrad)"/>
    <circle cx="120" cy="34" r="12" fill="url(#teoHairGrad)"/>
    <circle cx="100" cy="22" r="14" fill="url(#teoHairGrad)"/>
    <!-- Curly shine -->
    <circle cx="88" cy="26" r="5" fill="url(#teoHairShine)" opacity="0.4"/>
    <circle cx="110" cy="24" r="5" fill="url(#teoHairShine)" opacity="0.35"/>
    <circle cx="100" cy="18" r="4" fill="url(#teoHairShine)" opacity="0.3"/>

    <!-- Face -->
    <ellipse cx="100" cy="85" rx="48" ry="46" fill="url(#teoSkin)"/>

    <!-- Curly bangs over forehead -->
    <path d="M52 72 Q58 44 78 34 Q90 28 100 30 Q110 28 122 34 Q142 44 148 72 Q144 56 136 46 Q126 38 118 44 Q110 34 100 32 Q90 34 82 44 Q74 38 64 46 Q56 56 52 72" fill="url(#teoHairGrad)"/>
    <!-- Curly details on bangs -->
    <circle cx="68" cy="56" r="8" fill="url(#teoHairGrad)"/>
    <circle cx="82" cy="44" r="9" fill="url(#teoHairGrad)"/>
    <circle cx="100" cy="38" r="9" fill="url(#teoHairGrad)"/>
    <circle cx="118" cy="44" r="9" fill="url(#teoHairGrad)"/>
    <circle cx="132" cy="56" r="8" fill="url(#teoHairGrad)"/>

    <!-- Ears -->
    <ellipse cx="54" cy="88" rx="5" ry="7" fill="#FFE4CC"/>
    <ellipse cx="54" cy="88" rx="2.5" ry="4" fill="#F0C9A0" opacity="0.4"/>
    <ellipse cx="146" cy="88" rx="5" ry="7" fill="#FFE4CC"/>
    <ellipse cx="146" cy="88" rx="2.5" ry="4" fill="#F0C9A0" opacity="0.4"/>

    <!-- FACE -->
    <!-- Eyebrows -->
    <path d="M71 68 Q80 62 91 66" fill="none" stroke="#C2410C" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
    <path d="M129 68 Q120 62 109 66" fill="none" stroke="#C2410C" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>

    <!-- Left eye -->
    <ellipse cx="82" cy="82" rx="12" ry="13" fill="white"/>
    <ellipse cx="82" cy="84" rx="9" ry="10" fill="url(#teoEyeL)"/>
    <ellipse cx="82" cy="85" rx="4" ry="5" fill="#052E16"/>
    <circle cx="78" cy="80" r="3" fill="white" opacity="0.95"/>
    <circle cx="86" cy="87" r="1.5" fill="white" opacity="0.7"/>
    <path d="M70 78 Q77 71 82 71 Q87 71 94 78" fill="none" stroke="#C2410C" stroke-width="1.8" stroke-linecap="round"/>

    <!-- Right eye -->
    <ellipse cx="118" cy="82" rx="12" ry="13" fill="white"/>
    <ellipse cx="118" cy="84" rx="9" ry="10" fill="url(#teoEyeR)"/>
    <ellipse cx="118" cy="85" rx="4" ry="5" fill="#052E16"/>
    <circle cx="114" cy="80" r="3" fill="white" opacity="0.95"/>
    <circle cx="122" cy="87" r="1.5" fill="white" opacity="0.7"/>
    <path d="M106 78 Q113 71 118 71 Q123 71 130 78" fill="none" stroke="#C2410C" stroke-width="1.8" stroke-linecap="round"/>

    <!-- FRECKLES -->
    <circle cx="72" cy="92" r="1.2" fill="#D97706" opacity="0.4"/>
    <circle cx="76" cy="95" r="1" fill="#D97706" opacity="0.35"/>
    <circle cx="69" cy="96" r="1" fill="#D97706" opacity="0.35"/>
    <circle cx="74" cy="90" r="0.8" fill="#D97706" opacity="0.3"/>
    <circle cx="128" cy="92" r="1.2" fill="#D97706" opacity="0.4"/>
    <circle cx="124" cy="95" r="1" fill="#D97706" opacity="0.35"/>
    <circle cx="131" cy="96" r="1" fill="#D97706" opacity="0.35"/>
    <circle cx="126" cy="90" r="0.8" fill="#D97706" opacity="0.3"/>
    <!-- Nose freckles -->
    <circle cx="97" cy="92" r="0.8" fill="#D97706" opacity="0.3"/>
    <circle cx="100" cy="90" r="0.8" fill="#D97706" opacity="0.25"/>
    <circle cx="103" cy="92" r="0.8" fill="#D97706" opacity="0.3"/>

    <!-- Blush -->
    <ellipse cx="68" cy="97" rx="9" ry="5" fill="#FCA5A5" filter="url(#teoBlush)" opacity="0.4"/>
    <ellipse cx="132" cy="97" rx="9" ry="5" fill="#FCA5A5" filter="url(#teoBlush)" opacity="0.4"/>

    <!-- Nose -->
    <ellipse cx="100" cy="93" rx="2.5" ry="2" fill="#F0C9A0" opacity="0.6"/>

    <!-- Mouth - neutral friendly -->
    <path d="M93 106 Q100 110 107 106" fill="none" stroke="#D97070" stroke-width="1.6" stroke-linecap="round"/>
  </g>
</svg>