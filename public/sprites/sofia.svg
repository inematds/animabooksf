<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 300" width="200" height="300">
  <defs>
    <linearGradient id="sofiaHairGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A0764A"/>
      <stop offset="50%" stop-color="#7B5B3A"/>
      <stop offset="100%" stop-color="#5C3D2E"/>
    </linearGradient>
    <linearGradient id="sofiaHairShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4A574" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#A0764A" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="sofiaSkin" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#FFF0E0"/>
      <stop offset="80%" stop-color="#FDDCBD"/>
      <stop offset="100%" stop-color="#F5CEAA"/>
    </radialGradient>
    <radialGradient id="sofiaEyeL" cx="42%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="45%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#166534"/>
    </radialGradient>
    <radialGradient id="sofiaEyeR" cx="58%" cy="32%" r="55%">
      <stop offset="0%" stop-color="#86EFAC"/>
      <stop offset="45%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#166534"/>
    </radialGradient>
    <linearGradient id="sofiaDress" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDE047"/>
      <stop offset="100%" stop-color="#EAB308"/>
    </linearGradient>
    <linearGradient id="sofiaDressTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FEF08A"/>
      <stop offset="100%" stop-color="#FDE047"/>
    </linearGradient>
    <linearGradient id="sofiaShoe" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F472B6"/>
      <stop offset="100%" stop-color="#DB2777"/>
    </linearGradient>
    <filter id="sofiaShadow" x="-15%" y="-10%" width="130%" height="130%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="1.5" result="blur"/>
      <feOffset dx="1" dy="2" result="off"/>
      <feFlood flood-color="#000" flood-opacity="0.12"/>
      <feComposite in2="off" operator="in" result="sh"/>
      <feMerge><feMergeNode in="sh"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sofiaBlush" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5"/>
    </filter>
  </defs>

  <g filter="url(#sofiaShadow)">
    <!-- LEGS -->
    <rect x="79" y="228" width="14" height="36" rx="7" fill="#FDDCBD"/>
    <rect x="107" y="228" width="14" height="36" rx="7" fill="#FDDCBD"/>

    <!-- Socks -->
    <rect x="77" y="252" width="18" height="14" rx="5" fill="white" stroke="#FDE68A" stroke-width="0.6"/>
    <rect x="105" y="252" width="18" height="14" rx="5" fill="white" stroke="#FDE68A" stroke-width="0.6"/>
    <rect x="77" y="252" width="18" height="3" rx="1.5" fill="#FDE68A"/>
    <rect x="105" y="252" width="18" height="3" rx="1.5" fill="#FDE68A"/>

    <!-- Shoes -->
    <ellipse cx="86" cy="270" rx="15" ry="7" fill="url(#sofiaShoe)"/>
    <ellipse cx="114" cy="270" rx="15" ry="7" fill="url(#sofiaShoe)"/>
    <ellipse cx="84" cy="268" rx="7" ry="2.5" fill="#F9A8D4" opacity="0.5"/>
    <ellipse cx="112" cy="268" rx="7" ry="2.5" fill="#F9A8D4" opacity="0.5"/>
    <path d="M74 268 Q86 262 98 268" fill="none" stroke="#BE185D" stroke-width="1.2"/>
    <path d="M102 268 Q114 262 126 268" fill="none" stroke="#BE185D" stroke-width="1.2"/>

    <!-- SKIRT (dress bottom) -->
    <path d="M65 195 Q74 190 100 188 Q126 190 135 195 L145 248 Q125 254 100 254 Q75 254 55 248 Z" fill="url(#sofiaDress)"/>
    <!-- Pleats -->
    <path d="M78 194 L74 250" fill="none" stroke="#CA8A04" stroke-width="0.7" opacity="0.3"/>
    <path d="M90 191 L86 252" fill="none" stroke="#CA8A04" stroke-width="0.7" opacity="0.3"/>
    <path d="M110 191 L114 252" fill="none" stroke="#CA8A04" stroke-width="0.7" opacity="0.3"/>
    <path d="M122 194 L126 250" fill="none" stroke="#CA8A04" stroke-width="0.7" opacity="0.3"/>
    <!-- Skirt highlight -->
    <path d="M68 198 Q100 192 132 198 L134 206 Q100 200 66 206 Z" fill="white" opacity="0.15"/>
    <!-- Flower on dress -->
    <circle cx="88" cy="220" r="4" fill="#FB923C" opacity="0.6"/>
    <circle cx="88" cy="220" r="2" fill="#FDE68A" opacity="0.8"/>

    <!-- DRESS TOP -->
    <path d="M70 152 Q74 144 100 141 Q126 144 130 152 L135 195 Q126 190 100 188 Q74 190 65 195 Z" fill="url(#sofiaDressTop)" stroke="#EAB308" stroke-width="0.5"/>
    <!-- Collar detail -->
    <path d="M82 148 Q100 156 118 148" fill="none" stroke="#CA8A04" stroke-width="1" opacity="0.5"/>
    <!-- Small bow at center -->
    <path d="M95 150 Q98 146 100 150 Q102 146 105 150 Q102 153 100 150 Q98 153 95 150" fill="#FB923C"/>
    <circle cx="100" cy="150" r="1.5" fill="#EA580C"/>
    <!-- Buttons -->
    <circle cx="100" cy="168" r="1.2" fill="#CA8A04" opacity="0.5"/>
    <circle cx="100" cy="178" r="1.2" fill="#CA8A04" opacity="0.5"/>

    <!-- ARMS -->
    <!-- Left arm -->
    <path d="M70 155 Q60 170 56 188 Q55 194 59 194 Q63 192 66 184 Q70 172 74 162" fill="#FDDCBD" stroke="#F0C9A0" stroke-width="0.4"/>
    <ellipse cx="57" cy="193" rx="6" ry="5.5" fill="#FFF0E0"/>
    <path d="M52 191 Q51 188 53 186" fill="none" stroke="#F0C9A0" stroke-width="0.6" stroke-linecap="round"/>
    <!-- Left sleeve -->
    <path d="M70 152 Q64 158 62 164 Q68 160 72 155" fill="url(#sofiaDressTop)" stroke="#EAB308" stroke-width="0.4"/>

    <!-- Right arm -->
    <path d="M130 155 Q140 170 144 188 Q145 194 141 194 Q137 192 134 184 Q130 172 126 162" fill="#FDDCBD" stroke="#F0C9A0" stroke-width="0.4"/>
    <ellipse cx="143" cy="193" rx="6" ry="5.5" fill="#FFF0E0"/>
    <path d="M148 191 Q149 188 147 186" fill="none" stroke="#F0C9A0" stroke-width="0.6" stroke-linecap="round"/>
    <!-- Right sleeve -->
    <path d="M130 152 Q136 158 138 164 Q132 160 128 155" fill="url(#sofiaDressTop)" stroke="#EAB308" stroke-width="0.4"/>

    <!-- HEAD -->
    <!-- Hair back volume -->
    <ellipse cx="100" cy="75" rx="60" ry="58" fill="url(#sofiaHairGrad)"/>
    <!-- Long hair left side -->
    <path d="M48 72 Q40 100 38 140 Q36 170 42 190 Q46 196 50 192 Q52 180 52 160 Q52 130 54 100 Q55 85 52 72" fill="url(#sofiaHairGrad)"/>
    <path d="M46 90 Q44 120 44 150 Q44 170 46 184" fill="none" stroke="#D4A574" stroke-width="1.5" opacity="0.3"/>
    <!-- Long hair right side -->
    <path d="M152 72 Q160 100 162 140 Q164 170 158 190 Q154 196 150 192 Q148 180 148 160 Q148 130 146 100 Q145 85 148 72" fill="url(#sofiaHairGrad)"/>
    <path d="M154 90 Q156 120 156 150 Q156 170 154 184" fill="none" stroke="#D4A574" stroke-width="1.5" opacity="0.3"/>

    <!-- Face -->
    <ellipse cx="100" cy="85" rx="48" ry="46" fill="url(#sofiaSkin)"/>

    <!-- Hair bangs -->
    <path d="M52 72 Q56 38 78 28 Q92 24 100 26 Q108 24 122 28 Q144 38 148 72 Q146 58 138 50 Q128 42 120 48 Q112 38 100 36 Q88 38 80 48 Q72 42 62 50 Q54 58 52 72" fill="url(#sofiaHairGrad)"/>
    <!-- Bangs shine -->
    <path d="M62 64 Q68 42 84 34 Q92 30 98 32 Q93 38 86 46 Q78 54 68 64" fill="url(#sofiaHairShine)" opacity="0.5"/>
    <path d="M110 40 Q116 36 124 38 Q130 42 134 50 Q128 44 120 42 Q114 42 110 44" fill="url(#sofiaHairShine)" opacity="0.3"/>

    <!-- Ears -->
    <ellipse cx="54" cy="88" rx="5" ry="7" fill="#FDDCBD"/>
    <ellipse cx="54" cy="88" rx="2.5" ry="4" fill="#F0C9A0" opacity="0.4"/>
    <ellipse cx="146" cy="88" rx="5" ry="7" fill="#FDDCBD"/>
    <ellipse cx="146" cy="88" rx="2.5" ry="4" fill="#F0C9A0" opacity="0.4"/>

    <!-- FACE FEATURES -->
    <!-- Eyebrows -->
    <path d="M72 68 Q80 63 90 66" fill="none" stroke="#5C3D2E" stroke-width="1.4" stroke-linecap="round" opacity="0.6"/>
    <path d="M128 68 Q120 63 110 66" fill="none" stroke="#5C3D2E" stroke-width="1.4" stroke-linecap="round" opacity="0.6"/>

    <!-- Left eye -->
    <ellipse cx="82" cy="82" rx="13" ry="14" fill="white"/>
    <ellipse cx="82" cy="84" rx="9.5" ry="10.5" fill="url(#sofiaEyeL)"/>
    <ellipse cx="82" cy="85" rx="4.5" ry="5.5" fill="#14532D"/>
    <circle cx="77" cy="79" r="3.5" fill="white" opacity="0.95"/>
    <circle cx="86" cy="88" r="1.8" fill="white" opacity="0.7"/>
    <circle cx="79" cy="86" r="1" fill="white" opacity="0.5"/>
    <path d="M76 78 L77 76.5 L78 78 L79.5 77 L78 78 L77 79.5 L76 78 L74.5 77 Z" fill="white" opacity="0.6"/>
    <path d="M69 77 Q76 69 82 69 Q88 69 95 77" fill="none" stroke="#5C3D2E" stroke-width="2" stroke-linecap="round"/>
    <path d="M69 77 Q66 73 64 69" fill="none" stroke="#5C3D2E" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M72 74 Q70 70 69 67" fill="none" stroke="#5C3D2E" stroke-width="1.1" stroke-linecap="round"/>

    <!-- Right eye -->
    <ellipse cx="118" cy="82" rx="13" ry="14" fill="white"/>
    <ellipse cx="118" cy="84" rx="9.5" ry="10.5" fill="url(#sofiaEyeR)"/>
    <ellipse cx="118" cy="85" rx="4.5" ry="5.5" fill="#14532D"/>
    <circle cx="113" cy="79" r="3.5" fill="white" opacity="0.95"/>
    <circle cx="122" cy="88" r="1.8" fill="white" opacity="0.7"/>
    <circle cx="115" cy="86" r="1" fill="white" opacity="0.5"/>
    <path d="M112 78 L113 76.5 L114 78 L115.5 77 L114 78 L113 79.5 L112 78 L110.5 77 Z" fill="white" opacity="0.6"/>
    <path d="M105 77 Q112 69 118 69 Q124 69 131 77" fill="none" stroke="#5C3D2E" stroke-width="2" stroke-linecap="round"/>
    <path d="M131 77 Q134 73 136 69" fill="none" stroke="#5C3D2E" stroke-width="1.4" stroke-linecap="round"/>
    <path d="M128 74 Q130 70 131 67" fill="none" stroke="#5C3D2E" stroke-width="1.1" stroke-linecap="round"/>

    <!-- Blush -->
    <ellipse cx="68" cy="97" rx="9" ry="5" fill="#FCA5A5" filter="url(#sofiaBlush)" opacity="0.45"/>
    <ellipse cx="132" cy="97" rx="9" ry="5" fill="#FCA5A5" filter="url(#sofiaBlush)" opacity="0.45"/>

    <!-- Nose -->
    <ellipse cx="100" cy="93" rx="2" ry="1.5" fill="#F0C9A0" opacity="0.6"/>

    <!-- Mouth - neutral gentle smile -->
    <path d="M93 105 Q100 110 107 105" fill="none" stroke="#D97070" stroke-width="1.6" stroke-linecap="round"/>

    <!-- Hair wisps -->
    <path d="M88 40 Q86 50 89 57" fill="none" stroke="#A0764A" stroke-width="1.3" opacity="0.3" stroke-linecap="round"/>
    <path d="M100 36 Q99 46 100 54" fill="none" stroke="#A0764A" stroke-width="1.3" opacity="0.3" stroke-linecap="round"/>
    <path d="M112 40 Q114 50 111 57" fill="none" stroke="#A0764A" stroke-width="1.3" opacity="0.3" stroke-linecap="round"/>

    <!-- Small flower accessory in hair -->
    <circle cx="138" cy="52" r="5" fill="#FDE047" opacity="0.8"/>
    <circle cx="138" cy="52" r="2.5" fill="#FB923C" opacity="0.9"/>
    <path d="M133 52 Q135 49 138 47" fill="none" stroke="#FDE047" stroke-width="1" opacity="0.6"/>
    <path d="M143 52 Q141 49 138 47" fill="none" stroke="#FDE047" stroke-width="1" opacity="0.6"/>
  </g>
</svg>