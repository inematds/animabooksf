<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="pSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="100%" stop-color="#81D4FA"/>
    </linearGradient>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#29B6F6"/>
      <stop offset="100%" stop-color="#0288D1"/>
    </linearGradient>
  </defs>
  <!-- Sky -->
  <rect width="960" height="540" fill="url(#pSky)"/>
  <!-- Sun -->
  <circle cx="800" cy="80" r="55" fill="#FFF176" opacity="0.9"/>
  <circle cx="800" cy="80" r="45" fill="#FFEE58"/>
  <!-- Clouds -->
  <ellipse cx="200" cy="70" rx="70" ry="25" fill="white" opacity="0.8"/>
  <ellipse cx="250" cy="65" rx="50" ry="20" fill="white" opacity="0.8"/>
  <ellipse cx="550" cy="50" rx="60" ry="22" fill="white" opacity="0.7"/>
  <!-- Ocean -->
  <rect x="0" y="250" width="960" height="100" fill="url(#ocean)"/>
  <!-- Waves -->
  <path d="M0,280 Q60,265 120,280 Q180,295 240,280 Q300,265 360,280 Q420,295 480,280 Q540,265 600,280 Q660,295 720,280 Q780,265 840,280 Q900,295 960,280 L960,350 L0,350Z" fill="#039BE5" opacity="0.6"/>
  <path d="M0,300 Q60,288 120,300 Q180,312 240,300 Q300,288 360,300 Q420,312 480,300 Q540,288 600,300 Q660,312 720,300 Q780,288 840,300 Q900,312 960,300 L960,350 L0,350Z" fill="#0277BD" opacity="0.4"/>
  <!-- Wet sand -->
  <rect x="0" y="340" width="960" height="30" fill="#C8A86E"/>
  <!-- Beach sand -->
  <rect x="0" y="360" width="960" height="180" fill="#F0D68A"/>
  <ellipse cx="300" cy="380" rx="200" ry="20" fill="#E8C878"/>
  <ellipse cx="700" cy="400" rx="180" ry="18" fill="#E8C878"/>
  <!-- Palm tree -->
  <path d="M80,420 Q85,350 78,280" stroke="#8D6E63" stroke-width="10" fill="none" stroke-linecap="round"/>
  <ellipse cx="60" cy="280" rx="50" ry="12" fill="#66BB6A" transform="rotate(-20 60 280)"/>
  <ellipse cx="100" cy="275" rx="50" ry="12" fill="#4CAF50" transform="rotate(15 100 275)"/>
  <ellipse cx="70" cy="270" rx="45" ry="10" fill="#81C784" transform="rotate(-40 70 270)"/>
  <!-- Shells -->
  <ellipse cx="400" cy="480" rx="8" ry="5" fill="#FFCCBC"/>
  <ellipse cx="600" cy="500" rx="6" ry="4" fill="#FFE0B2"/>
  <ellipse cx="250" cy="510" rx="7" ry="4" fill="#FFCCBC"/>
  <!-- Starfish -->
  <polygon points="500,460 503,468 512,468 505,473 508,481 500,476 492,481 495,473 488,468 497,468" fill="#FF8A65"/>
  <!-- Bucket and shovel -->
  <rect x="820" y="440" width="30" height="30" rx="3" fill="#EF5350"/>
  <rect x="825" y="435" width="20" height="5" rx="2" fill="#E53935"/>
  <line x1="870" y1="470" x2="890" y2="440" stroke="#8D6E63" stroke-width="4" stroke-linecap="round"/>
  <rect x="885" y="432" width="18" height="12" rx="2" fill="#8D6E63"/>
</svg>