<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Body -->
  <ellipse cx="38" cy="48" rx="18" ry="14" fill="#8D6E63"/>
  <!-- Breast -->
  <ellipse cx="48" cy="50" rx="10" ry="12" fill="#A1887F"/>
  <!-- Neck -->
  <rect x="48" y="30" width="8" height="15" fill="#8D6E63" rx="3"/>
  <!-- Head -->
  <circle cx="54" cy="26" r="9" fill="#8D6E63"/>
  <!-- Comb -->
  <circle cx="54" cy="16" r="4" fill="#E53935"/>
  <circle cx="50" cy="18" r="3" fill="#E53935"/>
  <circle cx="58" cy="18" r="3" fill="#E53935"/>
  <!-- Beak -->
  <polygon points="62,26 68,24 62,22" fill="#FF8F00"/>
  <!-- Eye -->
  <circle cx="57" cy="24" r="2" fill="#333"/>
  <circle cx="57.5" cy="23.5" r="0.8" fill="white"/>
  <!-- Wattle -->
  <ellipse cx="58" cy="30" rx="3" ry="4" fill="#E53935"/>
  <!-- Wing -->
  <ellipse cx="32" cy="45" rx="10" ry="8" fill="#795548" transform="rotate(-10,32,45)"/>
  <!-- Tail feathers -->
  <path d="M20 42 Q12 30 15 25" stroke="#5D4037" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M22 40 Q15 28 20 22" stroke="#795548" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M24 38 Q18 28 24 20" stroke="#5D4037" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Legs -->
  <line x1="38" y1="60" x2="38" y2="72" stroke="#FF8F00" stroke-width="3"/>
  <line x1="48" y1="60" x2="48" y2="72" stroke="#FF8F00" stroke-width="3"/>
  <!-- Feet -->
  <path d="M33 72 L38 72 L43 72" stroke="#FF8F00" stroke-width="2" fill="none"/>
  <path d="M38 72 L38 76" stroke="#FF8F00" stroke-width="2"/>
  <path d="M43 72 L48 72 L53 72" stroke="#FF8F00" stroke-width="2" fill="none"/>
  <path d="M48 72 L48 76" stroke="#FF8F00" stroke-width="2"/>
