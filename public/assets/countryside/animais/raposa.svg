  <ellipse cx="40" cy="50" rx="10" ry="7" fill="#FFE0B2"/>
  <!-- Head -->
  <circle cx="58" cy="34" r="11" fill="#FF7043"/>
  <!-- Face white -->
  <path d="M58 30 Q62 38 58 44 Q54 38 58 30" fill="white"/>
  <!-- Eyes -->
  <circle cx="54" cy="32" r="2" fill="#333"/>
  <circle cx="62" cy="32" r="2" fill="#333"/>
  <circle cx="54.5" cy="31.5" r="0.8" fill="white"/>
  <circle cx="62.5" cy="31.5" r="0.8" fill="white"/>
  <!-- Nose -->
  <circle cx="58" cy="36" r="2" fill="#333"/>
  <!-- Ears -->
  <polygon points="50,26 48,14 56,22" fill="#FF7043"/>
  <polygon points="51,24 49,16 55,22" fill="#FFE0B2"/>
  <polygon points="66,26 64,14 72,22" fill="#FF7043"/>
  <polygon points="65,24 64,16 70,22" fill="#FFE0B2"/>
  <!-- Legs -->
  <rect x="22" y="53" width="5" height="14" fill="#BF360C" rx="2"/>
  <rect x="32" y="53" width="5" height="14" fill="#BF360C" rx="2"/>
  <rect x="42" y="53" width="5" height="14" fill="#BF360C" rx="2"/>
  <rect x="50" y="53" width="5" height="14" fill="#BF360C" rx="2"/>
  <!-- Paws -->
  <rect x="21" y="65" width="7" height="4" fill="#333" rx="1"/>
  <rect x="31" y="65" width="7" height="4" fill="#333" rx="1"/>
  <rect x="41" y="65" width="7" height="4" fill="#333" rx="1"/>
  <rect x="49" y="65" width="7" height="4" fill="#333" rx="1"/>
  <!-- Big fluffy tail -->
  <ellipse cx="14" cy="40" rx="12" ry="8" fill="#FF7043" transform="rotate(-20,14,40)"/>
  <ellipse cx="10" cy="38" rx="6" ry="4" fill="white" transform="rotate(-20,10,38)"/>
