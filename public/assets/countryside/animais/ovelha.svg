<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Fluffy body -->
  <circle cx="40" cy="42" r="12" fill="#F5F5F5"/>
  <circle cx="30" cy="40" r="10" fill="#EEEEEE"/>
  <circle cx="50" cy="40" r="10" fill="#EEEEEE"/>
  <circle cx="35" cy="35" r="9" fill="#F5F5F5"/>
  <circle cx="45" cy="35" r="9" fill="#F5F5F5"/>
  <circle cx="40" cy="48" r="10" fill="#EEEEEE"/>
  <circle cx="32" cy="47" r="8" fill="#F5F5F5"/>
  <circle cx="48" cy="47" r="8" fill="#F5F5F5"/>
  <!-- Head -->
  <ellipse cx="58" cy="32" rx="9" ry="8" fill="#333"/>
  <!-- Face -->
  <ellipse cx="60" cy="34" rx="5" ry="4" fill="#555"/>
  <!-- Eyes -->
  <circle cx="58" cy="30" r="2" fill="white"/>
  <circle cx="58" cy="30" r="1" fill="#333"/>
  <!-- Ears -->
  <ellipse cx="52" cy="26" rx="5" ry="3" fill="#555" transform="rotate(-20,52,26)"/>
  <ellipse cx="63" cy="26" rx="5" ry="3" fill="#555" transform="rotate(20,63,26)"/>
  <!-- Fluffy top -->
  <circle cx="55" cy="24" r="5" fill="#F5F5F5"/>
  <circle cx="58" cy="22" r="4" fill="#EEEEEE"/>
  <!-- Legs -->
  <rect x="28" y="52" width="5" height="16" fill="#333" rx="2"/>
  <rect x="37" y="52" width="5" height="16" fill="#333" rx="2"/>
  <rect x="44" y="52" width="5" height="16" fill="#333" rx="2"/>
  <rect x="51" y="52" width="5" height="16" fill="#333" rx="2"/>
  <!-- Hooves -->
  <rect x="27" y="66" width="7" height="4" fill="#222" rx="1"/>
  <rect x="36" y="66" width="7" height="4" fill="#222" rx="1"/>
  <rect x="43" y="66" width="7" height="4" fill="#222" rx="1"/>
  <rect x="50" y="66" width="7" height="4" fill="#222" rx="1"/>
  <!-- Tail fluff -->
  <circle cx="22" cy="40" r="5" fill="#F5F5F5"/>
</svg>