<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Wings spread -->
  <path d="M40 40 Q20 25 2 20 Q8 30 10 35 Q5 28 0 25 Q6 35 12 40 L40 40Z" fill="#5D4037"/>
  <path d="M40 40 Q60 25 78 20 Q72 30 70 35 Q75 28 80 25 Q74 35 68 40 L40 40Z" fill="#5D4037"/>
  <!-- Wing inner -->
  <path d="M40 40 Q25 30 10 28 Q18 34 20 38 L40 40Z" fill="#795548"/>
  <path d="M40 40 Q55 30 70 28 Q62 34 60 38 L40 40Z" fill="#795548"/>
  <!-- Body -->
  <ellipse cx="40" cy="48" rx="10" ry="14" fill="#6D4C41"/>
  <!-- Belly -->
  <ellipse cx="40" cy="50" rx="6" ry="10" fill="#8D6E63"/>
  <!-- Head -->
  <circle cx="40" cy="30" r="8" fill="white"/>
  <!-- Eye -->
  <circle cx="37" cy="28" r="2" fill="#333"/>
  <circle cx="43" cy="28" r="2" fill="#333"/>
  <circle cx="37.5" cy="27.5" r="0.8" fill="white"/>
  <circle cx="43.5" cy="27.5" r="0.8" fill="white"/>
  <!-- Beak -->
  <polygon points="40,32 36,36 40,40 44,36" fill="#FF8F00"/>
  <polygon points="40,36 38,38 40,42" fill="#E65100"/>
  <!-- Tail feathers -->
  <path d="M35 60 L30 72 M38 60 L36 72 M40 60 L40 73 M42 60 L44 72 M45 60 L50 72" stroke="#5D4037" stroke-width="3" stroke-linecap="round"/>
  <!-- Feet/talons -->
  <path d="M34 62 L28 68 M34 62 L32 70 M34 62 L36 70" stroke="#FF8F00" stroke-width="2" stroke-linecap="round"/>
  <path d="M46 62 L44 70 M46 62 L48 70 M46 62 L52 68" stroke="#FF8F00" stroke-width="2" stroke-linecap="round"/>
  <!-- Fierce brow -->
  <line x1="34" y1="26" x2="38" y2="27" stroke="#5D4037" stroke-width="1.5"/>
  <line x1="46" y1="26" x2="42" y2="27" stroke="#5D4037" stroke-width="1.5"/>
</svg>