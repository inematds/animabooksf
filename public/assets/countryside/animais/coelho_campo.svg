<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Body -->
  <ellipse cx="40" cy="50" rx="16" ry="13" fill="#A1887F"/>
  <!-- Head -->
  <circle cx="55" cy="40" r="11" fill="#BCAAA4"/>
  <!-- Long ears -->
  <ellipse cx="48" cy="20" rx="4" ry="14" fill="#BCAAA4"/>
  <ellipse cx="48" cy="20" rx="2" ry="12" fill="#FFCCBC"/>
  <ellipse cx="58" cy="18" rx="4" ry="14" fill="#BCAAA4"/>
  <ellipse cx="58" cy="18" rx="2" ry="12" fill="#FFCCBC"/>
  <!-- Eye -->
  <circle cx="58" cy="38" r="3" fill="#333"/>
  <circle cx="59" cy="37" r="1" fill="white"/>
  <!-- Nose -->
  <ellipse cx="63" cy="42" rx="2" ry="1.5" fill="#F48FB1"/>
  <!-- Whiskers -->
  <line x1="64" y1="41" x2="75" y2="39" stroke="#999" stroke-width="0.5"/>
  <line x1="64" y1="43" x2="75" y2="44" stroke="#999" stroke-width="0.5"/>
  <line x1="64" y1="42" x2="76" y2="42" stroke="#999" stroke-width="0.5"/>
  <!-- Cheek -->
  <circle cx="60" cy="44" r="3" fill="#FFCCBC" opacity="0.4"/>
  <!-- Front legs -->
  <rect x="48" y="56" width="5" height="12" fill="#BCAAA4" rx="2"/>
  <rect x="54" y="56" width="5" height="12" fill="#BCAAA4" rx="2"/>
  <!-- Back legs -->
  <ellipse cx="28" cy="58" rx="8" ry="6" fill="#A1887F"/>
  <rect x="26" y="60" width="6" height="10" fill="#BCAAA4" rx="2"/>
  <!-- Paws -->
  <ellipse cx="50" cy="68" rx="3" ry="2" fill="#8D6E63"/>
  <ellipse cx="56" cy="68" rx="3" ry="2" fill="#8D6E63"/>
  <ellipse cx="29" cy="70" rx="4" ry="2" fill="#8D6E63"/>
  <!-- Fluffy tail -->
  <circle cx="24" cy="48" r="6" fill="white"/>
</svg>