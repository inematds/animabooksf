<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Big fluffy tail -->
  <ellipse cx="20" cy="30" rx="12" ry="20" fill="#A1887F" transform="rotate(15,20,30)"/>
  <ellipse cx="16" cy="25" rx="8" ry="14" fill="#BCAAA4" transform="rotate(15,16,25)"/>
  <!-- Body -->
  <ellipse cx="42" cy="48" rx="14" ry="12" fill="#8D6E63"/>
  <!-- Belly -->
  <ellipse cx="45" cy="50" rx="8" ry="8" fill="#D7CCC8"/>
  <!-- Head -->
  <circle cx="55" cy="35" r="10" fill="#A1887F"/>
  <!-- Ears -->
  <ellipse cx="48" cy="26" rx="4" ry="5" fill="#A1887F"/>
  <ellipse cx="48" cy="26" rx="2" ry="4" fill="#FFCCBC"/>
  <ellipse cx="60" cy="26" rx="4" ry="5" fill="#A1887F"/>
  <ellipse cx="60" cy="26" rx="2" ry="4" fill="#FFCCBC"/>
  <!-- Eye -->
  <circle cx="58" cy="33" r="3" fill="#333"/>
  <circle cx="59" cy="32" r="1.2" fill="white"/>
  <!-- Nose -->
  <circle cx="63" cy="36" r="1.5" fill="#333"/>
  <!-- Cheek -->
  <circle cx="60" cy="38" r="3" fill="#FFCCBC" opacity="0.4"/>
  <!-- Arms holding acorn -->
  <rect x="50" y="44" width="4" height="10" fill="#8D6E63" rx="2" transform="rotate(20,52,49)"/>
  <rect x="56" y="44" width="4" height="10" fill="#8D6E63" rx="2" transform="rotate(-20,58,49)"/>
  <!-- Acorn -->
  <circle cx="55" cy="55" r="4" fill="#8D6E63"/>
  <rect x="52" y="50" width="6" height="4" fill="#A1887F" rx="1"/>
  <line x1="55" y1="48" x2="55" y2="50" stroke="#5D4037" stroke-width="1.5"/>
  <!-- Legs -->
  <ellipse cx="34" cy="58" rx="6" ry="4" fill="#8D6E63"/>
  <ellipse cx="46" cy="60" rx="5" ry="3" fill="#8D6E63"/>
  <!-- Feet -->
  <ellipse cx="30" cy="62" rx="5" ry="3" fill="#795548"/>
  <ellipse cx="48" cy="63" rx="5" ry="3" fill="#795548"/>
</svg>