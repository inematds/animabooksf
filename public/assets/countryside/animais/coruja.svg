<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Body -->
  <ellipse cx="40" cy="50" rx="18" ry="20" fill="#795548"/>
  <!-- Belly pattern -->
  <ellipse cx="40" cy="55" rx="12" ry="14" fill="#A1887F"/>
  <!-- Belly lines -->
  <path d="M32 48 Q40 50 48 48" stroke="#795548" stroke-width="1" fill="none"/>
  <path d="M31 53 Q40 55 49 53" stroke="#795548" stroke-width="1" fill="none"/>
  <path d="M32 58 Q40 60 48 58" stroke="#795548" stroke-width="1" fill="none"/>
  <path d="M33 63 Q40 65 47 63" stroke="#795548" stroke-width="1" fill="none"/>
  <!-- Head -->
  <circle cx="40" cy="28" r="14" fill="#8D6E63"/>
  <!-- Ear tufts -->
  <polygon points="28,18 26,6 34,16" fill="#795548"/>
  <polygon points="52,18 54,6 46,16" fill="#795548"/>
  <!-- Eye discs -->
  <circle cx="34" cy="26" r="8" fill="#D7CCC8"/>
  <circle cx="46" cy="26" r="8" fill="#D7CCC8"/>
  <!-- Eyes -->
  <circle cx="34" cy="26" r="5" fill="#FF8F00"/>
  <circle cx="46" cy="26" r="5" fill="#FF8F00"/>
  <circle cx="34" cy="26" r="3" fill="#333"/>
  <circle cx="46" cy="26" r="3" fill="#333"/>
  <circle cx="35" cy="25" r="1" fill="white"/>
  <circle cx="47" cy="25" r="1" fill="white"/>
  <!-- Beak -->
  <polygon points="40,30 37,34 43,34" fill="#FF8F00"/>
  <!-- Wings -->
  <ellipse cx="20" cy="48" rx="8" ry="16" fill="#6D4C41" transform="rotate(10,20,48)"/>
  <ellipse cx="60" cy="48" rx="8" ry="16" fill="#6D4C41" transform="rotate(-10,60,48)"/>
  <!-- Feet -->
  <path d="M34 68 L30 74 M34 68 L34 74 M34 68 L38 74" stroke="#FF8F00" stroke-width="2" stroke-linecap="round"/>
  <path d="M46 68 L42 74 M46 68 L46 74 M46 68 L50 74" stroke="#FF8F00" stroke-width="2" stroke-linecap="round"/>
</svg>