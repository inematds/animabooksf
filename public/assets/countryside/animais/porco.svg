  <rect x="23" y="67" width="8" height="4" fill="#AD1457" rx="1"/>
  <rect x="33" y="67" width="8" height="4" fill="#AD1457" rx="1"/>
  <rect x="43" y="67" width="8" height="4" fill="#AD1457" rx="1"/>
