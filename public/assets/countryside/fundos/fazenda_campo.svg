<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <!-- Sky -->
  <rect width="960" height="540" fill="#87CEEB"/>
  <!-- Sun -->
  <circle cx="150" cy="80" r="45" fill="#FFD700"/>
  <!-- Clouds -->
  <ellipse cx="400" cy="70" rx="65" ry="28" fill="white" opacity="0.85"/>
  <ellipse cx="450" cy="60" rx="50" ry="22" fill="white" opacity="0.85"/>
  <ellipse cx="750" cy="90" rx="55" ry="24" fill="white" opacity="0.85"/>
  <!-- Far hills -->
  <ellipse cx="480" cy="280" rx="520" ry="60" fill="#66BB6A"/>
  <!-- Ground -->
  <rect y="280" width="960" height="260" fill="#43A047"/>
  <rect y="500" width="960" height="40" fill="#388E3C"/>
  <!-- Barn -->
  <rect x="120" y="200" width="180" height="140" fill="#D32F2F" rx="3"/>
  <polygon points="120,200 210,140 300,200" fill="#B71C1C"/>
  <!-- Barn door -->
  <rect x="175" y="270" width="60" height="70" fill="#5D4037" rx="3"/>
  <rect x="175" y="270" width="30" height="70" fill="#4E342E" rx="2"/>
  <!-- Barn window -->
  <rect x="145" y="230" width="25" height="25" fill="#FFF9C4" rx="2"/>
  <rect x="240" y="230" width="25" height="25" fill="#FFF9C4" rx="2"/>
  <!-- Barn X decoration -->
  <line x1="175" y1="200" x2="235" y2="260" stroke="#B71C1C" stroke-width="4"/>
  <line x1="235" y1="200" x2="175" y2="260" stroke="#B71C1C" stroke-width="4"/>
  <!-- Silo -->
  <rect x="330" y="180" width="60" height="160" fill="#90A4AE" rx="5"/>
  <ellipse cx="360" cy="180" rx="30" ry="12" fill="#78909C"/>
  <rect x="330" y="170" width="60" height="15" fill="#78909C" rx="5"/>
  <!-- Fence area -->
  <rect x="450" y="340" width="8" height="50" fill="#8D6E63" rx="2"/>
  <rect x="550" y="340" width="8" height="50" fill="#8D6E63" rx="2"/>
  <rect x="650" y="340" width="8" height="50" fill="#8D6E63" rx="2"/>
  <rect x="750" y="340" width="8" height="50" fill="#8D6E63" rx="2"/>
  <rect x="850" y="340" width="8" height="50" fill="#8D6E63" rx="2"/>
  <rect x="450" y="350" width="408" height="5" fill="#A1887F" rx="2"/>
  <rect x="450" y="372" width="408" height="5" fill="#A1887F" rx="2"/>
  <!-- Dirt path -->
  <path d="M210 340 Q300 400 400 450 Q500 500 600 530" stroke="#A1887F" stroke-width="40" fill="none" stroke-linecap="round" opacity="0.6"/>
  <!-- Hay bales -->
  <ellipse cx="500" cy="310" rx="25" ry="18" fill="#F9A825"/>
  <ellipse cx="555" cy="310" rx="25" ry="18" fill="#FBC02D"/>
  <ellipse cx="528" cy="292" rx="25" ry="18" fill="#FFD54F"/>
</svg>