<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <!-- Night sky -->
  <rect width="960" height="540" fill="#1A237E"/>
  <!-- Stars -->
  <circle cx="100" cy="50" r="2" fill="white"/>
  <circle cx="200" cy="80" r="1.5" fill="white"/>
  <circle cx="300" cy="30" r="2" fill="white"/>
  <circle cx="400" cy="100" r="1.5" fill="white"/>
  <circle cx="500" cy="40" r="2" fill="white"/>
  <circle cx="600" cy="70" r="1.5" fill="white"/>
  <circle cx="700" cy="25" r="2" fill="white"/>
  <circle cx="800" cy="90" r="1.5" fill="white"/>
  <circle cx="900" cy="45" r="2" fill="white"/>
  <circle cx="150" cy="120" r="1" fill="white" opacity="0.7"/>
  <circle cx="250" cy="150" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="450" cy="130" r="1" fill="white" opacity="0.7"/>
  <circle cx="550" cy="110" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="750" cy="140" r="1" fill="white" opacity="0.7"/>
  <circle cx="850" cy="60" r="1" fill="white" opacity="0.6"/>
  <circle cx="50" cy="160" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="650" cy="160" r="1" fill="white" opacity="0.7"/>
  <circle cx="350" cy="170" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="950" cy="120" r="1" fill="white" opacity="0.7"/>
  <!-- Twinkling stars -->
  <polygon points="480,60 482,55 485,60 482,65" fill="white" opacity="0.9"/>
  <polygon points="780,30 782,25 785,30 782,35" fill="white" opacity="0.9"/>
  <polygon points="130,90 132,85 135,90 132,95" fill="white" opacity="0.8"/>
  <!-- Moon -->
  <circle cx="820" cy="80" r="40" fill="#FFF9C4"/>
  <circle cx="835" cy="70" r="35" fill="#1A237E"/>
  <!-- Moon glow -->
  <circle cx="820" cy="80" r="55" fill="#FFF9C4" opacity="0.1"/>
  <!-- Hills silhouette -->
  <ellipse cx="200" cy="280" rx="300" ry="60" fill="#1B5E20" opacity="0.8"/>
  <ellipse cx="700" cy="270" rx="350" ry="70" fill="#1B5E20" opacity="0.7"/>
  <!-- Ground -->
  <rect y="280" width="960" height="260" fill="#1B5E20"/>
  <!-- Dark grass -->
  <rect y="510" width="960" height="30" fill="#0D3B0D"/>
  <!-- Tree silhouettes -->
  <rect x="100" y="220" width="12" height="80" fill="#0D3B0D"/>
  <circle cx="106" cy="200" r="35" fill="#0D3B0D"/>
  <rect x="800" y="200" width="14" height="100" fill="#0D3B0D"/>
  <circle cx="807" cy="180" r="40" fill="#0D3B0D"/>
  <polygon points="350,280 375,180 400,280" fill="#0D3B0D"/>
  <polygon points="600,280 620,190 640,280" fill="#0D3B0D"/>
  <!-- Fireflies -->
  <circle cx="250" cy="350" r="3" fill="#FFEB3B" opacity="0.7"/>
  <circle cx="250" cy="350" r="6" fill="#FFEB3B" opacity="0.15"/>
  <circle cx="500" cy="320" r="3" fill="#FFEB3B" opacity="0.6"/>
  <circle cx="500" cy="320" r="6" fill="#FFEB3B" opacity="0.12"/>
  <circle cx="700" cy="380" r="3" fill="#FFEB3B" opacity="0.7"/>
  <circle cx="700" cy="380" r="6" fill="#FFEB3B" opacity="0.15"/>
  <circle cx="400" cy="400" r="2" fill="#FFEB3B" opacity="0.5"/>
  <circle cx="400" cy="400" r="5" fill="#FFEB3B" opacity="0.1"/>
  <circle cx="150" cy="430" r="2" fill="#FFEB3B" opacity="0.6"/>
  <circle cx="850" cy="340" r="2" fill="#FFEB3B" opacity="0.5"/>
  <!-- Fence silhouette -->
  <rect x="450" y="350" width="6" height="40" fill="#0D3B0D"/>
  <rect x="530" y="350" width="6" height="40" fill="#0D3B0D"/>
  <rect x="610" y="350" width="6" height="40" fill="#0D3B0D"/>
  <rect x="450" y="358" width="166" height="4" fill="#0D3B0D"/>
  <rect x="450" y="375" width="166" height="4" fill="#0D3B0D"/>
