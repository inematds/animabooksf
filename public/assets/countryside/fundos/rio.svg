<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <!-- Sky -->
  <rect width="960" height="540" fill="#87CEEB"/>
  <!-- Clouds -->
  <ellipse cx="250" cy="65" rx="60" ry="25" fill="white" opacity="0.85"/>
  <ellipse cx="650" cy="50" rx="55" ry="22" fill="white" opacity="0.85"/>
  <ellipse cx="850" cy="85" rx="50" ry="20" fill="white" opacity="0.85"/>
  <!-- Far hills -->
  <ellipse cx="300" cy="220" rx="350" ry="50" fill="#66BB6A"/>
  <ellipse cx="750" cy="210" rx="300" ry="55" fill="#5CAD5C"/>
  <!-- Ground -->
  <rect y="230" width="960" height="310" fill="#43A047"/>
  <!-- River -->
  <path d="M0 350 Q150 300 300 350 Q450 400 600 340 Q750 280 960 330" stroke="none" fill="#29B6F6"/>
  <path d="M0 390 Q150 340 300 390 Q450 440 600 380 Q750 320 960 370" stroke="none" fill="#29B6F6"/>
  <path d="M0 350 Q150 300 300 350 Q450 400 600 340 Q750 280 960 330 L960 370 Q750 320 600 380 Q450 440 300 390 Q150 340 0 390 Z" fill="#29B6F6"/>
  <!-- Water shimmer -->
  <rect x="150" y="350" width="40" height="3" fill="white" opacity="0.3" rx="1"/>
  <rect x="400" y="370" width="50" height="3" fill="white" opacity="0.3" rx="1"/>
  <rect x="700" y="330" width="45" height="3" fill="white" opacity="0.3" rx="1"/>
  <!-- River banks -->
  <path d="M0 348 Q150 298 300 348 Q450 398 600 338 Q750 278 960 328" stroke="#8D6E63" stroke-width="4" fill="none"/>
  <path d="M0 392 Q150 342 300 392 Q450 442 600 382 Q750 322 960 372" stroke="#8D6E63" stroke-width="4" fill="none"/>
  <!-- Stones in river -->
  <ellipse cx="250" cy="365" rx="10" ry="7" fill="#757575"/>
  <ellipse cx="500" cy="370" rx="12" ry="8" fill="#616161"/>
  <ellipse cx="750" cy="340" rx="9" ry="6" fill="#757575"/>
  <!-- Stones on bank -->
  <ellipse cx="180" cy="330" rx="15" ry="10" fill="#9E9E9E"/>
  <ellipse cx="600" cy="310" rx="12" ry="8" fill="#757575"/>
  <ellipse cx="850" cy="400" rx="14" ry="9" fill="#9E9E9E"/>
  <!-- Bushes -->
  <circle cx="100" cy="310" r="20" fill="#388E3C"/>
  <circle cx="400" cy="290" r="18" fill="#4CAF50"/>
  <circle cx="800" cy="410" r="22" fill="#388E3C"/>
  <!-- Trees -->
  <rect x="680" y="230" width="10" height="55" fill="#5D4037"/>
  <circle cx="685" cy="210" r="30" fill="#4CAF50"/>
  <rect x="50" y="250" width="10" height="50" fill="#5D4037"/>
  <circle cx="55" cy="230" r="28" fill="#43A047"/>
  <!-- Grass details -->
  <line x1="300" y1="500" x2="305" y2="485" stroke="#2E7D32" stroke-width="2"/>
  <line x1="500" y1="480" x2="495" y2="465" stroke="#2E7D32" stroke-width="2"/>
</svg>