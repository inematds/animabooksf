  <rect x="16" y="16" width="48" height="14" fill="#E64A19" rx="5"/>
  <!-- Flap buckle -->
  <rect x="36" y="28" width="8" height="5" fill="#FFD700" rx="1"/>
  <!-- Front pocket -->
  <rect x="24" y="40" width="32" height="20" fill="#F4511E" rx="4"/>
  <rect x="36" y="40" width="8" height="3" fill="#FFD700" rx="1"/>
  <!-- Side pocket left -->
  <rect x="12" y="35" width="8" height="20" fill="#E64A19" rx="3"/>
  <!-- Side pocket right -->
  <rect x="60" y="35" width="8" height="20" fill="#E64A19" rx="3"/>
  <!-- Straps -->
  <rect x="22" y="18" width="6" height="50" fill="#BF360C" rx="2"/>
