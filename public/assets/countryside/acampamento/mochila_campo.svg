  <!-- Sleeping pad roll on top -->
  <ellipse cx="40" cy="12" rx="14" ry="5" fill="#81C784"/>
  <ellipse cx="26" cy="12" rx="5" ry="5" fill="#66BB6A"/>
  <circle cx="26" cy="12" r="2" fill="#4CAF50"/>
  <ellipse cx="54" cy="12" rx="5" ry="5" fill="#66BB6A"/>
