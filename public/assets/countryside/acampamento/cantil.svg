<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Strap -->
  <path d="M25 20 Q10 40 25 65" stroke="#8D6E63" stroke-width="3" fill="none"/>
  <path d="M55 20 Q70 40 55 65" stroke="#8D6E63" stroke-width="3" fill="none"/>
  <!-- Canteen body -->
  <ellipse cx="40" cy="45" rx="18" ry="22" fill="#78909C"/>
  <!-- Highlight -->
  <ellipse cx="35" cy="40" rx="8" ry="14" fill="#90A4AE" opacity="0.6"/>
  <!-- Seam -->
  <ellipse cx="40" cy="45" rx="18" ry="22" fill="none" stroke="#607D8B" stroke-width="1.5"/>
  <!-- Neck -->
  <rect x="35" y="20" width="10" height="8" fill="#607D8B" rx="2"/>
  <!-- Cap -->
  <rect x="33" y="14" width="14" height="8" fill="#455A64" rx="3"/>
  <!-- Cap detail -->
  <rect x="36" y="16" width="8" height="2" fill="#546E7A" rx="1"/>
  <!-- Chain to cap -->
  <path d="M38 22 Q30 18 34 14" stroke="#455A64" stroke-width="1.5" fill="none"/>
  <!-- Stitch lines -->
  <ellipse cx="40" cy="45" rx="14" ry="18" fill="none" stroke="#607D8B" stroke-width="0.8" stroke-dasharray="3,2"/>
  <!-- Star emblem -->
  <polygon points="40,38 41.5,42 46,42 42.5,44.5 44,48 40,46 36,48 37.5,44.5 34,42 38.5,42" fill="#FFD700" opacity="0.7"/>
</svg>