<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Outer ring -->
  <circle cx="40" cy="40" r="30" fill="#8D6E63"/>
  <circle cx="40" cy="40" r="28" fill="#FFF8E1"/>
  <!-- Inner circle -->
  <circle cx="40" cy="40" r="24" fill="white"/>
  <circle cx="40" cy="40" r="24" fill="none" stroke="#8D6E63" stroke-width="1"/>
  <!-- Degree marks -->
  <line x1="40" y1="18" x2="40" y2="22" stroke="#333" stroke-width="2"/>
  <line x1="40" y1="58" x2="40" y2="62" stroke="#333" stroke-width="2"/>
  <line x1="18" y1="40" x2="22" y2="40" stroke="#333" stroke-width="2"/>
  <line x1="58" y1="40" x2="62" y2="40" stroke="#333" stroke-width="2"/>
  <!-- Minor marks -->
  <line x1="54" y1="22" x2="52" y2="24" stroke="#999" stroke-width="1"/>
  <line x1="26" y1="22" x2="28" y2="24" stroke="#999" stroke-width="1"/>
  <line x1="54" y1="58" x2="52" y2="56" stroke="#999" stroke-width="1"/>
  <line x1="26" y1="58" x2="28" y2="56" stroke="#999" stroke-width="1"/>
  <!-- Cardinal directions -->
  <text x="40" y="20" font-size="7" fill="#E53935" text-anchor="middle" font-weight="bold" font-family="sans-serif">N</text>
  <text x="40" y="66" font-size="7" fill="#333" text-anchor="middle" font-family="sans-serif">S</text>
  <text x="16" y="43" font-size="7" fill="#333" text-anchor="middle" font-family="sans-serif">O</text>
  <text x="64" y="43" font-size="7" fill="#333" text-anchor="middle" font-family="sans-serif">L</text>
  <!-- Compass needle - North (red) -->
  <polygon points="40,22 37,40 43,40" fill="#E53935"/>
  <!-- Compass needle - South (white) -->
  <polygon points="40,58 37,40 43,40" fill="#BDBDBD"/>
  <!-- Center pin -->
  <circle cx="40" cy="40" r="3" fill="#FFD700"/>
  <circle cx="40" cy="40" r="1.5" fill="#8D6E63"/>
  <!-- Glass reflection -->
  <ellipse cx="32" cy="32" rx="8" ry="4" fill="white" opacity="0.3" transform="rotate(-30,32,32)"/>
</svg>