<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Handle -->
  <path d="M30 15 Q40 5 50 15" stroke="#555" stroke-width="3" fill="none"/>
  <!-- Top cap -->
  <rect x="28" y="14" width="24" height="6" fill="#616161" rx="2"/>
  <!-- Glass body -->
  <rect x="26" y="20" width="28" height="38" fill="#FFEB3B" opacity="0.5" rx="3"/>
  <rect x="26" y="20" width="28" height="38" fill="none" stroke="#8D6E63" stroke-width="2" rx="3"/>
  <!-- Glow -->
  <ellipse cx="40" cy="39" rx="18" ry="22" fill="#FFEB3B" opacity="0.2"/>
  <!-- Flame -->
  <path d="M38 45 Q39 32 40 28 Q41 32 42 45 Z" fill="#FF9800"/>
  <path d="M39 45 Q39.5 35 40 30 Q40.5 35 41 45 Z" fill="#FFEB3B"/>
  <!-- Wick base -->
  <rect x="38" y="44" width="4" height="4" fill="#333" rx="1"/>
  <!-- Bottom cap -->
  <rect x="26" y="58" width="28" height="6" fill="#616161" rx="2"/>
  <!-- Feet -->
  <rect x="28" y="64" width="4" height="6" fill="#555" rx="1"/>
  <rect x="48" y="64" width="4" height="6" fill="#555" rx="1"/>
  <!-- Light rays -->
  <line x1="56" y1="30" x2="65" y2="26" stroke="#FFEB3B" stroke-width="1" opacity="0.5"/>
  <line x1="56" y1="39" x2="66" y2="39" stroke="#FFEB3B" stroke-width="1" opacity="0.5"/>
  <line x1="56" y1="48" x2="65" y2="52" stroke="#FFEB3B" stroke-width="1" opacity="0.5"/>
  <line x1="24" y1="30" x2="15" y2="26" stroke="#FFEB3B" stroke-width="1" opacity="0.5"/>
  <line x1="24" y1="39" x2="14" y2="39" stroke="#FFEB3B" stroke-width="1" opacity="0.5"/>
  <line x1="24" y1="48" x2="15" y2="52" stroke="#FFEB3B" stroke-width="1" opacity="0.5"/>
</svg>