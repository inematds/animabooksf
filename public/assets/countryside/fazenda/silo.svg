<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Main cylinder -->
  <rect x="20" y="18" width="40" height="55" fill="#90A4AE"/>
  <!-- Top dome -->
  <ellipse cx="40" cy="18" rx="20" ry="8" fill="#78909C"/>
  <!-- Roof cone -->
  <polygon points="40,2 18,18 62,18" fill="#607D8B"/>
  <!-- Roof cap -->
  <rect x="37" y="0" width="6" height="4" fill="#455A64" rx="2"/>
  <!-- Bottom base -->
  <ellipse cx="40" cy="73" rx="22" ry="5" fill="#78909C"/>
  <!-- Metal bands -->
  <rect x="18" y="28" width="44" height="3" fill="#78909C" rx="1"/>
  <rect x="18" y="42" width="44" height="3" fill="#78909C" rx="1"/>
  <rect x="18" y="56" width="44" height="3" fill="#78909C" rx="1"/>
  <!-- Highlight -->
  <rect x="22" y="18" width="10" height="55" fill="#B0BEC5" opacity="0.3" rx="2"/>
  <!-- Shadow side -->
  <rect x="48" y="18" width="10" height="55" fill="#607D8B" opacity="0.2" rx="2"/>
  <!-- Door -->
  <rect x="34" y="58" width="12" height="15" fill="#607D8B" rx="2"/>
  <circle cx="44" cy="66" r="1.5" fill="#455A64"/>
  <!-- Vent -->
  <rect x="36" y="32" width="8" height="6" fill="#607D8B" rx="1"/>
  <line x1="38" y1="32" x2="38" y2="38" stroke="#78909C" stroke-width="1"/>
  <line x1="42" y1="32" x2="42" y2="38" stroke="#78909C" stroke-width="1"/>
  <!-- Ladder -->
  <rect x="55" y="20" width="2" height="50" fill="#616161"/>
  <rect x="61" y="20" width="2" height="50" fill="#616161"/>
  <rect x="55" y="28" width="8" height="2" fill="#757575" rx="1"/>
  <rect x="55" y="38" width="8" height="2" fill="#757575" rx="1"/>
  <rect x="55" y="48" width="8" height="2" fill="#757575" rx="1"/>
  <rect x="55" y="58" width="8" height="2" fill="#757575" rx="1"/>
</svg>