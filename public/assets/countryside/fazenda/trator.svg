<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Body -->
  <rect x="20" y="25" width="40" height="25" fill="#4CAF50" rx="4"/>
  <!-- Hood -->
  <rect x="55" y="30" width="18" height="16" fill="#388E3C" rx="3"/>
  <!-- Cab -->
  <rect x="22" y="14" width="25" height="16" fill="#81D4FA" rx="3"/>
  <rect x="24" y="16" width="21" height="12" fill="#B3E5FC" rx="2"/>
  <!-- Roof -->
  <rect x="20" y="10" width="28" height="5" fill="#333" rx="2"/>
  <!-- Exhaust pipe -->
  <rect x="68" y="20" width="4" height="14" fill="#555" rx="1"/>
  <ellipse cx="70" cy="20" rx="3" ry="2" fill="#444"/>
  <!-- Smoke -->
  <circle cx="70" cy="14" r="3" fill="#BDBDBD" opacity="0.5"/>
  <circle cx="68" cy="10" r="2" fill="#BDBDBD" opacity="0.3"/>
  <!-- Front grille -->
  <rect x="70" y="34" width="4" height="10" fill="#FFD700" rx="1"/>
  <!-- Headlight -->
  <circle cx="74" cy="36" r="3" fill="#FFEB3B"/>
  <circle cx="74" cy="36" r="2" fill="#FFF9C4"/>
  <!-- Big back wheel -->
  <circle cx="30" cy="58" r="16" fill="#333"/>
  <circle cx="30" cy="58" r="13" fill="#555"/>
  <circle cx="30" cy="58" r="5" fill="#FFD700"/>
  <circle cx="30" cy="58" r="3" fill="#333"/>
  <!-- Wheel spokes -->
  <line x1="30" y1="45" x2="30" y2="71" stroke="#444" stroke-width="2"/>
  <line x1="17" y1="58" x2="43" y2="58" stroke="#444" stroke-width="2"/>
  <!-- Back wheel tread -->
  <circle cx="30" cy="58" r="16" fill="none" stroke="#222" stroke-width="2"/>
  <!-- Small front wheel -->
  <circle cx="65" cy="58" r="10" fill="#333"/>
  <circle cx="65" cy="58" r="8" fill="#555"/>
  <circle cx="65" cy="58" r="3" fill="#FFD700"/>
  <circle cx="65" cy="58" r="1.5" fill="#333"/>
  <!-- Front wheel tread -->
  <circle cx="65" cy="58" r="10" fill="none" stroke="#222" stroke-width="1.5"/>
  <!-- Fender -->
  <path d="M14 48 Q14 42 30 42 Q46 42 46 48" fill="#388E3C"/>
  <!-- Steering wheel hint -->
  <circle cx="42" cy="22" r="4" fill="none" stroke="#333" stroke-width="1.5"/>
</svg>