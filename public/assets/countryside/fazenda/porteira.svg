<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Left post -->
  <rect x="4" y="8" width="10" height="65" fill="#6D4C41" rx="2"/>
  <polygon points="4,8 9,2 14,8" fill="#6D4C41"/>
  <!-- Right post -->
  <rect x="66" y="8" width="10" height="65" fill="#6D4C41" rx="2"/>
  <polygon points="66,8 71,2 76,8" fill="#6D4C41"/>
  <!-- Post caps -->
  <ellipse cx="9" cy="3" rx="6" ry="3" fill="#5D4037"/>
  <ellipse cx="71" cy="3" rx="6" ry="3" fill="#5D4037"/>
  <!-- Gate rails -->
  <rect x="14" y="18" width="52" height="5" fill="#A1887F" rx="2"/>
  <rect x="14" y="35" width="52" height="5" fill="#A1887F" rx="2"/>
  <rect x="14" y="52" width="52" height="5" fill="#A1887F" rx="2"/>
  <!-- Gate vertical bars -->
  <rect x="20" y="18" width="4" height="39" fill="#8D6E63" rx="1"/>
  <rect x="38" y="18" width="4" height="39" fill="#8D6E63" rx="1"/>
  <rect x="56" y="18" width="4" height="39" fill="#8D6E63" rx="1"/>
  <!-- Diagonal brace -->
  <line x1="14" y1="57" x2="66" y2="18" stroke="#795548" stroke-width="3"/>
  <!-- Hinges -->
  <rect x="12" y="20" width="6" height="4" fill="#616161" rx="1"/>
  <circle cx="13" cy="22" r="2" fill="#555"/>
  <rect x="12" y="50" width="6" height="4" fill="#616161" rx="1"/>
  <circle cx="13" cy="52" r="2" fill="#555"/>
  <!-- Latch -->
  <rect x="62" y="34" width="6" height="8" fill="#616161" rx="1"/>
  <circle cx="65" cy="38" r="2" fill="#FFD700"/>
  <!-- Chain -->
  <path d="M65 42 Q67 46 65 50 Q63 54 65 56" stroke="#9E9E9E" stroke-width="1.5" fill="none"/>
  <!-- Ground -->
  <rect x="0" y="72" width="80" height="8" fill="#8D6E63" opacity="0.3" rx="2"/>
</svg>