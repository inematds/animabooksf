<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Main barn body -->
  <rect x="8" y="30" width="64" height="42" fill="#D32F2F"/>
  <!-- Roof -->
  <polygon points="4,30 40,6 76,30" fill="#B71C1C"/>
  <!-- Roof ridge -->
  <line x1="40" y1="6" x2="40" y2="12" stroke="#8D6E63" stroke-width="3"/>
  <!-- Doors -->
  <rect x="25" y="45" width="30" height="27" fill="#5D4037" rx="2"/>
  <rect x="25" y="45" width="15" height="27" fill="#4E342E" rx="1"/>
  <!-- Door handles -->
  <circle cx="38" cy="58" r="2" fill="#FFD700"/>
  <circle cx="42" cy="58" r="2" fill="#FFD700"/>
  <!-- Door arch -->
  <path d="M25 45 Q40 32 55 45" fill="#4E342E"/>
  <!-- Windows -->
  <rect x="12" y="40" width="10" height="10" fill="#FFF9C4" rx="1"/>
  <line x1="17" y1="40" x2="17" y2="50" stroke="#B71C1C" stroke-width="1.5"/>
  <line x1="12" y1="45" x2="22" y2="45" stroke="#B71C1C" stroke-width="1.5"/>
  <rect x="58" y="40" width="10" height="10" fill="#FFF9C4" rx="1"/>
  <line x1="63" y1="40" x2="63" y2="50" stroke="#B71C1C" stroke-width="1.5"/>
  <line x1="58" y1="45" x2="68" y2="45" stroke="#B71C1C" stroke-width="1.5"/>
  <!-- Hay loft window -->
  <rect x="34" y="15" width="12" height="10" fill="#FFF9C4" rx="1"/>
  <line x1="40" y1="15" x2="40" y2="25" stroke="#B71C1C" stroke-width="1.5"/>
  <!-- X decoration -->
  <line x1="10" y1="55" x2="22" y2="70" stroke="#C62828" stroke-width="2"/>
  <line x1="22" y1="55" x2="10" y2="70" stroke="#C62828" stroke-width="2"/>
  <line x1="58" y1="55" x2="70" y2="70" stroke="#C62828" stroke-width="2"/>
  <line x1="70" y1="55" x2="58" y2="70" stroke="#C62828" stroke-width="2"/>
  <!-- Weather vane -->
  <line x1="40" y1="6" x2="40" y2="0" stroke="#555" stroke-width="1.5"/>
  <polygon points="36,1 40,0 44,1 40,3" fill="#555"/>
</svg>