<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Handle/shaft -->
  <rect x="0" y="35" width="25" height="4" fill="#8D6E63" rx="1"/>
  <rect x="0" y="43" width="25" height="4" fill="#8D6E63" rx="1"/>
  <!-- Wagon bed -->
  <rect x="20" y="28" width="45" height="24" fill="#A1887F" rx="2"/>
  <!-- Wagon inner -->
  <rect x="22" y="24" width="41" height="6" fill="#8D6E63" rx="1"/>
  <!-- Side boards -->
  <rect x="20" y="22" width="3" height="30" fill="#795548" rx="1"/>
  <rect x="62" y="22" width="3" height="30" fill="#795548" rx="1"/>
  <!-- Back board -->
  <rect x="62" y="22" width="4" height="32" fill="#6D4C41" rx="1"/>
  <!-- Front board -->
  <rect x="20" y="22" width="4" height="32" fill="#6D4C41" rx="1"/>
  <!-- Plank lines -->
  <line x1="24" y1="36" x2="62" y2="36" stroke="#795548" stroke-width="1"/>
  <line x1="24" y1="44" x2="62" y2="44" stroke="#795548" stroke-width="1"/>
  <!-- Hay in wagon -->
  <ellipse cx="35" cy="24" rx="8" ry="4" fill="#FFD54F"/>
  <ellipse cx="48" cy="23" rx="7" ry="4" fill="#FBC02D"/>
  <ellipse cx="42" cy="20" rx="6" ry="3" fill="#FFE082"/>
  <!-- Left wheel -->
  <circle cx="28" cy="58" r="12" fill="#6D4C41"/>
  <circle cx="28" cy="58" r="10" fill="#8D6E63"/>
  <circle cx="28" cy="58" r="3" fill="#555"/>
  <!-- Spokes -->
  <line x1="28" y1="48" x2="28" y2="68" stroke="#6D4C41" stroke-width="2"/>
  <line x1="18" y1="58" x2="38" y2="58" stroke="#6D4C41" stroke-width="2"/>
  <line x1="21" y1="51" x2="35" y2="65" stroke="#6D4C41" stroke-width="1.5"/>
  <line x1="35" y1="51" x2="21" y2="65" stroke="#6D4C41" stroke-width="1.5"/>
  <!-- Right wheel -->
  <circle cx="58" cy="58" r="12" fill="#6D4C41"/>
  <circle cx="58" cy="58" r="10" fill="#8D6E63"/>
  <circle cx="58" cy="58" r="3" fill="#555"/>
  <!-- Spokes -->
  <line x1="58" y1="48" x2="58" y2="68" stroke="#6D4C41" stroke-width="2"/>
  <line x1="48" y1="58" x2="68" y2="58" stroke="#6D4C41" stroke-width="2"/>
  <line x1="51" y1="51" x2="65" y2="65" stroke="#6D4C41" stroke-width="1.5"/>
  <line x1="65" y1="51" x2="51" y2="65" stroke="#6D4C41" stroke-width="1.5"/>
  <!-- Axle -->
  <rect x="24" y="52" width="40" height="3" fill="#555" rx="1"/>
</svg>