  <circle cx="40" cy="43" r="1.5" fill="#5D4037"/>
  <circle cx="72" cy="43" r="1.5" fill="#5D4037"/>
  <circle cx="8" cy="59" r="1.5" fill="#5D4037"/>
  <circle cx="40" cy="59" r="1.5" fill="#5D4037"/>
  <circle cx="72" cy="59" r="1.5" fill="#5D4037"/>
  <!-- Wood grain -->
  <line x1="7" y1="18" x2="7" y2="68" stroke="#795548" stroke-width="0.8" opacity="0.5"/>
  <line x1="39" y1="18" x2="39" y2="68" stroke="#795548" stroke-width="0.8" opacity="0.5"/>
  <line x1="71" y1="18" x2="71" y2="68" stroke="#795548" stroke-width="0.8" opacity="0.5"/>
