<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">
  <!-- Stem -->
  <rect x="30" y="42" width="20" height="28" fill="#F5F5F5" rx="6"/>
  <!-- Stem shadow -->
  <rect x="30" y="42" width="8" height="28" fill="#E0E0E0" rx="4"/>
  <!-- Cap -->
  <ellipse cx="40" cy="38" rx="28" ry="20" fill="#E53935"/>
  <!-- Cap underside -->
  <ellipse cx="40" cy="42" rx="24" ry="4" fill="#FFCDD2"/>
  <!-- White dots -->
  <circle cx="25" cy="30" r="4" fill="white"/>
  <circle cx="40" cy="22" r="4.5" fill="white"/>
  <circle cx="55" cy="30" r="4" fill="white"/>
  <circle cx="32" cy="38" r="3" fill="white"/>
  <circle cx="48" cy="36" r="3.5" fill="white"/>
  <circle cx="22" cy="38" r="2.5" fill="white"/>
  <circle cx="58" cy="38" r="2.5" fill="white"/>
  <!-- Cap highlight -->
  <ellipse cx="35" cy="26" rx="8" ry="5" fill="#EF5350" opacity="0.6"/>
  <!-- Ground grass -->
  <line x1="20" y1="70" x2="22" y2="62" stroke="#4CAF50" stroke-width="2"/>
  <line x1="58" y1="70" x2="56" y2="63" stroke="#4CAF50" stroke-width="2"/>
  <line x1="25" y1="70" x2="28" y2="64" stroke="#66BB6A" stroke-width="1.5"/>
  <line x1="55" y1="70" x2="52" y2="65" stroke="#66BB6A" stroke-width="1.5"/>
</svg>