<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 60">
  <!-- Canoe body -->
  <path d="M5 35 Q15 20 40 18 Q65 20 75 35 Q65 45 40 47 Q15 45 5 35 Z" fill="#8D6E63"/>
