<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 60">
  <!-- Rock left -->
  <rect x="0" y="0" width="28" height="60" fill="#78909C" rx="3"/>
  <rect x="0" y="0" width="28" height="8" fill="#4CAF50" rx="2"/>
  <!-- Rock right -->
  <rect x="52" y="0" width="28" height="60" fill="#78909C" rx="3"/>
  <rect x="52" y="0" width="28" height="8" fill="#4CAF50" rx="2"/>
  <!-- Water falling -->
  <rect x="28" y="0" width="24" height="45" fill="#4FC3F7" opacity="0.7"/>
  <!-- White streaks -->
  <rect x="32" y="0" width="4" height="45" fill="white" opacity="0.4" rx="2"/>
  <rect x="40" y="0" width="3" height="45" fill="white" opacity="0.5" rx="1"/>
  <rect x="46" y="0" width="3" height="45" fill="white" opacity="0.3" rx="1"/>
  <!-- Splash -->
  <ellipse cx="40" cy="48" rx="18" ry="8" fill="#B3E5FC" opacity="0.6"/>
  <ellipse cx="40" cy="46" rx="10" ry="4" fill="white" opacity="0.4"/>
  <!-- Pool -->
  <ellipse cx="40" cy="53" rx="30" ry="7" fill="#29B6F6" opacity="0.5"/>
  <!-- Splash drops -->
  <circle cx="30" cy="40" r="2" fill="white" opacity="0.4"/>
  <circle cx="50" cy="42" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="35" cy="38" r="1" fill="white" opacity="0.3"/>
  <!-- Rock texture -->
  <ellipse cx="10" cy="30" rx="6" ry="3" fill="#6D7D8A" opacity="0.5"/>
  <ellipse cx="65" cy="35" rx="5" ry="3" fill="#6D7D8A" opacity="0.5"/>
</svg>