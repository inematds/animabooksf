<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 60">
  <!-- Support posts -->
  <rect x="8" y="10" width="6" height="45" fill="#6D4C41" rx="2"/>
  <rect x="66" y="10" width="6" height="45" fill="#6D4C41" rx="2"/>
  <!-- Railings -->
  <rect x="8" y="12" width="64" height="4" fill="#8D6E63" rx="2"/>
  <!-- Railing posts -->
  <rect x="22" y="12" width="4" height="20" fill="#795548" rx="1"/>
  <rect x="38" y="12" width="4" height="20" fill="#795548" rx="1"/>
  <rect x="54" y="12" width="4" height="20" fill="#795548" rx="1"/>
  <!-- Middle rail -->
  <rect x="8" y="22" width="64" height="3" fill="#A1887F" rx="1"/>
  <!-- Bridge planks -->
  <rect x="6" y="32" width="68" height="5" fill="#8D6E63" rx="1"/>
  <rect x="6" y="38" width="68" height="5" fill="#795548" rx="1"/>
  <rect x="6" y="44" width="68" height="5" fill="#8D6E63" rx="1"/>
  <!-- Plank gaps -->
  <line x1="6" y1="37" x2="74" y2="37" stroke="#5D4037" stroke-width="1"/>
  <line x1="6" y1="43" x2="74" y2="43" stroke="#5D4037" stroke-width="1"/>
  <!-- Nail details -->
  <circle cx="12" cy="35" r="1" fill="#555"/>
  <circle cx="68" cy="35" r="1" fill="#555"/>
  <circle cx="12" cy="41" r="1" fill="#555"/>
  <circle cx="68" cy="41" r="1" fill="#555"/>
  <circle cx="12" cy="47" r="1" fill="#555"/>
  <circle cx="68" cy="47" r="1" fill="#555"/>
  <!-- Water underneath -->
  <rect x="15" y="52" width="20" height="2" fill="#4FC3F7" opacity="0.4" rx="1"/>
  <rect x="45" y="54" width="15" height="2" fill="#4FC3F7" opacity="0.4" rx="1"/>
</svg>