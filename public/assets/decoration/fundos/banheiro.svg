  <rect x="870" y="220" width="12" height="50" rx="3" fill="#C0C0C0"/>
  <rect x="855" y="215" width="42" height="12" rx="4" fill="#C0C0C0"/>
  <circle cx="876" cy="215" r="6" fill="#D4D4D4"/>
  <!-- Mirror -->
  <rect x="100" y="60" width="160" height="200" rx="80" fill="#E8F8FF" stroke="#FFFFFF" stroke-width="5"/>
  <rect x="100" y="60" width="160" height="200" rx="80" fill="none" stroke="#D0D0D0" stroke-width="2"/>
  <!-- Mirror shine -->
  <ellipse cx="145" cy="110" rx="15" ry="25" fill="#FFFFFF" opacity="0.5" transform="rotate(-15,145,110)"/>
  <!-- Baseboard -->
  <rect y="373" width="960" height="7" fill="#C8DCE8"/>
