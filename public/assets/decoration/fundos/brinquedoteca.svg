<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <!-- Main wall - light purple -->
  <rect width="960" height="540" fill="#F3E5F5"/>
  <!-- Colorful wall stripes at top -->
  <rect x="0" y="0" width="960" height="15" fill="#FF8A80"/>
  <rect x="0" y="15" width="960" height="15" fill="#FFD180"/>
  <rect x="0" y="30" width="960" height="15" fill="#FFF59D"/>
  <rect x="0" y="45" width="960" height="15" fill="#A5D6A7"/>
  <rect x="0" y="60" width="960" height="15" fill="#90CAF9"/>
  <rect x="0" y="75" width="960" height="15" fill="#CE93D8"/>
  <!-- Left wall section - soft green -->
  <rect x="0" y="90" width="240" height="300" fill="#E8F5E9"/>
  <!-- Center wall section - soft yellow -->
  <rect x="240" y="90" width="480" height="300" fill="#FFFDE7"/>
  <!-- Right wall section - soft blue -->
  <rect x="720" y="90" width="240" height="300" fill="#E3F2FD"/>
  <!-- Wall section borders -->
  <line x1="240" y1="90" x2="240" y2="390" stroke="#E0E0E0" stroke-width="2"/>
  <line x1="720" y1="90" x2="720" y2="390" stroke="#E0E0E0" stroke-width="2"/>
  <!-- Floor - soft colorful mat pattern -->
  <rect y="390" width="960" height="150" fill="#FFCC80"/>
  <!-- Floor foam tiles pattern -->
  <rect x="0" y="390" width="120" height="75" fill="#EF9A9A" stroke="#E88888" stroke-width="1" rx="2"/>
  <rect x="120" y="390" width="120" height="75" fill="#90CAF9" stroke="#80B8E8" stroke-width="1" rx="2"/>
  <rect x="240" y="390" width="120" height="75" fill="#A5D6A7" stroke="#94C496" stroke-width="1" rx="2"/>
  <rect x="360" y="390" width="120" height="75" fill="#FFF59D" stroke="#EEE48C" stroke-width="1" rx="2"/>
  <rect x="480" y="390" width="120" height="75" fill="#CE93D8" stroke="#BD82C7" stroke-width="1" rx="2"/>
  <rect x="600" y="390" width="120" height="75" fill="#EF9A9A" stroke="#E88888" stroke-width="1" rx="2"/>
  <rect x="720" y="390" width="120" height="75" fill="#90CAF9" stroke="#80B8E8" stroke-width="1" rx="2"/>
  <rect x="840" y="390" width="120" height="75" fill="#A5D6A7" stroke="#94C496" stroke-width="1" rx="2"/>
  <rect x="0" y="465" width="120" height="75" fill="#FFF59D" stroke="#EEE48C" stroke-width="1" rx="2"/>
  <rect x="120" y="465" width="120" height="75" fill="#CE93D8" stroke="#BD82C7" stroke-width="1" rx="2"/>
  <rect x="240" y="465" width="120" height="75" fill="#EF9A9A" stroke="#E88888" stroke-width="1" rx="2"/>
  <rect x="360" y="465" width="120" height="75" fill="#90CAF9" stroke="#80B8E8" stroke-width="1" rx="2"/>
  <rect x="480" y="465" width="120" height="75" fill="#A5D6A7" stroke="#94C496" stroke-width="1" rx="2"/>
  <rect x="600" y="465" width="120" height="75" fill="#FFF59D" stroke="#EEE48C" stroke-width="1" rx="2"/>
  <rect x="720" y="465" width="120" height="75" fill="#CE93D8" stroke="#BD82C7" stroke-width="1" rx="2"/>
  <rect x="840" y="465" width="120" height="75" fill="#EF9A9A" stroke="#E88888" stroke-width="1" rx="2"/>
  <!-- Window -->
  <rect x="400" y="110" width="160" height="140" rx="4" fill="#87CEEB"/>
  <rect x="395" y="105" width="170" height="150" rx="4" fill="none" stroke="#FFFFFF" stroke-width="6"/>
  <rect x="395" y="105" width="170" height="150" rx="4" fill="none" stroke="#FFB74D" stroke-width="3"/>
  <line x1="480" y1="105" x2="480" y2="255" stroke="#FFB74D" stroke-width="3"/>
  <line x1="395" y1="180" x2="565" y2="180" stroke="#FFB74D" stroke-width="3"/>
  <!-- Sun through window -->
  <circle cx="440" cy="140" r="18" fill="#FFF9C4" opacity="0.8"/>
  <!-- Wall decorations - painted stars -->
  <polygon points="100,150 108,170 130,170 112,182 120,202 100,190 80,202 88,182 70,170 92,170" fill="#FFF59D" opacity="0.5"/>
  <polygon points="820,140 826,155 842,155 830,163 835,178 820,170 805,178 810,163 798,155 814,155" fill="#FF8A80" opacity="0.5"/>
  <!-- Painted circle decorations on wall -->
  <circle cx="800" cy="250" r="25" fill="#CE93D8" opacity="0.3"/>
  <circle cx="140" cy="280" r="20" fill="#90CAF9" opacity="0.3"/>
  <circle cx="60" cy="200" r="15" fill="#A5D6A7" opacity="0.3"/>
</svg>