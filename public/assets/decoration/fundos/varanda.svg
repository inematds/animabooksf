<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <!-- Sky gradient background -->
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="60%" stop-color="#B5E4F7"/>
      <stop offset="100%" stop-color="#E0F2F9"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="780" cy="80" r="50" fill="#FFE082" opacity="0.9"/>
  <circle cx="780" cy="80" r="40" fill="#FFF9C4"/>
  <!-- Clouds -->
  <ellipse cx="200" cy="80" rx="60" ry="25" fill="#FFFFFF" opacity="0.8"/>
  <ellipse cx="240" cy="70" rx="45" ry="20" fill="#FFFFFF" opacity="0.8"/>
  <ellipse cx="170" cy="75" rx="35" ry="18" fill="#FFFFFF" opacity="0.8"/>
  <ellipse cx="600" cy="120" rx="50" ry="20" fill="#FFFFFF" opacity="0.6"/>
  <ellipse cx="635" cy="112" rx="35" ry="16" fill="#FFFFFF" opacity="0.6"/>
  <!-- Distant hills -->
  <ellipse cx="200" cy="340" rx="250" ry="80" fill="#A5D6A7" opacity="0.5"/>
  <ellipse cx="600" cy="350" rx="300" ry="70" fill="#81C784" opacity="0.4"/>
  <ellipse cx="900" cy="330" rx="200" ry="90" fill="#A5D6A7" opacity="0.5"/>
  <!-- Balcony floor -->
  <rect y="360" width="960" height="180" fill="#E0C8A8"/>
  <!-- Floor tiles -->
  <rect x="0" y="360" width="160" height="90" fill="#D9BF9C" stroke="#D0B490" stroke-width="1"/>
  <rect x="160" y="360" width="160" height="90" fill="#E0C8A8" stroke="#D0B490" stroke-width="1"/>
  <rect x="320" y="360" width="160" height="90" fill="#D9BF9C" stroke="#D0B490" stroke-width="1"/>
  <rect x="480" y="360" width="160" height="90" fill="#E0C8A8" stroke="#D0B490" stroke-width="1"/>
  <rect x="640" y="360" width="160" height="90" fill="#D9BF9C" stroke="#D0B490" stroke-width="1"/>
  <rect x="800" y="360" width="160" height="90" fill="#E0C8A8" stroke="#D0B490" stroke-width="1"/>
  <rect x="0" y="450" width="160" height="90" fill="#E0C8A8" stroke="#D0B490" stroke-width="1"/>
  <rect x="160" y="450" width="160" height="90" fill="#D9BF9C" stroke="#D0B490" stroke-width="1"/>
  <rect x="320" y="450" width="160" height="90" fill="#E0C8A8" stroke="#D0B490" stroke-width="1"/>
  <rect x="480" y="450" width="160" height="90" fill="#D9BF9C" stroke="#D0B490" stroke-width="1"/>
  <rect x="640" y="450" width="160" height="90" fill="#E0C8A8" stroke="#D0B490" stroke-width="1"/>
  <rect x="800" y="450" width="160" height="90" fill="#D9BF9C" stroke="#D0B490" stroke-width="1"/>
  <!-- Railing -->
  <rect x="0" y="330" width="960" height="8" rx="4" fill="#8D6E63"/>
  <rect x="0" y="355" width="960" height="8" rx="4" fill="#8D6E63"/>
  <!-- Railing vertical bars -->
  <rect x="40" y="330" width="6" height="33" rx="2" fill="#A1887F"/>
  <rect x="110" y="330" width="6" height="33" rx="2" fill="#A1887F"/>
  <rect x="180" y="330" width="6" height="33" rx="2" fill="#A1887F"/>
  <rect x="250" y="330" width="6" height="33" rx="2" fill="#A1887F"/>
  <rect x="320" y="330" width="6" height="33" rx="2" fill="#A1887F"/>
  <rect x="390" y="330" width="6" height="33" rx="2" fill="#A1887F"/>
  <rect x="460" y="330" width="6" height="33" rx="2" fill="#A1887F"/>
  <rect x="530" y="330" width="6" height="33" rx="2" fill="#A1887F"/>
  <rect x="600" y="330" width="6" height="33" rx="2" fill="#A1887F"/>
  <rect x="670" y="330" width="6" height="33" rx="2" fill="#A1887F"/>
  <rect x="740" y="330" width="6" height="33" rx="2" fill="#A1887F"/>
  <rect x="810" y="330" width="6" height="33" rx="2" fill="#A1887F"/>
  <rect x="880" y="330" width="6" height="33" rx="2" fill="#A1887F"/>
  <!-- Railing posts -->
  <rect x="0" y="320" width="12" height="48" rx="3" fill="#795548"/>
  <rect x="474" y="320" width="12" height="48" rx="3" fill="#795548"/>
  <rect x="948" y="320" width="12" height="48" rx="3" fill="#795548"/>
  <!-- Ceiling overhang -->
  <rect x="0" y="0" width="960" height="20" fill="#D7CCC8"/>
  <rect x="0" y="18" width="960" height="6" fill="#BCAAA4"/>
</svg>