  <rect x="710" y="420" width="50" height="120" fill="#757575"/>
  <!-- Plaza area -->
  <rect x="400" y="430" width="160" height="100" fill="#A5D6A7" rx="8"/>
  <circle cx="480" cy="480" r="20" fill="#66BB6A"/>
  <rect x="477" y="450" width="6" height="30" fill="#795548"/>
