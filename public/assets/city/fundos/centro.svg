<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <!-- Sky -->
  <rect width="960" height="540" fill="#90CAF9"/>
  <!-- Clouds -->
  <ellipse cx="300" cy="50" rx="55" ry="20" fill="#fff" opacity="0.8"/>
  <ellipse cx="340" cy="42" rx="45" ry="18" fill="#fff" opacity="0.8"/>
  <ellipse cx="750" cy="65" rx="50" ry="18" fill="#fff" opacity="0.75"/>
  <!-- Background buildings silhouettes -->
  <rect x="20" y="120" width="80" height="200" fill="#78909C" rx="3"/>
  <rect x="110" y="90" width="60" height="230" fill="#90A4AE" rx="3"/>
  <rect x="180" y="140" width="70" height="180" fill="#78909C" rx="3"/>
  <rect x="260" y="70" width="55" height="250" fill="#B0BEC5" rx="3"/>
  <rect x="330" y="110" width="90" height="210" fill="#90A4AE" rx="3"/>
  <rect x="430" y="60" width="65" height="260" fill="#78909C" rx="3"/>
  <rect x="510" y="130" width="75" height="190" fill="#B0BEC5" rx="3"/>
  <rect x="600" y="80" width="60" height="240" fill="#90A4AE" rx="3"/>
  <rect x="670" y="100" width="85" height="220" fill="#78909C" rx="3"/>
