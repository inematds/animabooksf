  <rect x="225" y="290" width="10" height="28" fill="#424242" rx="2"/>
  <circle cx="230" cy="297" r="4" fill="#EF5350"/>
  <circle cx="230" cy="308" r="4" fill="#66BB6A"/>
  <rect x="745" y="290" width="10" height="28" fill="#424242" rx="2"/>
  <circle cx="750" cy="297" r="4" fill="#66BB6A"/>
  <circle cx="750" cy="308" r="4" fill="#EF5350"/>
  <!-- Street lamps -->
  <rect x="100" y="285" width="4" height="35" fill="#757575"/>
  <ellipse cx="102" cy="283" rx="10" ry="4" fill="#FFE082"/>
  <rect x="550" y="285" width="4" height="35" fill="#757575"/>
  <ellipse cx="552" cy="283" rx="10" ry="4" fill="#FFE082"/>
  <rect x="880" y="285" width="4" height="35" fill="#757575"/>
  <ellipse cx="882" cy="283" rx="10" ry="4" fill="#FFE082"/>
