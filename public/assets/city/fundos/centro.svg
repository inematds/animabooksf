  <line x1="0" y1="370" x2="960" y2="370" stroke="#FFF" stroke-width="3" stroke-dasharray="22 16"/>
  <line x1="0" y1="340" x2="960" y2="340" stroke="#FFD54F" stroke-width="2"/>
  <line x1="0" y1="400" x2="960" y2="400" stroke="#FFD54F" stroke-width="2"/>
  <!-- Crosswalks -->
  <g fill="#FFF">
    <rect x="230" y="332" width="8" height="76"/><rect x="244" y="332" width="8" height="76"/>
    <rect x="258" y="332" width="8" height="76"/><rect x="272" y="332" width="8" height="76"/>
    <rect x="700" y="332" width="8" height="76"/><rect x="714" y="332" width="8" height="76"/>
    <rect x="728" y="332" width="8" height="76"/><rect x="742" y="332" width="8" height="76"/>
  </g>
