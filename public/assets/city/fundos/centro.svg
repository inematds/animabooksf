    <rect x="35" y="170" width="10" height="12" rx="1"/><rect x="55" y="170" width="10" height="12" rx="1"/><rect x="75" y="170" width="10" height="12" rx="1"/>
    <rect x="35" y="200" width="10" height="12" rx="1"/><rect x="55" y="200" width="10" height="12" rx="1"/>
    <rect x="120" y="110" width="8" height="10" rx="1"/><rect x="140" y="110" width="8" height="10" rx="1"/>
    <rect x="120" y="140" width="8" height="10" rx="1"/><rect x="140" y="140" width="8" height="10" rx="1"/>
    <rect x="120" y="170" width="8" height="10" rx="1"/><rect x="140" y="170" width="8" height="10" rx="1"/>
    <rect x="275" y="95" width="8" height="10" rx="1"/><rect x="295" y="95" width="8" height="10" rx="1"/>
    <rect x="275" y="125" width="8" height="10" rx="1"/><rect x="295" y="125" width="8" height="10" rx="1"/>
    <rect x="445" y="85" width="8" height="10" rx="1"/><rect x="465" y="85" width="8" height="10" rx="1"/>
    <rect x="445" y="115" width="8" height="10" rx="1"/><rect x="465" y="115" width="8" height="10" rx="1"/>
    <rect x="610" y="105" width="8" height="10" rx="1"/><rect x="630" y="105" width="8" height="10" rx="1"/>
    <rect x="610" y="135" width="8" height="10" rx="1"/><rect x="630" y="135" width="8" height="10" rx="1"/>
    <rect x="860" y="115" width="10" height="12" rx="1"/><rect x="880" y="115" width="10" height="12" rx="1"/><rect x="900" y="115" width="10" height="12" rx="1"/>
    <rect x="860" y="145" width="10" height="12" rx="1"/><rect x="880" y="145" width="10" height="12" rx="1"/>
