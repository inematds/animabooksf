    <rect x="80" y="420" width="8" height="20"/><rect x="110" y="420" width="8" height="20"/>
    <rect x="140" y="420" width="8" height="20"/><rect x="170" y="420" width="8" height="20"/>
    <rect x="200" y="420" width="8" height="20"/><rect x="230" y="420" width="8" height="20"/>
    <rect x="260" y="420" width="8" height="20"/><rect x="290" y="420" width="8" height="20"/>
    <rect x="320" y="420" width="8" height="20"/><rect x="350" y="420" width="8" height="20"/>
    <rect x="380" y="420" width="8" height="20"/><rect x="410" y="420" width="8" height="20"/>
    <rect x="440" y="420" width="8" height="20"/><rect x="470" y="420" width="8" height="20"/>
    <rect x="500" y="420" width="8" height="20"/><rect x="530" y="420" width="8" height="20"/>
    <rect x="560" y="420" width="8" height="20"/><rect x="590" y="420" width="8" height="20"/>
    <rect x="620" y="420" width="8" height="20"/><rect x="650" y="420" width="8" height="20"/>
    <rect x="680" y="420" width="8" height="20"/><rect x="710" y="420" width="8" height="20"/>
    <rect x="740" y="420" width="8" height="20"/><rect x="770" y="420" width="8" height="20"/>
    <rect x="800" y="420" width="8" height="20"/><rect x="830" y="420" width="8" height="20"/>
    <rect x="860" y="420" width="8" height="20"/><rect x="890" y="420" width="8" height="20"/>
    <rect x="920" y="420" width="8" height="20"/><rect x="950" y="420" width="8" height="20"/>
