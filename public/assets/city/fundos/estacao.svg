  <line x1="0" y1="423" x2="960" y2="423" stroke="#9E9E9E" stroke-width="3"/>
  <line x1="0" y1="437" x2="960" y2="437" stroke="#9E9E9E" stroke-width="3"/>
  <g fill="#6D4C41">
