  <circle cx="480" cy="362" r="10" fill="#FAFAFA" stroke="#757575" stroke-width="2"/>
  <line x1="480" y1="362" x2="480" y2="356" stroke="#424242" stroke-width="2"/>
  <line x1="480" y1="362" x2="485" y2="362" stroke="#424242" stroke-width="1.5"/>
