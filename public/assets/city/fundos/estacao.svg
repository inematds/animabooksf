<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <!-- Sky -->
  <rect width="960" height="540" fill="#90CAF9"/>
  <!-- Clouds -->
  <ellipse cx="200" cy="50" rx="55" ry="20" fill="#fff" opacity="0.85"/>
  <ellipse cx="240" cy="42" rx="45" ry="18" fill="#fff" opacity="0.85"/>
  <ellipse cx="700" cy="65" rx="50" ry="18" fill="#fff" opacity="0.8"/>
  <!-- Sun -->
  <circle cx="850" cy="75" r="45" fill="#FFD54F"/>
  <!-- Distant buildings -->
  <rect x="30" y="160" width="50" height="120" fill="#B0BEC5" rx="2"/>
  <rect x="90" y="140" width="40" height="140" fill="#90A4AE" rx="2"/>
  <rect x="140" y="170" width="45" height="110" fill="#B0BEC5" rx="2"/>
  <rect x="750" y="150" width="50" height="130" fill="#90A4AE" rx="2"/>
  <rect x="810" y="165" width="55" height="115" fill="#B0BEC5" rx="2"/>
  <rect x="875" y="145" width="45" height="135" fill="#90A4AE" rx="2"/>
  <!-- Ground -->
  <rect y="280" width="960" height="260" fill="#81C784"/>
  <!-- Station platform (main) -->
  <rect x="50" y="340" width="860" height="80" fill="#BDBDBD"/>
  <rect x="50" y="335" width="860" height="8" fill="#E0E0E0"/>
