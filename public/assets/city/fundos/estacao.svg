  <rect x="280" y="395" width="30" height="4" fill="#8D6E63" rx="1"/>
  <rect x="282" y="399" width="4" height="8" fill="#795548"/>
  <rect x="304" y="399" width="4" height="8" fill="#795548"/>
  <rect x="580" y="395" width="30" height="4" fill="#8D6E63" rx="1"/>
  <rect x="582" y="399" width="4" height="8" fill="#795548"/>
  <rect x="604" y="399" width="4" height="8" fill="#795548"/>
