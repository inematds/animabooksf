  <rect x="0" y="500" width="960" height="8" fill="#BDBDBD"/>
  <!-- Parking area -->
  <rect x="0" y="508" width="960" height="32" fill="#9E9E9E"/>
  <g stroke="#FFF" stroke-width="1.5">
    <line x1="80" y1="508" x2="80" y2="540"/>
    <line x1="160" y1="508" x2="160" y2="540"/>
    <line x1="240" y1="508" x2="240" y2="540"/>
    <line x1="320" y1="508" x2="320" y2="540"/>
    <line x1="400" y1="508" x2="400" y2="540"/>
    <line x1="480" y1="508" x2="480" y2="540"/>
    <line x1="560" y1="508" x2="560" y2="540"/>
    <line x1="640" y1="508" x2="640" y2="540"/>
    <line x1="720" y1="508" x2="720" y2="540"/>
    <line x1="800" y1="508" x2="800" y2="540"/>
    <line x1="880" y1="508" x2="880" y2="540"/>
  </g>
  <!-- Signal light -->
  <rect x="130" y="295" width="8" height="25" fill="#424242"/>
  <circle cx="134" cy="300" r="4" fill="#EF5350"/>
  <circle cx="134" cy="312" r="4" fill="#66BB6A"/>
</svg>
