  <!-- Station canopy / roof -->
  <rect x="250" y="350" width="200" height="8" fill="#78909C"/>
  <rect x="250" y="350" width="4" height="60" fill="#757575"/>
  <rect x="446" y="350" width="4" height="60" fill="#757575"/>
  <rect x="346" y="350" width="4" height="60" fill="#757575"/>
  <rect x="550" y="350" width="200" height="8" fill="#78909C"/>
  <rect x="550" y="350" width="4" height="60" fill="#757575"/>
  <rect x="746" y="350" width="4" height="60" fill="#757575"/>
  <rect x="646" y="350" width="4" height="60" fill="#757575"/>
