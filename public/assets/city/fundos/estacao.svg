  <line x1="0" y1="337" x2="960" y2="337" stroke="#9E9E9E" stroke-width="3"/>
  <!-- Ties -->
  <g fill="#6D4C41">
    <rect x="20" y="320" width="8" height="20"/><rect x="50" y="320" width="8" height="20"/>
    <rect x="80" y="320" width="8" height="20"/><rect x="110" y="320" width="8" height="20"/>
    <rect x="140" y="320" width="8" height="20"/><rect x="170" y="320" width="8" height="20"/>
    <rect x="200" y="320" width="8" height="20"/><rect x="230" y="320" width="8" height="20"/>
    <rect x="260" y="320" width="8" height="20"/><rect x="290" y="320" width="8" height="20"/>
    <rect x="320" y="320" width="8" height="20"/><rect x="350" y="320" width="8" height="20"/>
    <rect x="380" y="320" width="8" height="20"/><rect x="410" y="320" width="8" height="20"/>
    <rect x="440" y="320" width="8" height="20"/><rect x="470" y="320" width="8" height="20"/>
    <rect x="500" y="320" width="8" height="20"/><rect x="530" y="320" width="8" height="20"/>
    <rect x="560" y="320" width="8" height="20"/><rect x="590" y="320" width="8" height="20"/>
    <rect x="620" y="320" width="8" height="20"/><rect x="650" y="320" width="8" height="20"/>
    <rect x="680" y="320" width="8" height="20"/><rect x="710" y="320" width="8" height="20"/>
    <rect x="740" y="320" width="8" height="20"/><rect x="770" y="320" width="8" height="20"/>
    <rect x="800" y="320" width="8" height="20"/><rect x="830" y="320" width="8" height="20"/>
    <rect x="860" y="320" width="8" height="20"/><rect x="890" y="320" width="8" height="20"/>
    <rect x="920" y="320" width="8" height="20"/><rect x="950" y="320" width="8" height="20"/>
