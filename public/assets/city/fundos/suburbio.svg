  <rect x="90" y="335" width="6" height="15" fill="#757575"/>
  <rect x="85" y="330" width="16" height="8" fill="#EF5350" rx="2"/>
  <rect x="400" y="335" width="6" height="15" fill="#757575"/>
  <rect x="395" y="330" width="16" height="8" fill="#42A5F5" rx="2"/>
