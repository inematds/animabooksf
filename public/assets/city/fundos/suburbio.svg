  <line x1="30" y1="300" x2="180" y2="300" stroke="#8D6E63" stroke-width="3"/>
  <line x1="260" y1="300" x2="480" y2="300" stroke="#8D6E63" stroke-width="3"/>
  <line x1="560" y1="300" x2="730" y2="300" stroke="#8D6E63" stroke-width="3"/>
