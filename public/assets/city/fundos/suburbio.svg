  <rect x="30" y="290" width="4" height="16" fill="#8D6E63"/>
  <rect x="80" y="290" width="4" height="16" fill="#8D6E63"/>
  <rect x="130" y="290" width="4" height="16" fill="#8D6E63"/>
  <rect x="180" y="290" width="4" height="16" fill="#8D6E63"/>
  <rect x="260" y="290" width="4" height="16" fill="#8D6E63"/>
  <rect x="340" y="290" width="4" height="16" fill="#8D6E63"/>
  <rect x="420" y="290" width="4" height="16" fill="#8D6E63"/>
  <rect x="480" y="290" width="4" height="16" fill="#8D6E63"/>
  <rect x="560" y="290" width="4" height="16" fill="#8D6E63"/>
  <rect x="640" y="290" width="4" height="16" fill="#8D6E63"/>
  <rect x="730" y="290" width="4" height="16" fill="#8D6E63"/>
