<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <!-- Sky -->
  <rect width="960" height="540" fill="#81D4FA"/>
  <!-- Clouds -->
  <ellipse cx="250" cy="55" rx="60" ry="22" fill="#fff" opacity="0.85"/>
  <ellipse cx="290" cy="48" rx="45" ry="18" fill="#fff" opacity="0.85"/>
  <ellipse cx="700" cy="70" rx="50" ry="20" fill="#fff" opacity="0.8"/>
