  <circle cx="71" cy="252" r="18" fill="#388E3C"/>
  <rect x="438" y="270" width="6" height="25" fill="#795548"/>
  <circle cx="441" cy="262" r="16" fill="#43A047"/>
  <rect x="678" y="265" width="6" height="28" fill="#795548"/>
