<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 540">
  <!-- Background -->
  <rect x="0" y="0" width="960" height="540" fill="#424242"/>
  <!-- Studio backdrop -->
  <rect x="200" y="40" width="560" height="420" rx="10" fill="#e8eaf6"/>
  <rect x="210" y="50" width="540" height="400" rx="6" fill="#f5f5f5"/>
  <!-- Floor -->
  <rect x="0" y="430" width="960" height="110" fill="#616161"/>
  <!-- Backdrop curve into floor -->
  <path d="M210 420 Q210 450 250 460 L710 460 Q750 450 750 420" fill="#f5f5f5"/>
  <!-- Studio light left -->
  <rect x="80" y="60" width="8" height="300" fill="#9e9e9e"/>
  <rect x="40" y="340" width="90" height="10" rx="5" fill="#757575"/>
  <rect x="50" y="60" width="70" height="50" rx="5" fill="#333"/>
  <rect x="55" y="65" width="60" height="40" rx="3" fill="#fff9c4" opacity="0.8"/>
  <!-- Studio light right -->
  <rect x="870" y="60" width="8" height="300" fill="#9e9e9e"/>
  <rect x="830" y="340" width="90" height="10" rx="5" fill="#757575"/>
  <rect x="840" y="60" width="70" height="50" rx="5" fill="#333"/>
  <rect x="845" y="65" width="60" height="40" rx="3" fill="#fff9c4" opacity="0.8"/>
  <!-- Light beams -->
  <polygon points="85,110 300,200 300,350 85,300" fill="#fff9c4" opacity="0.05"/>
  <polygon points="875,110 660,200 660,350 875,300" fill="#fff9c4" opacity="0.05"/>
  <!-- Camera -->
  <rect x="440" y="380" width="80" height="60" rx="8" fill="#37474f"/>
  <circle cx="480" cy="405" r="18" fill="#263238"/>
  <circle cx="480" cy="405" r="12" fill="#546e7a"/>
  <circle cx="480" cy="405" r="6" fill="#78909c"/>
  <!-- Camera tripod -->
  <line x1="460" y1="440" x2="430" y2="520" stroke="#757575" stroke-width="4"/>
  <line x1="500" y1="440" x2="530" y2="520" stroke="#757575" stroke-width="4"/>
  <line x1="480" y1="440" x2="480" y2="525" stroke="#757575" stroke-width="4"/>
  <!-- Flash indicator -->
  <circle cx="510" cy="388" r="5" fill="#f44336"/>
  <!-- Umbrella reflector -->
  <path d="M100 180 Q160 120 220 180" fill="none" stroke="#e0e0e0" stroke-width="3"/>
  <path d="M100 180 Q160 140 220 180" fill="white" opacity="0.3"/>
</svg>