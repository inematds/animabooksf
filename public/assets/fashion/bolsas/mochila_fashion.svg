<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 70">
  <!-- Backpack body -->
  <rect x="8" y="15" width="44" height="48" rx="10" fill="#7c4dff"/>
  <!-- Top flap -->
  <path d="M8 15 Q8 8 30 5 Q52 8 52 15Z" fill="#651fff"/>
  <!-- Front pocket -->
  <rect x="14" y="35" width="32" height="22" rx="6" fill="#6200ea"/>
  <!-- Pocket zipper -->
  <line x1="20" y1="35" x2="40" y2="35" stroke="#ffd54f" stroke-width="1.5"/>
  <circle cx="40" cy="35" r="2" fill="#ffd54f"/>
  <!-- Main zipper -->
  <line x1="18" y1="15" x2="42" y2="15" stroke="#ffd54f" stroke-width="1.5"/>
  <circle cx="30" cy="15" r="2" fill="#ffd54f"/>
  <!-- Straps -->
  <rect x="12" y="10" width="6" height="55" rx="3" fill="#b388ff"/>
  <rect x="42" y="10" width="6" height="55" rx="3" fill="#b388ff"/>
  <!-- Star patch -->
  <polygon points="30,42 32,47 37,47 33,50 34,55 30,52 26,55 27,50 23,47 28,47" fill="#ffd54f"/>
  <!-- Handle on top -->
  <path d="M24 5 Q30 0 36 5" stroke="#651fff" stroke-width="3" fill="none"/>
  <!-- Keychain -->
  <circle cx="48" cy="20" r="3" fill="#f48fb1"/>
  <circle cx="48" cy="20" r="1.5" fill="#e91e63"/>
  <line x1="48" y1="17" x2="50" y2="15" stroke="#bdbdbd" stroke-width="1"/>
</svg>