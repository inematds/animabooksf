<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 70">
  <!-- Clutch body -->
  <rect x="5" y="20" width="50" height="30" rx="4" fill="#ffd54f"/>
  <!-- Flap -->
  <path d="M5 20 L55 20 L55 35 Q30 42 5 35Z" fill="#ffb300"/>
  <!-- Clasp -->
  <circle cx="30" cy="37" r="4" fill="#e0e0e0"/>
  <circle cx="30" cy="37" r="2" fill="#bdbdbd"/>
  <!-- Pattern - diagonal lines -->
  <line x1="10" y1="25" x2="20" y2="20" stroke="#ffca28" stroke-width="1" opacity="0.4"/>
  <line x1="20" y1="25" x2="30" y2="20" stroke="#ffca28" stroke-width="1" opacity="0.4"/>
  <line x1="30" y1="25" x2="40" y2="20" stroke="#ffca28" stroke-width="1" opacity="0.4"/>
  <line x1="40" y1="25" x2="50" y2="20" stroke="#ffca28" stroke-width="1" opacity="0.4"/>
  <!-- Edge stitching -->
  <rect x="7" y="22" width="46" height="26" rx="3" fill="none" stroke="#f9a825" stroke-width="0.8" stroke-dasharray="2,2"/>
  <!-- Chain strap hint -->
  <path d="M5 25 Q0 15 5 10 Q8 8 12 10" stroke="#e0e0e0" stroke-width="2" fill="none"/>
  <path d="M55 25 Q60 15 55 10 Q52 8 48 10" stroke="#e0e0e0" stroke-width="2" fill="none"/>
  <!-- Sparkle -->
  <circle cx="15" cy="30" r="1" fill="white" opacity="0.5"/>
  <circle cx="45" cy="28" r="1" fill="white" opacity="0.5"/>
</svg>