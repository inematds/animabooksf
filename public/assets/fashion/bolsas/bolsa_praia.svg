  <line x1="15" y1="20" x2="16" y2="62" stroke="#00acc1" stroke-width="1" opacity="0.4"/>
  <line x1="30" y1="20" x2="30" y2="65" stroke="#00acc1" stroke-width="1" opacity="0.4"/>
  <line x1="45" y1="20" x2="44" y2="62" stroke="#00acc1" stroke-width="1" opacity="0.4"/>
