  <line x1="40" y1="42" x2="42" y2="42" stroke="#ffd54f" stroke-width="2"/>
  <!-- Starfish peeking out -->
  <polygon points="48,18 49,14 52,16 51,12 54,13 52,10 55,10 52,8 54,5 51,7 50,4 49,7 46,5 48,8 45,10" fill="#ff7043" opacity="0.7"/>
